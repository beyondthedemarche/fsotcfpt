      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are staffing a senior official during a meeting when they make a statement that you believe is factually incorrect in a material way. The meeting is ongoing and the incorrect statement was made to the counterpart delegation. What would you do?",opts:{A:"Say nothing during the meeting and raise the error with the official privately afterward",B:"Immediately and loudly correct the official in front of the counterpart delegation",C:"Pass a discreet written note to the official flagging the potential error and suggesting a correction",D:"Do nothing - the official bears responsibility for the accuracy of their own statements"},best:"C",worst:"B",expBest:"Option C provides the official with the information to correct themselves in real time without publicly undermining their authority - the correct protocol for staffers who identify potential errors during meetings.",expWorst:"Option B loudly corrects the official in front of the counterpart delegation - undermining the official's authority, creating an awkward diplomatic moment, and overstepping the staffer role in a way that is not appropriate regardless of whether the correction is accurate."}
      ,{type:'standalone',sub:"Professionalism",q:"You receive an assignment with a deadline that you believe is genuinely unrealistic given your current workload. You have not previously flagged the workload concern. What would you do?",opts:{A:"Accept the assignment without comment and do your best to meet the deadline",B:"Immediately and transparently communicate your workload situation to your supervisor, propose what can realistically be delivered by the deadline, and discuss options including prioritization or timeline adjustment",C:"Begin the work and raise the timeline concern only if it becomes clear you will miss the deadline",D:"Decline the assignment citing your existing workload without proposing alternatives"},best:"B",worst:"D",expBest:"Option B is transparent and proactive - giving your supervisor accurate information about your capacity before the deadline passes, and proposing solutions rather than just identifying the problem. This is what realistic workload management looks like.",expWorst:"Option D declines an assignment without proposing alternatives - abdicating organizational responsibility and leaving your supervisor without either the work or a path to getting it done."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"Your team has produced a report that you believe is genuinely excellent. Your supervisor reviews it and returns it with extensive edits that significantly change its tone and some of its conclusions. You believe some of the edits weaken the product. What would you do?",opts:{A:"Accept all edits without comment and submit the revised document",B:"Request a brief meeting with your supervisor to discuss the specific edits you have concerns about, share your reasoning, and reach a mutual understanding before the final submission",C:"Accept the edits and note in the document that the conclusions reflect the supervisor's revisions",D:"Resubmit the original version with minor cosmetic changes and see if the supervisor notices"},best:"B",worst:"D",expBest:"Option B engages professionally on the substance of the edits - using the appropriate channel (direct conversation with the supervisor) to advocate for the original analysis while respecting their authority to make final decisions.",expWorst:"Option D deliberately circumvents the supervisor's authority by resubmitting material they have already revised - a significant breach of professional conduct that would likely damage the relationship severely if discovered."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"Your team is hosting a foreign delegation for a working visit. During the visit, you notice that the delegation's members appear uncomfortable with the informal American style of addressing everyone by first name from the initial introduction. What would you do?",opts:{A:"Continue the informal style since it reflects American professional culture and guests should adapt",B:"Shift to using titles and last names for the delegation members, brief your team members to do the same, and make the adjustment without drawing attention to it",C:"Announce to the room that you will be adjusting your naming convention out of respect for the guests",D:"Ask the delegation's lead whether they have a preference and adapt based on their response"},best:"D",worst:"A",expBest:"Option D is the most respectful approach - directly and discreetly checking with the delegation lead before assuming what adjustment is needed, which shows genuine respect without making assumptions about their preferences.",expWorst:"Option A insists on the American convention when signs of discomfort are visible - prioritizing cultural comfort with your own norms over genuine hospitality and effective communication with your guests."}
      ,{type:'standalone',sub:"Information Management",q:"You are completing an annual report and realize that a metric your section has always reported is based on a methodology that you now believe overstates performance. Changing the methodology would make your section look significantly less productive, but the new methodology is more accurate. What would you do?",opts:{A:"Continue using the established methodology for consistency and raise the concern in a footnote",B:"Change to the accurate methodology, clearly document the change and its rationale, and note the impact on year-over-year comparability in the report",C:"Use the old methodology for this year's report and propose a methodology change for next year to avoid disrupting the current reporting cycle",D:"Report using both methodologies and let leadership decide which to use"},best:"B",worst:"A",expBest:"Option B corrects the methodology, is transparent about the change and its effect on comparability, and presents accurate data to leadership. Accuracy in performance reporting is a fundamental obligation even when the result is less flattering.",expWorst:"Option A continues a methodology you believe overstates performance and buries the concern in a footnote - allowing misleading data to stand in the body of the report while providing only technical cover through the footnote."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A new colleague who recently transferred from another agency seems isolated from the team and has not been included in informal social interactions. You are not their supervisor. What would you do?",opts:{A:"Leave it to the supervisor to address integration of new team members",B:"Take deliberate steps to include the colleague in informal team interactions - lunch invitations, introductions, brief check-ins - and encourage other team members to do the same",C:"Ask the colleague directly why they are keeping to themselves",D:"Report the isolation to the supervisor as a potential morale issue"},best:"B",worst:"D",expBest:"Option B takes direct positive action to integrate a new colleague into the team culture - the kind of collegial initiative that creates inclusive workplaces and does not require supervisory direction.",expWorst:"Option D reports a colleague's isolation as a morale issue to the supervisor rather than taking any direct positive action - treating a human situation as an administrative problem when a simple collegial gesture would be more effective."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are facilitating a team meeting when two colleagues begin a side conversation that disrupts the discussion. Other participants are visibly distracted. What would you do?",opts:{A:"Stop the meeting entirely until the side conversation ends",B:"Calmly acknowledge the side conversation and redirect both colleagues back to the group discussion",C:"Continue the meeting and ignore the disruption to avoid embarrassing the colleagues",D:"Ask the two colleagues to leave the meeting"},best:"B",worst:"D",expBest:"Option B handles the disruption proportionately and professionally - a brief, calm redirection keeps the meeting on track without creating unnecessary tension or embarrassment.",expWorst:"Option D removes colleagues from a meeting for a minor, correctable disruption - a disproportionate response that escalates the situation unnecessarily."}
      ,{type:'standalone',sub:"Professionalism",q:"You finish a task early and have unexpected free time before your next meeting. Your workload has been light this week. What would you do?",opts:{A:"Take the rest of the afternoon off since you have completed your assigned work",B:"Browse the internet and catch up on personal tasks since nothing urgent is pending",C:"Ask your supervisor whether there is additional work you can assist with, or use the time to advance longer-term projects",D:"Leave early without telling anyone since your schedule is empty"},best:"C",worst:"A",expBest:"Option C uses unexpected free time productively and demonstrates initiative - offering to help and working on longer-term priorities shows organizational commitment.",expWorst:"Option A leaves work during working hours because assigned tasks are complete - government employees are expected to remain productive during duty hours, not leave when they finish early."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You disagree with a decision your supervisor has made but it has already been implemented. A junior colleague asks your opinion of the decision. What would you do?",opts:{A:"Honestly share your disagreement with the decision and your reasons for disagreeing",B:"Express support for the implemented decision to your colleague and raise your concerns with your supervisor privately if you have not already done so",C:"Deflect the question and say you have no opinion",D:"Tell your colleague that the supervisor made a poor decision and the team should push back"},best:"B",worst:"D",expBest:"Option B maintains professional loyalty to an implemented decision while preserving the appropriate channel for concerns. Speaking critically about supervisory decisions to junior colleagues undermines authority.",expWorst:"Option D actively encourages subordinates to resist an implemented decision - undermining institutional authority and creating division regardless of whether the decision was correct."}
      ,{type:'standalone',sub:"Resource Management",q:"You notice that your section has a surplus of office supplies ordered in bulk that are unlikely to be used before they expire. Other sections may have a need for them. What would you do?",opts:{A:"Dispose of the supplies to keep the office tidy",B:"Keep the supplies in your section's storage in case a future need arises",C:"Offer the surplus supplies to other sections within the agency and coordinate with facilities management to redistribute them",D:"Take the surplus supplies home since they will otherwise go to waste"},best:"C",worst:"D",expBest:"Option C maximizes value from supplies already purchased by redistributing them to sections with needs - responsible stewardship that prevents waste.",expWorst:"Option D takes government property home for personal use - this is theft of government property regardless of the rationalization that supplies would otherwise go to waste."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are in a meeting with external partners when you realize you forgot to bring a key document that was supposed to be shared. The document is on your computer in your office. What would you do?",opts:{A:"Pretend you forgot to print the document and schedule a follow-up meeting to share it",B:"Briefly excuse yourself to retrieve the document or email it to yourself and project it, and apologize for the minor inconvenience",C:"Proceed without the document and hope the meeting goes well without it",D:"Blame a colleague for not preparing the document"},best:"B",worst:"D",expBest:"Option B takes responsibility for the oversight, finds a practical solution, and minimizes disruption to the meeting - a professional and honest response to a minor logistical error.",expWorst:"Option D falsely attributes your oversight to a colleague - dishonest, unfair to the colleague, and likely to be discovered, causing embarrassment and credibility damage."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"A colleague asks you to cover for them at a meeting while they handle a personal errand during work hours. They say it will only take an hour. What would you do?",opts:{A:"Cover for them without question since they would do the same for you",B:"Decline to cover in a way that conceals their absence for a personal errand, and suggest they speak to their supervisor about any personal needs",C:"Cover for them and cover up the real reason for their absence if asked",D:"Report the colleague to your supervisor immediately"},best:"B",worst:"C",expBest:"Option B declines to facilitate the concealment of an unauthorized absence - you can support a colleague without participating in deception, and suggesting the supervisor channel is appropriate.",expWorst:"Option C actively covers up the real reason for a colleague's absence - participating in a deception of supervisors that creates integrity risk for you personally."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are attending a formal dinner with diplomatic counterparts. The host serves a dish that you personally find very unpleasant. What would you do?",opts:{A:"Politely decline the dish and explain that you do not enjoy it",B:"Accept a small portion and engage graciously, focusing on the conversation rather than the food",C:"Ask for an alternative dish to be prepared",D:"Excuse yourself from the table to avoid having to eat the dish"},best:"B",worst:"C",expBest:"Option B prioritizes the relationship and diplomatic context over personal preferences - accepting a small portion graciously is a standard diplomatic skill in formal settings.",expWorst:"Option C requests that the host prepare an alternative - an imposition on the host's hospitality that signals your personal preferences take priority over their effort, inappropriate in a formal diplomatic setting."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You accidentally send an email containing non-public agency information to the wrong recipient - a member of the public rather than your intended colleague. What would you do?",opts:{A:"Send a follow-up email asking the recipient to delete the previous message and not share it",B:"Immediately notify your supervisor and the Information Security Officer, and follow the agency's incident reporting procedures",C:"Do nothing and hope the recipient does not read or share the email",D:"Call the recipient and ask them to return the information"},best:"B",worst:"C",expBest:"Option B follows required incident reporting procedures immediately - inadvertent disclosures must be reported through proper channels regardless of intent so appropriate remediation can occur.",expWorst:"Option C takes no action and hopes the problem resolves itself - allowing a disclosure to stand without reporting or remediation, compounding the original mistake with deliberate inaction."}

      ,{type:'standalone',sub:"Professionalism",q:"You are preparing talking points for your supervisor to use in a meeting. You receive conflicting guidance from two senior officials about what the talking points should say. What would you do?",opts:{A:"Write talking points reflecting whichever guidance you personally agree with more",B:"Inform your supervisor of the conflicting guidance and ask for direction before finalizing the talking points",C:"Blend both sets of guidance without flagging the conflict",D:"Produce two separate versions and let the supervisor choose at the last minute"},best:"B",worst:"A",expBest:"Option B surfaces the conflict to the right person - your supervisor has the authority and context to resolve conflicting senior guidance before the meeting.",expWorst:"Option A resolves a policy conflict by personal preference rather than by escalating to the appropriate authority - substituting your own judgment for the supervisor's on a matter requiring supervisory direction."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are the first to arrive at work and notice that a colleague has left sensitive paper documents on their desk overnight, which is against security policy. The colleague has not yet arrived. What would you do?",opts:{A:"Leave the documents where they are since the colleague will arrive soon",B:"Secure the documents appropriately and inform the colleague when they arrive, and remind them of the policy",C:"Report the colleague to security immediately for a formal investigation",D:"Take a photo of the documents as evidence in case you need to report it later"},best:"B",worst:"D",expBest:"Option B takes immediate appropriate action - securing the documents - and handles the policy reminder collegially, addressing the security risk without unnecessary escalation for an apparent overnight oversight.",expWorst:"Option D photographs sensitive documents to create personal evidence rather than either securing them or reporting through proper channels - potentially itself constituting a security violation."}

      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"A colleague who is leading a project asks for your input on a draft strategy document. You have significant concerns about the approach but the colleague seems very invested in the direction. What would you do?",opts:{A:"Tell the colleague the strategy looks good to avoid conflict",B:"Share your specific concerns honestly and constructively, explaining your reasoning and suggesting alternatives where possible",C:"Say nothing and hope the strategy is reconsidered before implementation",D:"Raise your concerns with the colleague's supervisor rather than with the colleague directly"},best:"B",worst:"A",expBest:"Option B provides honest, substantive input - which is what the colleague asked for - in a constructive way that respects both the relationship and the quality of the project outcome.",expWorst:"Option A withholds genuine concerns and provides false validation - denying the colleague the honest input they sought and potentially allowing a flawed strategy to proceed."}

      ,{type:'standalone',sub:"Professionalism",q:"You receive an email that appears to have been sent to you in error containing sensitive internal personnel information. What would you do?",opts:{A:"Read the email thoroughly since it arrived in your inbox",B:"Notify the sender immediately that the email was sent to you in error, do not read beyond what is needed to identify the mistake, and delete the email",C:"Forward the email to your supervisor for guidance",D:"Save the email in case the information proves useful in the future"},best:"B",worst:"D",expBest:"Option B handles the misdirected email correctly - alerting the sender so they can manage the disclosure, limiting your exposure to the sensitive content, and deleting the material.",expWorst:"Option D saves a misdirected email containing sensitive personnel information for potential future use - deliberate retention of information received in error, a privacy and ethics violation."}

      ,{type:'standalone',sub:"Workplace Conduct",q:"You are chatting informally with colleagues at lunch when the conversation turns to complaints about a specific senior official's leadership style. Several colleagues make critical remarks. What would you do?",opts:{A:"Join in enthusiastically since this is a safe informal setting",B:"Listen without encouraging the complaints and redirect the conversation to a more constructive topic when appropriate",C:"Defend the senior official vigorously regardless of whether the criticisms have merit",D:"Report the conversation to the senior official"},best:"B",worst:"A",expBest:"Option B navigates the situation with professional discretion - not amplifying the complaints or being unnecessarily defensive, and gently redirecting when appropriate.",expWorst:"Option A enthusiastically joins in criticizing a senior official in a group setting - creating a record of negative commentary that could damage professional relationships and workplace culture."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are managing a complex case requiring input from three departments. One has not responded after two weeks despite your initial request. The case is approaching a deadline. What would you do?",opts:{A:"Submit the case without the missing input since you cannot wait any longer",B:"Follow up directly with the non-responding department, escalate through your supervisor if no response comes within 24 hours, and document your follow-up efforts",C:"Wait another week before following up to give the department more time",D:"Contact the head of the non-responding department directly without involving your supervisor"},best:"B",worst:"C",expBest:"Option B takes proactive escalating action with documentation - direct follow-up, then supervisory escalation - to get the required input before the deadline while keeping appropriate people informed.",expWorst:"Option C waits another week when a deadline is approaching and two weeks have already passed without response - continued passive waiting that allows the problem to worsen."}
      ,{type:'standalone',sub:"Information Management",q:"You receive an urgent request from a trusted external partner for non-public agency data. They say the request is time-sensitive and ask you to share the data informally to save time. What would you do?",opts:{A:"Share the data since you trust the partner and the need is genuine",B:"Explain that non-public data requires formal authorization regardless of urgency, decline to share informally, and help expedite the proper approval process",C:"Share a summary of the data rather than the full dataset as a compromise",D:"Ask a junior colleague to share the data so you are not personally responsible"},best:"B",worst:"A",expBest:"Option B maintains proper information handling protocols while being responsive to urgency - the correct approach is to expedite the formal process, not bypass it.",expWorst:"Option A shares non-public agency data without authorization based on trust and urgency - neither of which constitutes proper authorization for sharing restricted information."}

      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are leading an international team meeting. Several participants are joining remotely from difficult time zones and are clearly tired. What would you do?",opts:{A:"Keep the full meeting time since everyone agreed to the schedule in advance",B:"Acknowledge the challenging timing at the start, keep the meeting as efficient as possible, and where feasible rotate meeting times in the future so the time zone burden is shared more equitably",C:"Move quickly through the agenda without allowing time for questions to finish as fast as possible",D:"Ask only the tired participants to take notes and present summaries at the next meeting"},best:"B",worst:"D",expBest:"Option B acknowledges the time zone burden, manages the meeting efficiently, and commits to fairer scheduling - showing genuine consideration for team members while still accomplishing the meeting's purpose.",expWorst:"Option D assigns additional burdens to team members who are already disadvantaged by the time zone situation - compounding the inequity rather than addressing it."}

      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You overhear a senior colleague speaking dismissively about a junior colleague's capability to a third party. The junior colleague is not present. What would you do?",opts:{A:"Say nothing since the junior colleague was not there to be directly harmed",B:"If you have a good relationship with the senior colleague, speak to them privately about the impact of disparaging a colleague to others; if not, consider whether the pattern warrants escalation",C:"Immediately defend the junior colleague loudly to the senior colleague and third party",D:"Tell the junior colleague exactly what was said so they are aware of the situation"},best:"B",worst:"D",expBest:"Option B addresses the behavior through the most appropriate channel - private feedback to the senior colleague if possible, or escalation if it is a pattern - without creating a scene.",expWorst:"Option D relays the exact dismissive comments to the junior colleague - likely to cause hurt without serving any constructive purpose, and potentially damaging both morale and team dynamics."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"A colleague asks to see a document that is within your section's files but that they do not have an established need-to-know. They say they are 'just curious.' What would you do?",opts:{A:"Share the document since your colleague is trusted and works in the same building",B:"Decline to share the document without an established need-to-know, explain why access requires that basis, and offer to help them establish one if the need is legitimate",C:"Share a redacted version of the document as a compromise",D:"Forward the request to your supervisor and let them decide"},best:"B",worst:"A",expBest:"Option B applies the need-to-know principle correctly and constructively - declining the unauthorized access while explaining the basis and offering a path to legitimate access.",expWorst:"Option A shares a controlled document based on trust and proximity rather than an established need-to-know - a foundational information security violation."}
    ]
  }
};

var SECTION_IDS = ['jk', 'ee', 'lr', 'cr', 'sj'];

// -- RESULT KEY ----------------------------------------------------------------
// sid:itemIdx:qInGroup  (qInGroup always 0 for standalones)
function rKey(sid, itemIdx, qInGroup) {
  return sid + ':' + itemIdx + ':' + (qInGroup || 0);
}

// -- TOTAL QUESTION COUNT per section (for progress bar) -----------------------
function totalQs(sid) {
  var n = 0;
  SECTIONS[sid].items.forEach(function(item) {
    if (item.type === 'group') n += item.questions.length;
    else n++;
  });
  return n;
}

function answeredQs(sid) {
  var n = 0;
  var items = SECTIONS[sid].items;
  items.forEach(function(item, itemIdx) {
    if (item.type === 'group') {
      item.questions.forEach(function(_, qi) {
        var r = state.results[rKey(sid, itemIdx, qi)];
        if (r && !r.skipped) n++;
      });
    } else {
      var r = state.results[rKey(sid, itemIdx, 0)];
      if (r && !r.skipped) n++;
    }
  });
  return n;
}

// -- STATE ---------------------------------------------------------------------
var state = {
  section:  'jk',
  queues:   { jk: [], ee: [], lr: [] },
  results:  {},           // keyed by rKey()
  suspended:{ jk: null, ee: null, lr: null },
  current:  null,         // queue entry currently being shown
  selected: null,
  submitted:false,
  shuffled: false,
  noRepeat: false,
  sjSelected: { best: null, worst: null },
  totalAttempted:  0,
  totalCorrect:    0,
  totalWrong:      0,
  totalSkipped:    0,
  totalRecovered:  0
};

// -- QUEUE BUILDER -------------------------------------------------------------
// Builds a flat queue of individual question cards.
// Groups are kept as a contiguous block; shuffle moves the block as a unit.

function buildQueue(sid, doShuffle) {
  var items = SECTIONS[sid].items;

  // Build "units" - each unit is either a single standalone card or
  // an ordered array of group cards. Shuffle happens at unit level.
  var units = [];
  items.forEach(function(item, itemIdx) {
    if (item.type === 'group') {
      var groupCards = item.questions.map(function(q, qi) {
        return {
          type:      'group',
          sid:       sid,
          itemIdx:   itemIdx,
          qInGroup:  qi,
          groupSize: item.questions.length,
          gid:       item.gid,
          isRepeat:  false
        };
      });
      units.push(groupCards); // array = one shuffleable unit
    } else {
      units.push([{
        type:     'standalone',
        sid:      sid,
        itemIdx:  itemIdx,
        qInGroup: 0,
        isRepeat: false
      }]);
    }
  });

  if (doShuffle) {
    for (var j = units.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = units[j]; units[j] = units[k]; units[k] = tmp;
    }
  }

  // Flatten units into a single queue array
  var queue = [];
  units.forEach(function(unit) { unit.forEach(function(card) { queue.push(card); }); });
  state.queues[sid] = queue;
}


// -- SITUATIONAL JUDGMENT RENDERER --------------------------------------------
function renderSJQuestion(q, item) {
  state.sjSelected = { best: null, worst: null };

  // Clear standard elements
  document.getElementById('q-options').innerHTML = '';
  document.getElementById('q-explanation').className = 'explanation';
  document.getElementById('q-exp-text').textContent = '';
  document.getElementById('q-verdict').textContent = '';

  // Build SJ UI inside q-options div
  var container = document.getElementById('q-options');

  var instr = document.createElement('div');
  instr.className = 'sj-instructions';
  instr.innerHTML = 'Select the <strong style="color:#237804">BEST</strong> response and the <strong style="color:#820014">WORST</strong> response. Both selections are required before you can submit.';
  container.appendChild(instr);

  // Best label
  var bestLabel = document.createElement('div');
  bestLabel.className = 'sj-label sj-best-label';
  bestLabel.textContent = 'Best Response';
  container.appendChild(bestLabel);

  var letters = ['A','B','C','D'];
  letters.forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'sj-option';
    div.id = 'sj-best-' + letter;
    div.onclick = (function(l) { return function() { selectSJBest(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'sj-opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  // Worst label
  var worstLabel = document.createElement('div');
  worstLabel.className = 'sj-label sj-worst-label';
  worstLabel.textContent = 'Worst Response';
  container.appendChild(worstLabel);

  letters.forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'sj-option';
    div.id = 'sj-worst-' + letter;
    div.onclick = (function(l) { return function() { selectSJWorst(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'sj-opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').disabled   = true;
  document.getElementById('skip-btn').disabled   = false;
}

function selectSJBest(letter) {
  if (state.submitted) return;
  state.sjSelected.best = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('sj-best-' + l);
    if (el) { el.classList.remove('selected-best'); }
  });
  var el = document.getElementById('sj-best-' + letter);
  if (el) el.classList.add('selected-best');
  checkSJReady();
}

function selectSJWorst(letter) {
  if (state.submitted) return;
  state.sjSelected.worst = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('sj-worst-' + l);
    if (el) { el.classList.remove('selected-worst'); }
  });
  var el = document.getElementById('sj-worst-' + letter);
  if (el) el.classList.add('selected-worst');
  checkSJReady();
}

function checkSJReady() {
  var ready = state.sjSelected.best !== null && state.sjSelected.worst !== null
    && state.sjSelected.best !== state.sjSelected.worst;
  document.getElementById('submit-btn').disabled = !ready;
}

function submitSJAnswer() {
  var entry = state.current;
  var sid   = entry.sid;
  var item  = SECTIONS[sid].items[entry.itemIdx];
  var q     = item;
  var key   = rKey(sid, entry.itemIdx, 0);

  var selBest  = state.sjSelected.best;
  var selWorst = state.sjSelected.worst;
  var correctBest  = q.best;
  var correctWorst = q.worst;

  var bestCorrect  = selBest  === correctBest;
  var worstCorrect = selWorst === correctWorst;
  var bothCorrect  = bestCorrect && worstCorrect;

  // Lock all options
  ['A','B','C','D'].forEach(function(l) {
    var bEl = document.getElementById('sj-best-' + l);
    var wEl = document.getElementById('sj-worst-' + l);
    if (bEl) { bEl.classList.add('disabled'); bEl.classList.remove('selected-best'); }
    if (wEl) { wEl.classList.add('disabled'); wEl.classList.remove('selected-worst'); }
  });

  // Highlight best row
  ['A','B','C','D'].forEach(function(l) {
    var bEl = document.getElementById('sj-best-' + l);
    if (!bEl) return;
    if (l === correctBest) bEl.classList.add('correct-best');
    else if (l === selBest && !bestCorrect) bEl.classList.add('incorrect');
  });

  // Highlight worst row
  ['A','B','C','D'].forEach(function(l) {
    var wEl = document.getElementById('sj-worst-' + l);
    if (!wEl) return;
    if (l === correctWorst) wEl.classList.add('correct-worst');
    else if (l === selWorst && !worstCorrect) wEl.classList.add('incorrect');
  });

  // Show explanations
  var container = document.getElementById('q-options');

  var scoreNote = document.createElement('div');
  if (bothCorrect) {
    scoreNote.className = 'sj-score-note sj-score-full';
    scoreNote.textContent = 'Full credit - both Best and Worst correctly identified';
  } else if (bestCorrect || worstCorrect) {
    scoreNote.className = 'sj-score-note sj-score-half';
    scoreNote.textContent = 'Partial credit - ' + (bestCorrect ? 'Best' : 'Worst') + ' correctly identified';
  } else {
    scoreNote.className = 'sj-score-note sj-score-none';
    scoreNote.textContent = 'Incorrect - neither Best nor Worst correctly identified';
  }
  container.appendChild(scoreNote);

  var expBest = document.createElement('div');
  expBest.className = 'sj-exp-block show sj-exp-best';
  expBest.innerHTML = '<div class="sj-exp-title">Best Response (' + correctBest + '): ' + (q.opts[correctBest] || '') + '</div>' + q.expBest;
  container.appendChild(expBest);

  var expWorst = document.createElement('div');
  expWorst.className = 'sj-exp-block show sj-exp-worst';
  expWorst.innerHTML = '<div class="sj-exp-title">Worst Response (' + correctWorst + '): ' + (q.opts[correctWorst] || '') + '</div>' + q.expWorst;
  container.appendChild(expWorst);

  // Score tracking - count each SJ question as 2 point opportunities
  if (!state.results[key]) {
    var points = (bestCorrect ? 1 : 0) + (worstCorrect ? 1 : 0);
    state.results[key] = {
      correct: bothCorrect,
      skipped: false,
      wasRepeat: entry.isRepeat,
      sub: item.sub,
      sjPoints: points
    };
    state.totalAttempted++;
    if (bothCorrect) state.totalCorrect++;
    else if (bestCorrect || worstCorrect) state.totalRecovered++; // reuse recovered for partial
    else state.totalWrong++;
  }

  state.submitted = true;
  if (!bothCorrect) requeueWrong(entry);

  updateScore();
  updateProgress();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('skip-btn').disabled   = true;
  document.getElementById('next-btn').disabled   = false;
}

function fullReset() {
  state.results   = {};
  state.suspended = { jk: null, ee: null, lr: null };
  state.current   = null;
  state.selected  = null;
  state.submitted = false;
  state.shuffled  = false;
  state.noRepeat  = false;
  state.sjSelected = { best: null, worst: null };
  state.totalAttempted  = 0;
  state.totalCorrect    = 0;
  state.totalWrong      = 0;
  state.totalSkipped    = 0;
  state.totalRecovered  = 0;
  SECTION_IDS.forEach(function(sid) { buildQueue(sid, false); });
  updateScore();
  updateTabBadges();
}

// -- SECTION SWITCHING ---------------------------------------------------------
function showSection(sid) {
  var diagPanel = document.getElementById('diagnostics-panel');
  if (diagPanel.classList.contains('show')) {
    diagPanel.className = 'diagnostics';
    document.getElementById('quiz-area').style.display = 'block';
  }

  if (sid === state.section && state.current) return;

  if (state.current && !state.submitted) {
    state.queues[state.current.sid].unshift(state.current);
    state.suspended[state.current.sid] = state.current;
    state.current  = null;
    state.selected = null;
    state.submitted = false;
  }

  state.section = sid;
  SECTION_IDS.forEach(function(s) {
    document.getElementById('tab-' + s).classList.toggle('active', s === sid);
  });
  updateTabBadges();
  restoreCardDOM();
  loadNext();
}

// -- RESTORE CARD DOM ----------------------------------------------------------
function restoreCardDOM() {
  if (!document.getElementById('q-passage-wrap')) {
    document.getElementById('q-card').innerHTML =
      '<div id="q-passage-wrap" style="display:none">' +
        '<div class="passage-counter" id="q-passage-counter"></div>' +
        '<div class="passage-box" id="q-passage-box"></div>' +
      '</div>' +
      '<div class="section-label" id="q-section-label"></div>' +
      '<div class="subsection-label" id="q-subsection-label"></div>' +
      '<div class="question" id="q-text"></div>' +
      '<div class="options" id="q-options"></div>' +
      '<div class="explanation" id="q-explanation">' +
        '<div class="verdict" id="q-verdict"></div>' +
        '<div id="q-exp-text"></div>' +
      '</div>' +
      '<div class="btn-row">' +
        '<button class="btn primary" id="submit-btn" onclick="submitAnswer()" disabled>Check Answer</button>' +
        '<button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>' +
        '<button class="btn" id="skip-btn" onclick="skipQuestion()">Skip</button>' +
      '</div>';
  }
}

// -- QUEUE HELPERS -------------------------------------------------------------
function requeueWrong(entry) {
  if (state.noRepeat) return; // no-repeat mode: skip requeueing
  var q = state.queues[entry.sid];
  var insertAt = Math.min(2, q.length);
  var repeatEntry = JSON.parse(JSON.stringify(entry));
  repeatEntry.isRepeat = true;
  q.splice(insertAt, 0, repeatEntry);
  updateTabBadges();
}

function updateTabBadges() {
  SECTION_IDS.forEach(function(sid) {
    var btn = document.getElementById('tab-' + sid);
    var existing = btn.querySelector('.tab-badge');
    var count = state.queues[sid].length;
    if (count > 0) {
      if (!existing) {
        var badge = document.createElement('span');
        badge.className = 'tab-badge';
        btn.appendChild(badge);
        existing = badge;
      }
      existing.textContent = count;
    } else {
      if (existing) existing.remove();
    }
  });
}

function updateProgress() {
  var sid   = state.section;
  var total = totalQs(sid);
  var done  = answeredQs(sid);
  var pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' / ' + total;
}

// -- LOAD NEXT -----------------------------------------------------------------
function loadNext() {
  var sid   = state.section;
  var queue = state.queues[sid];
  restoreCardDOM();

  if (queue.length === 0) {
    document.getElementById('q-section-label').textContent = SECTIONS[sid].label;
    document.getElementById('q-subsection-label').textContent = '';
    var pw = document.getElementById('q-passage-wrap'); if (pw) pw.style.display = 'none';
    document.getElementById('q-text').textContent = 'All questions in this section are complete! Switch to another section or press Finish Quiz to see your diagnostics.';
    document.getElementById('q-options').innerHTML = '';
    document.getElementById('q-explanation').className = 'explanation';
    document.getElementById('q-exp-text').textContent = '';
    document.getElementById('q-verdict').textContent = '';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('next-btn').disabled   = true;
    document.getElementById('skip-btn').disabled   = true;
    document.getElementById('queue-note').classList.remove('show');
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-label').textContent = 'Complete';
    state.current = null;
    return;
  }

  var entry = queue.shift();
  updateTabBadges();
  state.suspended[sid] = null;
  state.current   = entry;
  state.selected  = null;
  state.submitted = false;

  var sec  = SECTIONS[sid];
  var item = sec.items[entry.itemIdx];

  // Determine the question object
  var q = entry.type === 'group'
    ? item.questions[entry.qInGroup]
    : item;

  document.getElementById('queue-note').classList.toggle('show', entry.isRepeat);
  document.getElementById('q-section-label').textContent = sec.label;
  document.getElementById('q-subsection-label').textContent = item.sub || '';

  // Passage display
  var passWrap = document.getElementById('q-passage-wrap');
  if (entry.type === 'group') {
    passWrap.style.display = 'block';
    document.getElementById('q-passage-counter').textContent =
      'Passage question ' + (entry.qInGroup + 1) + ' of ' + entry.groupSize;
    var passBox = document.getElementById('q-passage-box');
    passBox.innerHTML = '';
    item.passage.split('\n').forEach(function(line, i) {
      if (i > 0) passBox.appendChild(document.createElement('br'));
      passBox.appendChild(document.createTextNode(line));
    });
  } else {
    passWrap.style.display = 'none';
  }

  // Question text
  var qEl = document.getElementById('q-text');
  qEl.innerHTML = '';
  q.q.split('\n').forEach(function(line, i) {
    if (i > 0) qEl.appendChild(document.createElement('br'));
    qEl.appendChild(document.createTextNode(line));
  });

  // SJ section uses a different renderer
  if (entry.type === 'standalone' && entry.sid === 'sj') {
    renderSJQuestion(q, item);
    return;
  }

  // Options
  var container = document.getElementById('q-options');
  container.innerHTML = '';
  ['A','B','C','D'].forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'option';
    div.id = 'opt-' + letter;
    div.onclick = (function(l) { return function() { selectOpt(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  document.getElementById('q-explanation').className = 'explanation';
  document.getElementById('q-exp-text').textContent = '';
  document.getElementById('q-verdict').textContent = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').disabled   = true;
  document.getElementById('skip-btn').disabled   = false;
  document.getElementById('submit-btn').textContent = 'Check Answer';
  document.getElementById('next-btn').textContent   = 'Next';

  updateProgress();
}

// -- SELECT --------------------------------------------------------------------
function selectOpt(letter) {
  if (state.submitted) return;
  state.selected = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('opt-' + l);
    if (el) el.classList.toggle('selected', l === letter);
  });
  document.getElementById('submit-btn').disabled = false;
}

// -- SUBMIT --------------------------------------------------------------------
function submitAnswer() {
  if (!state.current || state.submitted) return;
  if (state.current.sid === 'sj') { submitSJAnswer(); return; }
  if (!state.selected) return;
  state.submitted = true;

  var entry   = state.current;
  var sid     = entry.sid;
  var item    = SECTIONS[sid].items[entry.itemIdx];
  var q       = entry.type === 'group' ? item.questions[entry.qInGroup] : item;
  var correct = q.correct;
  var isCorrect = state.selected === correct;
  var key = rKey(sid, entry.itemIdx, entry.qInGroup);

  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('opt-' + l);
    if (!el) return;
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (l === correct) el.classList.add('correct');
    if (l === state.selected && !isCorrect) el.classList.add('wrong');
  });

  document.getElementById('q-explanation').className = 'explanation show ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('q-verdict').textContent = isCorrect
    ? 'Correct!'
    : 'Incorrect - the correct answer is ' + correct + '.';
  document.getElementById('q-exp-text').textContent = q.exp;

  // Record first-attempt only
  if (!state.results[key]) {
    state.results[key] = { correct: isCorrect, skipped: false, wasRepeat: entry.isRepeat, sub: item.sub };
    state.totalAttempted++;
    if (isCorrect && entry.isRepeat) state.totalRecovered++;
    else if (isCorrect) state.totalCorrect++;
    else state.totalWrong++;
  }

  if (!isCorrect) requeueWrong(entry);

  updateScore();
  updateProgress();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('skip-btn').disabled   = true;
  document.getElementById('next-btn').disabled   = false;
}

// -- SKIP ----------------------------------------------------------------------
function skipQuestion() {
  if (state.submitted || !state.current) return;
  var entry = state.current;
  var sid   = entry.sid;
  var item  = SECTIONS[sid].items[entry.itemIdx];
  var key   = rKey(sid, entry.itemIdx, entry.qInGroup);

  if (!state.results[key]) {
    state.results[key] = { correct: false, skipped: true, sub: item.sub };
    state.totalSkipped++;
    state.totalAttempted++;
    updateScore();
  }

  if (!state.noRepeat) {
    var repeatEntry = JSON.parse(JSON.stringify(entry));
    repeatEntry.isRepeat = true;
    state.queues[sid].push(repeatEntry);
    updateTabBadges();
  }
  state.current = null;
  loadNext();
}

// -- SHUFFLE -------------------------------------------------------------------
function setNoRepeat(on) {
  state.noRepeat = on;
  var chk = document.getElementById('no-repeat-chk');
  if (chk) chk.checked = on;
}

function toggleNoRepeat() {
  setNoRepeat(!state.noRepeat);
}

function setShuffle(on) {
  // kept for fullReset compatibility - no visual toggle state
  state.shuffled = false;
}

function toggleShuffle() {
  // Always shuffles - does not toggle between states
  if (state.current && !state.submitted) {
    state.queues[state.current.sid].unshift(JSON.parse(JSON.stringify(state.current)));
    state.current  = null;
    state.selected = null;
    state.submitted = false;
  }
  reshuffleQueues(true);
  restoreCardDOM();
  loadNext();
  // Brief visual feedback
  var btn = document.getElementById('shuffle-btn');
  if (btn) {
    btn.textContent = 'Shuffled!';
    btn.style.background  = '#edf9ee';
    btn.style.borderColor = '#52c41a';
    btn.style.color       = '#237804';
    setTimeout(function() {
      btn.textContent = 'Shuffle All';
      btn.style.background  = '';
      btn.style.borderColor = '';
      btn.style.color       = '';
    }, 1200);
  }
}

// Reshuffle all queues treating groups as atomic units
function reshuffleQueues(doShuffle) {
  SECTION_IDS.forEach(function(sid) {
    var queue   = state.queues[sid];
    var repeats = queue.filter(function(x) { return x.isRepeat; });
    var fresh   = queue.filter(function(x) { return !x.isRepeat; });

    // Re-group fresh items into units (contiguous group cards stay together)
    var units = [];
    var i = 0;
    while (i < fresh.length) {
      if (fresh[i].type === 'group') {
        // Collect all cards with the same gid
        var gid = fresh[i].gid;
        var block = [];
        while (i < fresh.length && fresh[i].type === 'group' && fresh[i].gid === gid) {
          block.push(fresh[i]);
          i++;
        }
        units.push(block);
      } else {
        units.push([fresh[i]]);
        i++;
      }
    }

    if (doShuffle) {
      for (var j = units.length - 1; j > 0; j--) {
        var k = Math.floor(Math.random() * (j + 1));
        var tmp = units[j]; units[j] = units[k]; units[k] = tmp;
      }
    } else {
      // Restore original order by itemIdx then qInGroup
      units.sort(function(a, b) {
        var ai = a[0].itemIdx, bi = b[0].itemIdx;
        return ai !== bi ? ai - bi : a[0].qInGroup - b[0].qInGroup;
      });
    }

    var newFresh = [];
    units.forEach(function(unit) { unit.forEach(function(c) { newFresh.push(c); }); });
    state.queues[sid] = repeats.concat(newFresh);
  });
}

// -- SCORE ---------------------------------------------------------------------
function updateScore() {
  document.getElementById('sc-total').textContent     = state.totalAttempted;
  document.getElementById('sc-correct').textContent   = state.totalCorrect;
  document.getElementById('sc-wrong').textContent     = state.totalWrong;
  document.getElementById('sc-skip').textContent      = state.totalSkipped;
  document.getElementById('sc-recovered').textContent = state.totalRecovered;
  var pctBase = state.totalCorrect + state.totalWrong;
  document.getElementById('sc-pct').textContent = pctBase > 0
    ? Math.round((state.totalCorrect / pctBase) * 100) + '%' : '-';
}

// -- DIAGNOSTICS ---------------------------------------------------------------
function showDiagnostics() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('diagnostics-panel').className = 'diagnostics show';

  var pctBase = state.totalCorrect + state.totalWrong;
  var pct = pctBase > 0 ? Math.round((state.totalCorrect / pctBase) * 100) : 0;
  var scoreClass = pct >= 70 ? 'good' : pct >= 50 ? 'ok' : 'needs';
  var scoreMsg   = pct >= 70 ? 'Strong performance' : pct >= 50 ? 'Room to improve' : 'Needs more practice';
  var recovNote  = state.totalRecovered > 0 ? ', ' + state.totalRecovered + ' recovered after retry' : '';

  document.getElementById('diag-summary').innerHTML =
    '<div class="big-score ' + scoreClass + '">' + (pctBase > 0 ? pct + '%' : '-') + '</div>' +
    '<div style="font-size:12px;color:#9b9a97;margin-top:2px">First-attempt correct only (excludes recovered)</div>' +
    '<div style="font-size:13px;color:#6b6b6b;margin-top:6px">' + scoreMsg + ' - ' +
    state.totalCorrect + ' correct, ' + state.totalWrong + ' wrong, ' +
    state.totalSkipped + ' skipped' + recovNote + ' out of ' + state.totalAttempted + ' attempted</div>';

  var breakdown = document.getElementById('diag-breakdown');
  breakdown.innerHTML = '';

  SECTION_IDS.forEach(function(sid) {
    var sec   = SECTIONS[sid];
    var items = sec.items;
    var subs  = {};

    items.forEach(function(item, itemIdx) {
      var qs = item.type === 'group' ? item.questions : [item];
      qs.forEach(function(q, qi) {
        var sub = item.sub;
        if (!subs[sub]) subs[sub] = { correct: 0, wrong: 0, skipped: 0, recovered: 0, total: 0 };
        subs[sub].total++;
        var r = state.results[rKey(sid, itemIdx, qi)];
        if (r) {
          if (r.skipped)                   subs[sub].skipped++;
          else if (r.correct && !r.wasRepeat) subs[sub].correct++;
          else if (r.correct && r.wasRepeat)  subs[sub].recovered++;
          else                             subs[sub].wrong++;
        }
      });
    });

    var secDiv  = document.createElement('div');
    secDiv.className = 'diag-section';
    var secName = document.createElement('div');
    secName.className = 'diag-section-name';
    secName.textContent = sec.label;
    secDiv.appendChild(secName);

    Object.keys(subs).forEach(function(subName) {
      var s = subs[subName];
      var att    = s.correct + s.wrong;
      var subPct = att > 0 ? Math.round((s.correct / att) * 100) : null;
      var barColor = subPct === null ? '#e3e2e0' : subPct >= 70 ? '#52c41a' : subPct >= 50 ? '#faad14' : '#f5222d';
      var tagClass = subPct === null ? 'tag-unanswered' : subPct >= 70 ? 'tag-strong' : subPct >= 50 ? 'tag-ok' : 'tag-weak';
      var tagText  = subPct === null ? 'Not attempted'  : subPct >= 70 ? 'Strong'     : subPct >= 50 ? 'Review'  : 'Weak';
      var recStr   = s.recovered > 0 ? ' <span style="font-size:11px;color:#b36b00;font-weight:600">+' + s.recovered + ' recovered</span>' : '';
      var row = document.createElement('div');
      row.className = 'diag-row';
      row.innerHTML =
        '<div class="diag-row-label">' + subName + recStr + '</div>' +
        '<div class="diag-bar-track"><div class="diag-bar-fill" style="width:' + (subPct || 0) + '%;background:' + barColor + '"></div></div>' +
        '<div class="diag-pct" style="color:' + barColor + '">' + (subPct !== null ? subPct + '%' : '-') + '</div>' +
        '<div class="diag-tag ' + tagClass + '">' + tagText + '</div>';
      secDiv.appendChild(row);
    });

    breakdown.appendChild(secDiv);
  });
}

// -- RETURN TO QUIZ ------------------------------------------------------------
function returnToQuiz() {
  document.getElementById('diagnostics-panel').className = 'diagnostics';
  document.getElementById('quiz-area').style.display = 'block';
}

// -- RESTART -------------------------------------------------------------------
function restartQuiz() {
  fullReset();
  setShuffle(false);
  setNoRepeat(false);

  document.getElementById('diagnostics-panel').className = 'diagnostics';
  document.getElementById('quiz-area').style.display = 'block';

  document.getElementById('q-card').innerHTML =
    '<div id="q-passage-wrap" style="display:none">' +
      '<div class="passage-counter" id="q-passage-counter"></div>' +
      '<div class="passage-box" id="q-passage-box"></div>' +
    '</div>' +
    '<div class="section-label" id="q-section-label"></div>' +
    '<div class="subsection-label" id="q-subsection-label"></div>' +
    '<div class="question" id="q-text"></div>' +
    '<div class="options" id="q-options"></div>' +
    '<div class="explanation" id="q-explanation">' +
      '<div class="verdict" id="q-verdict"></div>' +
      '<div id="q-exp-text"></div>' +
    '</div>' +
    '<div class="btn-row">' +
      '<button class="btn primary" id="submit-btn" onclick="submitAnswer()" disabled>Check Answer</button>' +
      '<button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>' +
      '<button class="btn" id="skip-btn" onclick="skipQuestion()">Skip</button>' +
    '</div>';

  state.section = 'jk';
  SECTION_IDS.forEach(function(s) {
    document.getElementById('tab-' + s).classList.toggle('active', s === 'jk');
  });
  updateTabBadges();
  loadNext();
}

// -- NEXT ----------------------------------------------------------------------
function nextQuestion() { loadNext(); }

// -- INIT ----------------------------------------------------------------------
fullReset();
showSection('jk');


</script>
