      ,{type:'standalone',sub:"World Geography",q:"Which of the following African countries is located entirely in the Northern Hemisphere?",opts:{A:"Kenya",B:"Tanzania",C:"Zambia",D:"Zimbabwe"},correct:"A",exp:"Kenya straddles the equator but the majority of its territory and its capital Nairobi are in the Northern Hemisphere. Tanzania, Zambia, and Zimbabwe are all located entirely in the Southern Hemisphere. Distinguishing which African countries cross the equator is a common geography question."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"The concept of 'checks and balances' in the U.S. Constitution primarily serves to:",opts:{A:"Ensure that all branches receive equal funding from Congress",B:"Prevent any single branch of government from accumulating unchecked power",C:"Guarantee that all legislation passes by a two-thirds majority",D:"Require that all government agencies be audited annually"},correct:"B",exp:"Checks and balances is the system by which each branch of government has specific powers to limit and oversee the others - Congress can override presidential vetoes, the President can veto legislation, and the courts can strike down unconstitutional actions by either branch. The goal is to prevent concentration of power in any single institution."}
      ,{type:'standalone',sub:"U.S. History",q:"The 'Trail of Tears' (1838-1839) refers to:",opts:{A:"The westward migration route used by settlers along the Oregon Trail",B:"The forced relocation of the Cherokee Nation and other tribes from their homelands in the Southeast to territory west of the Mississippi",C:"The march of Union soldiers through the South during the Civil War",D:"The migration of Dust Bowl refugees from Oklahoma to California in the 1930s"},correct:"B",exp:"The Trail of Tears was the forced relocation of approximately 60,000-100,000 Native Americans from their ancestral homelands in the southeastern United States to designated 'Indian Territory' in present-day Oklahoma. The Cherokee removal under President Van Buren is most widely associated with the name. Approximately 4,000-15,000 Cherokee died during the journey."}
      ,{type:'standalone',sub:"International Organizations",q:"The Association of Southeast Asian Nations (ASEAN) was founded in 1967 primarily to:",opts:{A:"Create a military alliance against Chinese expansion in the region",B:"Promote economic growth, social progress, and regional stability among Southeast Asian nations",C:"Establish a common currency for Southeast Asian countries",D:"Provide a forum for resolving territorial disputes through binding arbitration"},correct:"B",exp:"ASEAN was founded in 1967 by Indonesia, Malaysia, Philippines, Singapore, and Thailand to promote regional cooperation, economic growth, and stability. It now has ten members and operates on the principle of non-interference in members' internal affairs. It is not a military alliance and does not have binding dispute resolution authority."}
      ,{type:'standalone',sub:"Economics",q:"What does 'elasticity of demand' measure?",opts:{A:"The speed at which prices adjust to changes in supply",B:"How responsive the quantity demanded of a good is to changes in its price",C:"The relationship between a country's interest rates and its demand for imports",D:"How quickly consumer preferences change over time"},correct:"B",exp:"Price elasticity of demand measures the percentage change in quantity demanded divided by the percentage change in price. Elastic demand (elasticity > 1) means consumers are responsive to price changes; inelastic demand (elasticity < 1) means they are less responsive. Necessities tend to be inelastic; luxury goods tend to be elastic."}
      ,{type:'standalone',sub:"World Geography",q:"The Ganges River is sacred to Hinduism and flows through which countries?",opts:{A:"India only",B:"India and Bangladesh",C:"India, Nepal, and Bangladesh",D:"India, Pakistan, and Bangladesh"},correct:"B",exp:"The Ganges originates in the Himalayas in India and flows eastward through the Indo-Gangetic Plain before emptying into the Bay of Bengal through a delta shared with Bangladesh. Nepal is the source of some of the Ganges's tributaries but the main river flows through India and Bangladesh. Pakistan's major rivers are the Indus system."}
      ,{type:'standalone',sub:"U.S. History",q:"The significance of the Supreme Court case Brown v. Board of Education (1954) was that it:",opts:{A:"Established affirmative action requirements for federal contractors",B:"Ruled that racially segregated public schools were inherently unequal and unconstitutional, overturning Plessy v. Ferguson",C:"Guaranteed voting rights for African Americans in Southern states",D:"Ruled that poll taxes were unconstitutional in federal elections"},correct:"B",exp:"Brown v. Board of Education unanimously overturned the 'separate but equal' doctrine established in Plessy v. Ferguson (1896), ruling that racial segregation in public schools was inherently unequal and violated the Equal Protection Clause of the 14th Amendment. Chief Justice Earl Warren wrote the opinion. It was a landmark in the civil rights movement."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"What is the primary constitutional basis for Congress's power to regulate the economy?",opts:{A:"The Necessary and Proper Clause",B:"The Commerce Clause, which grants Congress the power to regulate commerce among the states",C:"The Spending Clause, which allows Congress to attach conditions to federal funds",D:"The General Welfare Clause"},correct:"B",exp:"The Commerce Clause (Article I, Section 8) grants Congress the power to 'regulate Commerce...among the several States.' Supreme Court interpretations of this clause - broadly construed since the New Deal era - are the primary constitutional basis for most federal economic regulation. The Necessary and Proper Clause extends congressional power to implement its enumerated powers."}
      ,{type:'standalone',sub:"International Relations",q:"The term 'non-state actor' in international relations refers to:",opts:{A:"Countries that have not joined the United Nations",B:"Individuals, organizations, and entities that participate in world affairs without being sovereign states",C:"International organizations that operate independently of member state control",D:"Countries that have renounced the use of military force"},correct:"B",exp:"Non-state actors include multinational corporations, NGOs, terrorist organizations, transnational criminal networks, international institutions, and religious movements. They have become increasingly important in IR as globalization has expanded their reach and influence. Some non-state actors (like ISIS at its peak) have challenged state authority within territories."}
      ,{type:'standalone',sub:"Economics",q:"What is the primary function of 'interest rates' in an economy?",opts:{A:"To determine the exchange rate between different currencies",B:"To allocate credit - the price borrowers pay for funds and the return lenders receive",C:"To control the rate of inflation directly",D:"To measure the rate of economic growth over time"},correct:"B",exp:"Interest rates serve as the price of credit - the cost of borrowing for consumers, businesses, and governments, and the return to savers. By influencing the cost of borrowing, interest rates affect investment, consumption, and savings decisions. Central banks adjust short-term interest rates as their primary tool for influencing economic conditions."}
      ,{type:'standalone',sub:"World Geography",q:"Which ocean is the world's smallest by surface area?",opts:{A:"Indian Ocean",B:"Southern Ocean",C:"Arctic Ocean",D:"Atlantic Ocean"},correct:"C",exp:"The Arctic Ocean is the world's smallest ocean, covering approximately 14.05 million square kilometers - much smaller than the Atlantic (106 million sq km), Indian (70 million sq km), or Southern Ocean (21 million sq km). The Southern Ocean was formally recognized by the International Hydrographic Organization in 2000 and surrounds Antarctica."}
      ,{type:'standalone',sub:"U.S. History",q:"The Nullification Crisis of 1832-1833 pitted President Andrew Jackson against South Carolina over:",opts:{A:"The Second Bank of the United States and its constitutionality",B:"South Carolina's claim that states could declare federal tariffs null and void within their borders",C:"The extension of slavery into western territories gained from Mexico",D:"South Carolina's refusal to implement the Missouri Compromise"},correct:"B",exp:"South Carolina declared the federal Tariffs of 1828 and 1832 null and void within its borders, asserting states' right to nullify federal laws. Jackson rejected nullification as unconstitutional and threatened military force. A compromise tariff resolved the immediate crisis, but the underlying debate about states' rights versus federal supremacy persisted until the Civil War."}
      ,{type:'standalone',sub:"International Organizations",q:"The International Labour Organization (ILO) is notable in international organizations because:",opts:{A:"It is the only UN agency with the authority to impose binding sanctions on member states",B:"It has a tripartite structure where governments, employers, and workers all have representation and voting rights",C:"It is the only international organization that predates the United Nations and has retained its independence",D:"It operates exclusively in developing countries to improve labor standards"},correct:"B",exp:"The ILO (founded 1919, now a UN specialized agency) is unique for its tripartite governance structure - each member state delegation includes government representatives, employer organizations, and worker organizations, each with voting rights. This gives workers and employers a direct institutional voice in global labor standard-setting. The ILO predates the UN but is now a UN specialized agency."}
      ,{type:'standalone',sub:"Economics",q:"The 'law of diminishing returns' states that:",opts:{A:"As a product becomes more popular, its price tends to fall over time",B:"Adding more of one input to a fixed amount of other inputs eventually yields smaller and smaller increases in output",C:"Countries that trade more have lower economic growth rates over time",D:"Government spending eventually crowds out private investment"},correct:"B",exp:"The law of diminishing marginal returns holds that adding successive units of a variable input (like labor) to fixed inputs (like land or capital) eventually produces progressively smaller increases in output. After a point, additional workers in a factory actually get in each other's way. This principle underlies much of production theory and agricultural economics."}
      ,{type:'standalone',sub:"World Geography",q:"The Nile River flows northward through which countries before emptying into the Mediterranean Sea?",opts:{A:"Sudan, Ethiopia, and Egypt",B:"Uganda, Sudan, and Egypt",C:"Kenya, Sudan, and Egypt",D:"Tanzania, Ethiopia, and Egypt"},correct:"B",exp:"The Nile has two major tributaries: the White Nile (originating at Lake Victoria in Uganda/Tanzania) and the Blue Nile (originating at Lake Tana in Ethiopia). They meet at Khartoum, Sudan, and the combined Nile flows northward through Sudan and Egypt before emptying into the Mediterranean. Ethiopia is the source of the Blue Nile but the White Nile flows from Uganda."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"What is the role of the Office of the United States Trade Representative (USTR)?",opts:{A:"To negotiate and enforce U.S. trade agreements and represent the U.S. in international trade bodies such as the WTO",B:"To collect tariffs on imported goods and distribute revenues to the Treasury",C:"To regulate foreign direct investment in the United States",D:"To provide export financing and insurance to American businesses operating abroad"},correct:"A",exp:"The USTR is a cabinet-level office within the Executive Office of the President responsible for developing and coordinating U.S. international trade policy and representing the U.S. in trade negotiations and at the WTO. The Treasury/Customs collect tariffs; CFIUS reviews foreign investment; the Export-Import Bank handles export financing."}
      ,{type:'standalone',sub:"U.S. History",q:"The 'square deal' program of President Theodore Roosevelt focused primarily on:",opts:{A:"Foreign policy and building American naval power",B:"Consumer protection, conservation of natural resources, and control of corporations",C:"Civil rights for African Americans and immigrants",D:"Expanding the federal government's role in education"},correct:"B",exp:"Roosevelt's Square Deal focused on three broad areas: conservation of natural resources (establishing national parks and forests), control of corporations through trust-busting and regulation, and consumer protection (Pure Food and Drug Act, Meat Inspection Act). It was an early articulation of Progressive Era reform principles."}
      ,{type:'standalone',sub:"International Relations",q:"'Economic sanctions' as a foreign policy tool primarily work by:",opts:{A:"Seizing foreign assets held in U.S. banks to compensate victims of state-sponsored actions",B:"Restricting trade, investment, and financial transactions to pressure a government to change its behavior",C:"Imposing tariffs on a country's exports to reduce its trade surplus with the United States",D:"Withdrawing diplomatic recognition to signal disapproval of a government's actions"},correct:"B",exp:"Sanctions restrict economic activity - banning trade in specific goods, freezing assets, prohibiting financial transactions - to impose costs on a target government and create incentives to change behavior. They range from targeted 'smart sanctions' against specific individuals to comprehensive embargoes. Their effectiveness is debated; they are most effective when multilateral and when the target is economically dependent on the sanctioning country."}
      ,{type:'standalone',sub:"Economics",q:"What does 'crowding out' mean in macroeconomics?",opts:{A:"The tendency for monopolies to drive smaller firms out of competitive markets",B:"The reduction in private investment caused by government borrowing that raises interest rates",C:"The displacement of domestic industries by cheaper foreign imports",D:"The process by which inflation reduces the real value of savings"},correct:"B",exp:"Crowding out occurs when increased government borrowing raises interest rates, which reduces private investment. If the government borrows heavily in capital markets, it competes with businesses for funds, driving up the price of credit. Critics of fiscal stimulus argue crowding out partially or fully offsets the stimulus effect. The magnitude of crowding out is debated among economists."}
      ,{type:'standalone',sub:"World Geography",q:"The Sahara Desert covers approximately what percentage of Africa's land area?",opts:{A:"About 10 percent",B:"About 20 percent",C:"About 25 percent",D:"About 35 percent"},correct:"C",exp:"The Sahara is the world's largest hot desert, covering approximately 9.2 million square kilometers - roughly 25 to 30 percent of Africa's total land area of about 30 million square kilometers. It stretches across North Africa from the Atlantic coast to the Red Sea. Despite its size, only about 2 million people live in the Sahara."}
      ,{type:'standalone',sub:"U.S. History",q:"The Eisenhower Doctrine (1957) extended U.S. Cold War commitments by pledging:",opts:{A:"To defend Taiwan against mainland Chinese military attack",B:"Military and economic assistance to Middle Eastern countries threatened by communism",C:"NATO-like mutual defense obligations to Japan and South Korea",D:"U.S. nuclear deterrence against Soviet attack on any Western European ally"},correct:"B",exp:"The Eisenhower Doctrine committed the U.S. to provide military and economic assistance to Middle Eastern nations requesting help against international communism. It was a response to the 1956 Suez Crisis and growing Soviet influence in the region. The doctrine was invoked during the Lebanon crisis of 1958 when U.S. Marines were deployed."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"What is the primary purpose of the U.S. Export-Import Bank?",opts:{A:"To manage U.S. foreign currency reserves and currency interventions",B:"To provide financing, guarantees, and insurance to support American exports when private financing is unavailable",C:"To collect and analyze trade statistics for the Department of Commerce",D:"To negotiate trade agreements with foreign countries on behalf of the President"},correct:"B",exp:"The Export-Import Bank (Ex-Im) provides loans, loan guarantees, and export credit insurance to help American businesses compete for foreign sales when private financing is unavailable or insufficient. It is particularly important for large capital goods exports to emerging markets. Critics argue it primarily benefits large corporations; supporters say it protects American jobs and competitiveness."}
      ,{type:'standalone',sub:"International Relations",q:"The 'Bretton Woods institutions' refer to which pair of international organizations?",opts:{A:"The World Trade Organization and the Bank for International Settlements",B:"The International Monetary Fund and the World Bank",C:"The United Nations Development Programme and the World Food Programme",D:"The Asian Development Bank and the African Development Bank"},correct:"B",exp:"The IMF and World Bank were both created at the Bretton Woods Conference (1944). The IMF manages exchange rate stability and provides short-term balance-of-payments financing; the World Bank provides long-term development loans. Together they form the core of the international financial architecture. The WTO was not created at Bretton Woods; the BIS predates it."}
      ,{type:'standalone',sub:"Economics",q:"'Fiat currency' differs from commodity-backed currency in that:",opts:{A:"Fiat currency can only be issued by central banks, not commercial banks",B:"Fiat currency derives its value from government decree and public trust rather than backing by a physical commodity like gold",C:"Fiat currency is digital while commodity-backed currency is always physical",D:"Fiat currency has fixed supply while commodity-backed currency can expand freely"},correct:"B",exp:"Fiat money (from Latin 'let it be done') has value because the government declares it legal tender and people trust and accept it - not because it can be exchanged for a fixed quantity of gold or silver. All major modern currencies are fiat currencies. Commodity-backed currencies (like the gold standard) derive value from the backing commodity's market value."}
      ,{type:'standalone',sub:"World Geography",q:"Which of the following countries does NOT border the Caspian Sea?",opts:{A:"Kazakhstan",B:"Turkmenistan",C:"Georgia",D:"Azerbaijan"},correct:"C",exp:"The Caspian Sea is bordered by five countries: Russia (north), Kazakhstan (northeast), Turkmenistan (east), Iran (south), and Azerbaijan (west). Georgia borders the Black Sea, not the Caspian. The Caspian is the world's largest landlocked body of water, debated as a lake or sea, with significant oil and gas reserves."}
      ,{type:'standalone',sub:"U.S. History",q:"The Sherman Antitrust Act of 1890 was primarily designed to:",opts:{A:"Protect American industries from foreign competition through tariffs",B:"Prohibit monopolies and business practices that restrained interstate trade and competition",C:"Regulate railroad rates charged to farmers and small businesses",D:"Establish the Federal Trade Commission to oversee business practices"},correct:"B",exp:"The Sherman Antitrust Act prohibited 'every contract, combination, or conspiracy in restraint of trade' and made it illegal to monopolize or attempt to monopolize any part of interstate commerce. It was the first major federal antitrust law. The Interstate Commerce Act regulated railroads; the FTC was created by the Federal Trade Commission Act of 1914."}
      ,{type:'standalone',sub:"U.S. History",q:"The Homestead Act of 1862 was significant because it:",opts:{A:"Abolished sharecropping in the post-Civil War South",B:"Granted 160 acres of public land to settlers who agreed to farm it for five years",C:"Provided compensation to Native American tribes for land taken during westward expansion",D:"Established the first national park system"},correct:"B",exp:"The Homestead Act granted 160 acres of federal land to any adult citizen who paid a small filing fee and agreed to live on and cultivate the land for five years. It accelerated westward migration and settlement of the Great Plains."}
      ,{type:'standalone',sub:"International Relations",q:"What is the primary purpose of the United Nations Security Council?",opts:{A:"To set the UN's annual budget and allocate funds to specialized agencies",B:"To maintain international peace and security, with authority to authorize military action and impose binding sanctions",C:"To review member states' human rights records and recommend improvements",D:"To coordinate development assistance to low-income countries"},correct:"B",exp:"The Security Council bears primary responsibility for international peace and security. It can authorize military force, impose binding sanctions, and establish peacekeeping operations. Its five permanent members each hold veto power."}
      ,{type:'standalone',sub:"Economics",q:"What is 'gross domestic product' (GDP)?",opts:{A:"The total value of all financial assets held by a country's citizens at home and abroad",B:"The total market value of all goods and services produced within a country's borders in a given period",C:"The total government spending on public goods and services in a given year",D:"The difference between a country's exports and imports"},correct:"B",exp:"GDP measures the total market value of all final goods and services produced within a country's geographic borders during a specific period. It includes output by foreign-owned firms in the country but excludes output by domestic firms abroad."}
      ,{type:'standalone',sub:"World Geography",q:"Which of the following mountain ranges forms the border between France and Spain?",opts:{A:"The Alps",B:"The Apennines",C:"The Pyrenees",D:"The Carpathians"},correct:"C",exp:"The Pyrenees run east-west along the border between France and Spain, from the Atlantic Ocean to the Mediterranean Sea. The Alps are in central Europe; the Apennines run through the Italian peninsula; the Carpathians arc through Central and Eastern Europe."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"The Senate's 'advice and consent' role applies to which of the following?",opts:{A:"All federal legislation before it is signed by the President",B:"Presidential nominations to federal courts, cabinet positions, and ambassadorships, and ratification of treaties",C:"Presidential executive orders that affect foreign policy",D:"All regulations issued by executive branch agencies"},correct:"B",exp:"Article II requires Senate advice and consent for the President's nominations to senior positions and for ratification of treaties (requiring a two-thirds majority). The House plays no formal role in nominations or treaties."}
      ,{type:'standalone',sub:"U.S. History",q:"The Great Migration (roughly 1910-1970) refers to:",opts:{A:"The movement of European immigrants to American cities in the early twentieth century",B:"The movement of approximately six million African Americans from the rural South to cities in the North, Midwest, and West",C:"The westward migration of American settlers following the Civil War",D:"The movement of Mexican agricultural workers to California and the Southwest"},correct:"B",exp:"The Great Migration involved approximately six million African Americans leaving the rural South for northern, midwestern, and western cities, driven by racial violence, limited economic opportunity under Jim Crow, and industrial employment opportunities."}
      ,{type:'standalone',sub:"International Organizations",q:"The World Trade Organization (WTO) was established in 1995 to:",opts:{A:"Set global tariff rates that all member countries must apply equally",B:"Provide a framework for international trade rules and a forum for resolving trade disputes among member nations",C:"Manage global currency exchange rates and prevent competitive devaluations",D:"Regulate multinational corporations operating across national borders"},correct:"B",exp:"The WTO replaced GATT and provides the legal and institutional framework for international trade among its 164 members, administering trade agreements and operating a binding dispute settlement system."}
      ,{type:'standalone',sub:"Economics",q:"A 'trade deficit' occurs when:",opts:{A:"A country's government spends more than it collects in taxes",B:"A country imports more goods and services than it exports",C:"A country's currency depreciates faster than its trading partners",D:"A country's workers are less productive than those in competing nations"},correct:"B",exp:"A trade deficit occurs when the value of a country's imports exceeds the value of its exports. It is financed by capital inflows - foreigners investing in the deficit country."}
      ,{type:'standalone',sub:"World Geography",q:"Which of the following bodies of water separates Europe from Africa at its narrowest point?",opts:{A:"The Bosphorus",B:"The Strait of Gibraltar",C:"The Suez Canal",D:"The Dardanelles"},correct:"B",exp:"The Strait of Gibraltar, approximately 14 km wide at its narrowest, separates southern Spain from northern Morocco. The Bosphorus and Dardanelles connect the Black Sea to the Mediterranean within Turkey. The Suez Canal connects the Mediterranean to the Red Sea."}
      ,{type:'standalone',sub:"U.S. History",q:"The term 'Manifest Destiny' (popularized in the 1840s) expressed the belief that:",opts:{A:"The United States had a divine mission to spread democracy to all nations",B:"American westward expansion across North America was both inevitable and divinely ordained",C:"The American republic would inevitably surpass European nations in economic power",D:"Democratic governance would ultimately triumph over all other forms of government"},correct:"B",exp:"Manifest Destiny was the widely held nineteenth-century belief that the U.S. was destined to expand westward across North America. It justified territorial acquisitions including Texas annexation, the Mexican-American War, and the Oregon settlement."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"The Inspector General Act of 1978 established Inspectors General primarily to:",opts:{A:"Investigate presidential misconduct and refer findings to Congress",B:"Conduct independent audits and investigations of federal agencies to detect and prevent fraud, waste, and abuse",C:"Review the legality of presidential executive orders and agency regulations",D:"Oversee the federal budget process and ensure spending complies with appropriations law"},correct:"B",exp:"The IG Act created independent Inspectors General within federal agencies to conduct audits, investigations, and inspections to detect fraud, waste, and mismanagement and report findings to agency heads and Congress."}
      ,{type:'standalone',sub:"International Relations",q:"The term 'multilateralism' in foreign policy refers to:",opts:{A:"Using multiple foreign policy tools - diplomacy, sanctions, military - simultaneously",B:"Coordinating policy among three or more states to address shared problems through common rules and institutions",C:"Maintaining alliance relationships with multiple countries in different regions",D:"Pursuing different policies in different regions of the world simultaneously"},correct:"B",exp:"Multilateralism refers to coordinating policies among multiple countries through shared rules, norms, and institutions rather than bilateral arrangements or unilateral action. Examples include the UN, WTO, NATO, and the Paris Agreement."}
      ,{type:'standalone',sub:"Economics",q:"What does the term 'fiscal policy' refer to?",opts:{A:"The central bank's management of interest rates and money supply",B:"Government decisions about taxation and spending to influence the economy",C:"A country's approach to managing its exchange rate",D:"International agreements on trade tariffs and market access"},correct:"B",exp:"Fiscal policy refers to government decisions about taxation and government spending as tools for influencing economic conditions. Monetary policy (interest rates, money supply) is conducted by the central bank."}
      ,{type:'standalone',sub:"World Geography",q:"Which river forms much of the border between the United States and Mexico?",opts:{A:"The Colorado River",B:"The Rio Grande",C:"The Pecos River",D:"The Gila River"},correct:"B",exp:"The Rio Grande forms the international border between Texas and Mexico from El Paso/Ciudad Juarez to the Gulf of Mexico. The western portion of the U.S.-Mexico border is not defined by a river."}
      ,{type:'standalone',sub:"U.S. History",q:"The Gulf of Tonkin Resolution (1964) was significant because it:",opts:{A:"Formally declared war on North Vietnam following a confirmed attack on U.S. forces",B:"Authorized the President to use military force in Southeast Asia without a formal declaration of war, dramatically escalating U.S. involvement in Vietnam",C:"Established the legal framework for the draft during the Vietnam War",D:"Created the War Powers Resolution to limit presidential military authority"},correct:"B",exp:"The Gulf of Tonkin Resolution authorized the President to use conventional military force in Southeast Asia without a formal declaration of war, providing the legal basis for massive U.S. escalation in Vietnam."}
      ,{type:'standalone',sub:"International Organizations",q:"NATO's Article 5 collective defense commitment means that:",opts:{A:"All NATO members must contribute equal military forces to the alliance",B:"An armed attack against one NATO member is considered an attack against all, triggering collective defense",C:"NATO members must declare war on any country that attacks a fellow member",D:"NATO requires unanimous consent of all members before any military action"},correct:"B",exp:"Article 5 is the cornerstone of collective defense: an armed attack against one member is considered an attack against all, obligating members to assist through whatever action they deem necessary. It was invoked for the first and only time after September 11."}
      ,{type:'standalone',sub:"Economics",q:"What is meant by 'monetary policy'?",opts:{A:"Government decisions about taxation and public spending",B:"Central bank management of the money supply and interest rates to achieve macroeconomic objectives",C:"A government's approach to managing its national debt and deficit",D:"International agreements on currency exchange rates"},correct:"B",exp:"Monetary policy is conducted by central banks through control of the money supply and interest rates. The Fed's goals are stable prices and maximum employment - its dual mandate."}
      ,{type:'standalone',sub:"World Geography",q:"The Indian subcontinent is bordered by which three bodies of water?",opts:{A:"The Arabian Sea, the Bay of Bengal, and the Indian Ocean",B:"The Persian Gulf, the Red Sea, and the Indian Ocean",C:"The Arabian Sea, the Caspian Sea, and the Bay of Bengal",D:"The Indian Ocean, the South China Sea, and the Bay of Bengal"},correct:"A",exp:"The Indian subcontinent is bounded by the Arabian Sea to the west, the Bay of Bengal to the east, and the Indian Ocean to the south."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"The concept of 'judicial review' allows federal courts to:",opts:{A:"Review and approve all legislation before it is presented to the President",B:"Declare laws passed by Congress or actions taken by the executive branch unconstitutional",C:"Overrule jury verdicts in federal criminal cases when the evidence warrants",D:"Review and approve all international treaties before they are submitted to the Senate"},correct:"B",exp:"Judicial review - established in Marbury v. Madison (1803) - gives federal courts the power to invalidate laws or executive actions that violate the Constitution."}
      ,{type:'standalone',sub:"U.S. History",q:"The Progressive Era (roughly 1890-1920) was characterized primarily by:",opts:{A:"A retreat from government intervention and a return to laissez-faire principles",B:"Reform movements seeking to address the social and economic problems produced by industrialization through expanded government regulation",C:"A foreign policy of aggressive imperial expansion in Asia and Latin America",D:"A cultural movement celebrating individualism and rejecting collective responsibility"},correct:"B",exp:"The Progressive Era saw reformers push for government action to address industrialization's problems: corruption, monopolies, unsafe food and drugs, child labor, and urban poverty. Major reforms included antitrust legislation, food safety laws, direct election of senators, the income tax, and women's suffrage."}
      ,{type:'standalone',sub:"International Relations",q:"The term 'soft power' was coined by political scientist Joseph Nye to describe:",opts:{A:"Military alliances that deter aggression through the threat of collective force",B:"Economic sanctions designed to change a country's behavior without military confrontation",C:"The ability to shape others' preferences through attraction rather than coercion - using culture, values, and policy legitimacy",D:"Diplomatic negotiations conducted in private to avoid public pressure"},correct:"C",exp:"Joseph Nye coined 'soft power' to describe influence achieved through attraction rather than coercion or payment - through attractive culture, legitimate political values, and credible foreign policies."}
      ,{type:'standalone',sub:"Economics",q:"What is the 'poverty line' in economics?",opts:{A:"The income level below which individuals are ineligible for government transfer payments",B:"The minimum income level deemed necessary to meet basic needs, used to measure the proportion of a population living in poverty",C:"The wage rate set by law as the minimum employers may pay workers",D:"The income level above which individuals no longer qualify for progressive tax deductions"},correct:"B",exp:"The poverty line is a minimum income threshold below which individuals or households are classified as living in poverty. It is used to measure poverty rates and determine eligibility for some programs."}
      ,{type:'standalone',sub:"World Geography",q:"Which of the following countries is landlocked - having no coastline?",opts:{A:"Paraguay",B:"Uruguay",C:"Ecuador",D:"Colombia"},correct:"A",exp:"Paraguay is landlocked, bordered only by Brazil, Argentina, and Bolivia. It is one of two landlocked countries in South America (the other being Bolivia). Uruguay, Ecuador, and Colombia all have coastlines."}
      ,{type:'standalone',sub:"U.S. History",q:"The 19th Amendment to the U.S. Constitution (1920) guaranteed:",opts:{A:"Equal pay for equal work regardless of sex",B:"The right of citizens to vote shall not be denied on account of sex",C:"Equal protection of the laws regardless of sex",D:"The right of women to serve in the federal military"},correct:"B",exp:"The 19th Amendment prohibits denying the right to vote on the basis of sex, effectively granting women's suffrage nationwide. It was the culmination of decades of activism beginning with the Seneca Falls Convention (1848)."}
      ,{type:'standalone',sub:"U.S. Government & Foreign Policy",q:"What is the primary function of the National Security Council (NSC)?",opts:{A:"To command U.S. military forces in overseas operations",B:"To advise and assist the President in coordinating national security and foreign policy across executive departments",C:"To conduct intelligence operations abroad on behalf of the executive branch",D:"To review and approve all covert action programs before they are implemented"},correct:"B",exp:"The NSC, established by the National Security Act of 1947, is the principal forum for national security and foreign policy coordination. Its statutory members include the President, Vice President, Secretary of State, and Secretary of Defense."}
      ,{type:'standalone',sub:"International Relations",q:"The term 'failed state' most accurately describes a state that:",opts:{A:"Has experienced a military coup in the past decade",B:"Has defaulted on its international debt obligations",C:"Is unable to perform basic functions of governance including providing security, basic services, and exercising authority throughout its territory",D:"Has been subjected to international sanctions for human rights violations"},correct:"C",exp:"A failed state is characterized by the breakdown of core government functions: inability to provide security, deliver basic services, maintain a functioning legal system, or exercise effective authority. Military coups, debt defaults, and sanctions alone do not constitute state failure."}
      ,{type:'standalone',sub:"Economics",q:"What is the primary distinction between 'stocks' and 'bonds' as investment instruments?",opts:{A:"Stocks are issued by governments; bonds are issued by corporations",B:"Stocks represent ownership equity in a company; bonds are debt instruments representing a loan to the issuer",C:"Stocks pay fixed returns; bonds pay variable returns depending on company performance",D:"Stocks are traded on exchanges; bonds can only be purchased directly from issuers"},correct:"B",exp:"Stocks represent ownership shares in a company - stockholders are partial owners entitled to dividends and residual value. Bonds are debt instruments where the bondholder lends money to the issuer who promises to pay interest and repay principal at maturity."}
      ,{type:'standalone',sub:"World Geography",q:"The island of Borneo is divided among which countries?",opts:{A:"Indonesia and Malaysia only",B:"Indonesia, Malaysia, and Brunei",C:"Indonesia, Malaysia, and the Philippines",D:"Indonesia and the Philippines only"},correct:"B",exp:"Borneo is divided among Indonesia (which controls Kalimantan, the largest portion), Malaysia (which controls Sabah and Sarawak), and Brunei. The Philippines does not control any part of Borneo."}
      ,{type:'standalone',sub:"U.S. History",q:"The Marshall Plan (1948-1952) was significant because it:",opts:{A:"Established the military alliance that would become NATO",B:"Provided approximately $13 billion in U.S. economic aid to rebuild Western European economies after World War II",C:"Created the World Bank and IMF to manage postwar international finance",D:"Established the United Nations as the primary forum for postwar international cooperation"},correct:"B",exp:"The Marshall Plan provided approximately $13 billion in U.S. economic assistance to Western European nations to rebuild war-devastated economies, prevent the spread of communism, and create prosperous trading partners. NATO was established in 1949; the World Bank and IMF were created at Bretton Woods in 1944."}

rom short-term political pressures.",

zation were varied and far-reaching. Labor unions emerged to negotiate collectively for better wages and working conditions. Socialist and communist movements developed theoretical critiques of capitalism and attracted working-class followings across Europe. Parliamentary reformers in Britain secured legislation limiting child labor and regulating factory conditions. The experience of industrialization shaped the political landscape of the late nineteenth and early twentieth centuries, laying the groundwork for the welfare state reforms of the twentieth century.",

t globalization became highly visible in the second decade of the twenty-first century, with the rise of nationalist and populist movements in Europe and North America that explicitly challenged the free trade consensus. The United Kingdom's vote to leave the European Union in 2016 and the election of nationalist governments in several countries reflected, in part, the accumulated grievances of communities that felt economically and culturally displaced by globalization. These developments prompted scholars and policymakers to reconsider whether the gains from globalization had been adequately shared and whether its pace had outrun the political and social institutions needed to manage its consequences.",
