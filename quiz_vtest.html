        expWorst: "Option A omits documented conduct issues from a formal performance review - creating an inaccurate record, denying the employee feedback they need to improve, and potentially creating liability if the conduct issues later lead to a personnel action."
      }
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are preparing to lead a team meeting and realize that a presentation slide contains a quote attributed to a well-known figure that you cannot verify. The quote reinforces an important point in your presentation. What would you do?",opts:{A:"Use the quote as written since it effectively makes your point and is probably accurate",B:"Remove the quote or replace it with a verified source, and note in the meeting that you could not confirm the attribution",C:"Attribute the quote to 'unknown' to avoid misattribution while still using it",D:"Use the quote and tell the team you verified it to avoid any uncertainty"},best:"B",worst:"D",expBest:"Option B is transparent and accurate - removing or noting the unverified attribution protects the presentation's credibility and demonstrates intellectual honesty.",expWorst:"Option D uses a potentially fabricated quote and actively lies about having verified it - a direct integrity violation that could seriously damage your credibility if discovered."}
      ,{type:'standalone',sub:"Resource Management",q:"Your supervisor asks you to sign off on a financial report that you have not had time to review fully due to a competing urgent deadline. Your supervisor says it is 'probably fine.' What would you do?",opts:{A:"Sign the report because your supervisor vouched for it and you trust them",B:"Request a brief extension or ask a colleague to review the specific sections you could not complete, and sign only when you have adequate confidence in the content",C:"Sign the report but add a note that you did not review it fully",D:"Refuse to sign under any circumstances until you have read every line"},best:"B",worst:"A",expBest:"Option B finds a practical path to fulfilling the obligation - getting targeted assistance or a brief extension - without either abandoning your responsibility or blocking progress unnecessarily.",expWorst:"Option A signs a financial document you have not reviewed based solely on a supervisor's informal assurance - bypassing a personal accountability that exists precisely to catch errors the supervisor may not have caught."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A colleague who is also a friend begins coming to you daily with personal problems that are significantly affecting your own productivity. You care about their wellbeing but the situation is becoming unsustainable. What would you do?",opts:{A:"Abruptly stop responding to their messages to force them to seek help elsewhere",B:"Have an honest and compassionate conversation acknowledging your care for them while setting a clear boundary about the time and frequency of work-hour conversations, and encourage them to access employee assistance resources",C:"Continue listening as long as they need it because being a good colleague comes first",D:"Tell your supervisor about the situation so the supervisor can intervene"},best:"B",worst:"A",expBest:"Option B balances genuine care for the colleague with the professional necessity of protecting your own productivity - addressing the situation directly, compassionately, and constructively.",expWorst:"Option A's abrupt silence without explanation is unkind, likely to damage the friendship and working relationship severely, and does nothing to help the colleague find appropriate support."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You discover a significant error in a budget projection that your team submitted to senior leadership yesterday. The error substantially overstates available funding. Leadership has already begun making decisions based on the projection. What would you do?",opts:{A:"Wait to see if leadership notices the error on their own before deciding whether to disclose it",B:"Immediately notify your supervisor and prepare a corrected projection with a clear explanation of the error and its implications for decisions already made",C:"Quietly correct the projection in the next reporting cycle without drawing attention to the prior error",D:"Inform only the colleague who made the error and let them decide how to handle it"},best:"B",worst:"A",expBest:"Option B immediately surfaces the error through proper channels and provides the information leadership needs to reassess decisions made on incorrect data - the only response consistent with accountability and sound governance.",expWorst:"Option A waits passively while leadership continues making decisions on incorrect data - allowing preventable harm to compound and increasing the eventual cost of correction."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are assigned to a new post and learn that local business culture strongly favors building personal relationships before discussing substantive matters. You have a packed agenda of policy issues for your first meeting with a local counterpart. What would you do?",opts:{A:"Proceed directly with your agenda to maximize efficiency - professional counterparts will understand",B:"Invest time at the opening of the meeting in genuine relationship-building conversation, adjust your agenda accordingly, and accept that relationship investment is not wasted time but an investment in future effectiveness",C:"Apologize to the counterpart for the rushed nature of the meeting and explain that your headquarters requires immediate action",D:"Reschedule the meeting until you have had several informal social engagements with the counterpart first"},best:"B",worst:"A",expBest:"Option B adapts to local professional norms rather than imposing your own - a core diplomatic competency. Relationship investment typically increases long-term effectiveness even at some short-term cost to the agenda.",expWorst:"Option A proceeds with your own cultural assumptions over explicit knowledge of local professional norms - likely to damage the relationship from the first meeting and reduce your long-term effectiveness."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are asked to write a recommendation letter for a colleague who is applying for a competitive fellowship. You genuinely like the colleague but believe another candidate in your office is significantly more qualified. What would you do?",opts:{A:"Write the strongest possible letter for your colleague regardless of your honest assessment",B:"Be honest with your colleague that you do not feel you can write the strongest possible letter and offer to help them identify a recommender who can speak more compellingly to their qualifications",C:"Write a lukewarm letter without telling the colleague what you really think",D:"Agree to write the letter and ask the colleague to draft it themselves"},best:"B",worst:"C",expBest:"Option B is honest and helpful - telling the colleague the truth allows them to seek a recommender who can genuinely advocate for them, which serves their actual interests better than a weak letter would.",expWorst:"Option C writes a letter you already know will undermine the colleague's application without telling them - denying them the opportunity to seek a more effective recommender and potentially damaging their application through your inaction."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You are the team lead on a project and one team member consistently dominates discussions, talking over others and dismissing alternative ideas. Other team members have started disengaging. What would you do?",opts:{A:"Say nothing during meetings to avoid confrontation but privately reassure the quieter members",B:"Actively facilitate the meetings to ensure all voices are heard, use structured turn-taking if necessary, and speak privately with the dominant team member about the impact of their behavior",C:"Remove the dominant team member from the project",D:"Let the team resolve the dynamic on their own since interpersonal issues are not your responsibility as team lead"},best:"B",worst:"C",expBest:"Option B uses structured facilitation to address the dynamic in the meeting environment and private coaching to help the team member understand their impact - both proportionate and constructive.",expWorst:"Option C removes a team member for a behavioral issue that has not been addressed directly, coached, or escalated - disproportionate and procedurally improper as a first response."}
      ,{type:'standalone',sub:"Professionalism",q:"You are asked to take on a significant additional responsibility that is outside your current portfolio and for which you lack some relevant expertise. Your supervisor believes you are ready. What would you do?",opts:{A:"Decline because you are not fully qualified and do not want to risk failure",B:"Accept the responsibility, proactively identify the knowledge gaps you need to fill, and develop a plan to build the necessary expertise while performing the role",C:"Accept but do not tell your supervisor about your knowledge gaps to avoid appearing unprepared",D:"Accept only if the scope is narrowed to areas where you already have expertise"},best:"B",worst:"C",expBest:"Option B accepts developmental opportunity while being proactive about managing any competency gaps - the hallmark of a growth-oriented professional who takes informed risk and invests in their own development.",expWorst:"Option C accepts the role while concealing relevant limitations from the supervisor - setting up an information asymmetry that prevents the supervisor from providing appropriate support or adjusting expectations."}
      ,{type:'standalone',sub:"Information Management",q:"A journalist contacts you directly asking for comment on an internal agency matter that has not been cleared for public discussion. They indicate they are planning to publish a story soon and say your comment would help ensure accuracy. What would you do?",opts:{A:"Provide the information the journalist needs because ensuring accuracy in the press serves the public interest",B:"Tell the journalist you are not authorized to comment on the matter and refer them to the agency's public affairs office, then immediately notify your supervisor and public affairs of the contact",C:"Decline to comment and hang up without notifying anyone",D:"Tell the journalist informally and off the record to ensure the story is accurate while protecting yourself"},best:"B",worst:"A",expBest:"Option B correctly routes the inquiry through authorized channels, protects the agency from unauthorized disclosure, and ensures the contact is documented - all standard protocol for media inquiries.",expWorst:"Option A provides unauthorized comment on an internal matter to the press - a potential violation of agency policy, disclosure rules, and professional obligations, regardless of the stated goal of ensuring accuracy."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You notice that a colleague has been submitting timesheets claiming hours that do not match the actual hours you have both been working together in the office. The discrepancy appears intentional. What would you do?",opts:{A:"Confront the colleague directly and threaten to report them if they do not self-correct",B:"Report what you have observed to your supervisor or the appropriate oversight authority with specific factual documentation",C:"Say nothing because you cannot be completely certain the discrepancy is intentional",D:"Adjust your own timesheet to match theirs so you are not at a disadvantage"},best:"B",worst:"D",expBest:"Option B reports the observed discrepancy with factual documentation through appropriate channels - the correct response to apparent timesheet fraud, allowing trained investigators to determine intent.",expWorst:"Option D commits fraud yourself to match a colleague's potential fraud - this makes you directly culpable for a serious federal offense and is an egregious ethical failure."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"Your section is facing an unexpected staff emergency and you must choose which of two equally important tasks to delay. Both have external deadlines and stakeholders expecting delivery. What would you do?",opts:{A:"Delay whichever task is more recent since the older deadline takes priority by default",B:"Quickly assess which delay will cause the least harm, communicate proactively with both sets of stakeholders explaining the situation, and request revised timelines where possible",C:"Attempt to do both tasks simultaneously to the best of your ability without notifying either stakeholder",D:"Escalate the decision entirely to your supervisor without attempting any triage yourself"},best:"B",worst:"C",expBest:"Option B makes a reasoned prioritization decision and communicates transparently with stakeholders - giving them the information they need to adjust their plans and demonstrating professional judgment under pressure.",expWorst:"Option C attempts to do both tasks under-resourced without notifying anyone - likely resulting in both being done poorly and stakeholders being surprised by a failure they could have managed if informed."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"During a procurement evaluation, you realize you have a personal connection to one of the bidding companies through a family member who works there - a connection you forgot to disclose initially. What would you do?",opts:{A:"Continue the evaluation since you are confident you can remain impartial given your professional experience",B:"Immediately disclose the connection to the Contracting Officer and ethics official, and recuse yourself from any further participation in the evaluation",C:"Disclose the connection at the end of the process so it is on record but does not disrupt the evaluation",D:"Ask a colleague to take over only the final scoring without explaining why"},best:"B",worst:"A",expBest:"Option B immediately addresses a conflict of interest through the proper channels. Delayed or incomplete disclosure of conflicts undermines procurement integrity and could invalidate the entire process.",expWorst:"Option A proceeds without disclosure on a self-assessment of impartiality - the conflict of interest rules exist precisely because individuals are not reliable judges of their own impartiality. Proceeding without disclosure is a potential federal ethics violation."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You are mentoring a junior colleague who asks for honest feedback on a project that you believe was significantly below standard. The colleague seems proud of their work. What would you do?",opts:{A:"Tell them the work was good to preserve their confidence and morale",B:"Provide honest, specific, and constructive feedback that identifies both strengths and areas for improvement, framing it as investment in their development",C:"Tell them the work was poor without providing specific guidance on how to improve",D:"Avoid giving any direct feedback and redirect them to seek input from others"},best:"B",worst:"A",expBest:"Option B is honest and developmental - identifying specific issues while framing them constructively ensures the colleague has the information they need to improve, which is the fundamental purpose of mentorship.",expWorst:"Option A gives false positive feedback to protect short-term feelings at the expense of the colleague's actual development - a dereliction of the mentoring relationship that leaves them unprepared for future scrutiny."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are assigned to a post where the local professional culture expects senior officials to be addressed with formal titles at all times. A newly arrived American colleague addresses local counterparts by first name in a meeting, causing visible discomfort. What would you do?",opts:{A:"Correct the colleague publicly in the meeting to prevent further offense",B:"Smooth over the moment in the meeting and speak privately with the colleague afterward about local professional norms",C:"Say nothing because it is the colleague's responsibility to learn local customs",D:"Send an email to the whole team after the meeting reminding everyone of proper address protocols"},best:"B",worst:"A",expBest:"Option B manages the immediate situation diplomatically without publicly embarrassing the new colleague, then provides the necessary coaching privately - the approach most likely to achieve behavioral change and preserve relationships.",expWorst:"Option A publicly corrects the colleague in front of local counterparts - this compounds the awkwardness, embarrasses the colleague unnecessarily, and is likely more disruptive to the meeting than the original error."}
      ,{type:'standalone',sub:"Resource Management",q:"You are a supervisor and discover that a team member has been using agency equipment and supplies for personal projects during work hours without authorization. The equipment value involved is relatively small. What would you do?",opts:{A:"Ignore it because the value is small and addressing it will create unnecessary conflict",B:"Address it directly with the employee, document the conversation, and clearly establish that personal use of government resources is prohibited regardless of value",C:"Immediately terminate the employee without any prior conversation",D:"Tell the employee informally to stop without documenting anything"},best:"B",worst:"C",expBest:"Option B addresses the violation proportionately - a direct supervisory conversation with documentation establishes the expectation and creates a record, which is appropriate for a first offense of modest scope.",expWorst:"Option C immediately terminates an employee for a relatively minor first offense without any prior corrective action - disproportionate, procedurally improper, and likely unsustainable through the appeals process."}
      ,{type:'standalone',sub:"Professionalism",q:"You are leading a sensitive negotiation and the other party's representative makes an extreme and unreasonable opening proposal that you believe is a negotiating tactic. What would you do?",opts:{A:"Reject the proposal angrily and walk out of the negotiation to signal your seriousness",B:"Acknowledge the proposal professionally, express clearly that it does not reflect a workable starting point, and move the conversation toward areas of potential agreement",C:"Accept the proposal to show good faith and hope to negotiate back from it",D:"Counter with an equally extreme proposal to balance the dynamic"},best:"B",worst:"A",expBest:"Option B maintains professional composure, signals clearly that the proposal is unworkable without being dismissive, and keeps the negotiation moving constructively - the standard approach to extreme opening positions.",expWorst:"Option A's angry walkout escalates a normal negotiating tactic into a diplomatic incident, signals emotional rather than strategic decision-making, and may damage the relationship needed for eventual agreement."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You have been asked to lead a cross-agency working group on a topic where you have significant expertise. Several members of the group are more senior than you in rank. What would you do?",opts:{A:"Defer to the most senior members on all substantive decisions to avoid appearing presumptuous",B:"Lead the group effectively using your substantive expertise, maintain appropriate professional respect for seniority, and create space for all members' input while keeping the group focused on its mandate",C:"Establish authority by firmly asserting your expertise and limiting debate to keep the process efficient",D:"Recommend that a more senior person lead the group to avoid awkwardness"},best:"B",worst:"A",expBest:"Option B balances substantive leadership with professional respect - leading from expertise while honoring the collaborative nature of a working group and the experience of more senior members.",expWorst:"Option A abdicates the substantive leadership role you were specifically asked to fill out of deference to rank - undermining the purpose of your appointment and potentially producing a weaker outcome for the group."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are aware that a colleague has been spreading inaccurate information about another colleague's professional performance to others in the office. You have heard this secondhand. What would you do?",opts:{A:"Spread a counter-narrative defending the targeted colleague's actual performance",B:"Speak privately with the spreading colleague about the impact of circulating unverified information, and if the behavior continues, report the pattern to a supervisor",C:"Report the colleague immediately to HR for defamation without speaking to anyone else",D:"Do nothing because you only heard this secondhand and cannot be certain it is accurate"},best:"B",worst:"A",expBest:"Option B addresses the behavior directly and privately, proportionate to what you know while acknowledging the limits of secondhand information - the appropriate first step before escalation.",expWorst:"Option A joins in the office gossip cycle by spreading counter-narratives - contributing to the same destructive dynamic you are trying to counter and worsening the overall environment."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are conducting an important interview when the applicant becomes suddenly and visibly unwell - appearing dizzy and pale. They have traveled a long distance for this appointment. What would you do?",opts:{A:"Continue the interview quickly to finish before their condition worsens",B:"Immediately suspend the interview, ensure the applicant receives any necessary medical attention, and reschedule the appointment once they have recovered",C:"Ask the applicant if they want to continue and proceed if they say yes",D:"Note the medical situation in the file and deny the application on procedural grounds for not completing the interview"},best:"B",worst:"D",expBest:"Option B prioritizes the welfare of a person in clear physical distress - suspending the interview and ensuring they receive care. An interview appointment can be rescheduled; a person's health cannot be retroactively protected.",expWorst:"Option D denies the application for a procedural failure caused by a medical emergency - a callous and unjust outcome that punishes the applicant for becoming ill, with no basis in sound adjudicatory practice."}
      ,{type:'standalone',sub:"Information Management",q:"You receive a request from your counterpart in a partner government for sensitive data that would normally require a formal information-sharing agreement. Your counterpart says the request is urgent and asks you to share the data informally to save time. What would you do?",opts:{A:"Share the data because you trust your counterpart and the urgency is genuine",B:"Explain that the data requires a formal information-sharing agreement, decline to share informally, and work to expedite the proper process given the urgency",C:"Share a portion of the data that seems less sensitive as a compromise",D:"Tell your counterpart you will consider it and delay while hoping the urgency passes"},best:"B",worst:"A",expBest:"Option B maintains the integrity of information-sharing protocols while acknowledging the urgency and working to address it through legitimate means - the correct balance between responsiveness and legal compliance.",expWorst:"Option A shares sensitive data without a required formal agreement based on trust and urgency - bypassing protections that exist precisely for situations where informal assurances seem adequate but formal accountability is needed."}
      ,{type:'standalone',sub:"Professionalism",q:"You are facilitating a training session when a participant asks a question that reveals a significant gap in your own knowledge on the topic. Other participants are watching for your response. What would you do?",opts:{A:"Provide a confident-sounding answer based on what you think is likely correct to maintain your authority",B:"Acknowledge honestly that you do not have a complete answer to that specific question, commit to finding the accurate information, and follow up with the group after the session",C:"Redirect the question to another participant to avoid revealing the gap",D:"Tell the participant the question is outside the scope of the training to deflect it"},best:"B",worst:"A",expBest:"Option B demonstrates intellectual honesty and models the professional behavior of knowing the limits of one's knowledge - far more credible than a confident wrong answer, and more useful to the participants.",expWorst:"Option A provides a fabricated or speculative answer presented as confident fact to maintain appearances - an integrity violation that could propagate incorrect information to all participants in the training."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A team member who previously reported to you receives a promotion and is now your peer. They appear uncomfortable with the changed dynamic and occasionally defer to you in group settings in ways that undermine their own authority. What would you do?",opts:{A:"Accept their deference as a natural adjustment period and allow the dynamic to continue",B:"Speak privately with the former report to acknowledge the changed dynamic, affirm their new peer status, and consciously model the peer relationship in group settings",C:"Speak to your supervisor about the awkward dynamic and ask for their advice",D:"Correct the deference publicly in meetings to reinforce the peer relationship clearly"},best:"B",worst:"A",expBest:"Option B actively supports the new peer's transition by acknowledging the dynamic directly and modeling the changed relationship - helping them establish their authority with the team.",expWorst:"Option A passively allows the former dynamic to persist - denying the new peer the space to establish their authority and potentially undermining their effectiveness in the new role indefinitely."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"Your team has been working under intense pressure for several weeks and morale is clearly suffering. You are not the supervisor but you are senior. What would you do?",opts:{A:"Wait for the supervisor to notice and address the morale issue",B:"Raise the morale issue with the supervisor if they have not acted, and take small, genuine actions within your own capacity - acknowledging effort, facilitating informal connection - to help the team sustain energy",C:"Tell the team to push through since the workload is temporary",D:"Complain about the workload to leadership to force an intervention"},best:"B",worst:"D",expBest:"Option B takes both a direct action (raising the issue with the supervisor) and meaningful human actions within your sphere to support the team - balancing systemic advocacy with immediate support.",expWorst:"Option D complains to leadership in a way framed as pressure rather than as a constructive assessment - creating the impression of disloyalty or insubordination rather than professional advocacy for your team."}
      ,{type:'standalone',sub:"Resource Management",q:"You are allocated funding for a training program that you know your team genuinely needs. However, you also know the agency is facing broader budget pressures and the funds could arguably be returned or redirected. What would you do?",opts:{A:"Return the funds proactively to demonstrate fiscal responsibility",B:"Use the allocated funds for their intended purpose - the training your team needs - and document the rationale and outcomes to demonstrate value",C:"Hold the funds unspent in case a more pressing need arises later in the year",D:"Spend the funds quickly on other items to avoid losing them at year end"},best:"B",worst:"D",expBest:"Option B uses allocated funds for their intended legitimate purpose and documents outcomes - this is proper stewardship. Allocated funds for genuine needs should be used; the documentation demonstrates accountability.",expWorst:"Option D spends allocated funds on items other than the intended purpose to avoid losing them - a misuse of appropriated funds that likely violates fiscal law and is the opposite of responsible stewardship."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are the acting section chief while your supervisor is on extended leave. A junior officer makes a significant error in judgment on a case that has attracted media attention. Your supervisor is reachable but is on leave. What would you do?",opts:{A:"Make all decisions independently to avoid bothering your supervisor during their leave",B:"Assess the severity of the situation and, given the media attention and potential significance, notify your supervisor and seek guidance while beginning to manage the immediate situation using your best judgment",C:"Refer all inquiries to your supervisor's email and take no action until they respond",D:"Issue a public statement immediately to get ahead of the media attention without consulting anyone"},best:"B",worst:"D",expBest:"Option B exercises judgment about the severity of the situation, determines it warrants notifying your supervisor, and manages the immediate situation responsibly while seeking guidance - the appropriate balance of initiative and accountability.",expWorst:"Option D issues a public statement on a sensitive matter without any consultation - potentially committing the agency to positions that have not been vetted, and creating additional problems beyond the original error."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are reviewing invoices and notice that a vendor has consistently rounded up small amounts on each invoice - amounts too small to trigger automatic review but which add up to a significant total over the year. What would you do?",opts:{A:"Approve the invoices because the individual amounts are below the review threshold",B:"Flag the pattern to your supervisor and the appropriate oversight authority, document the cumulative amount, and recommend a review of all invoices from this vendor",C:"Contact the vendor informally and ask them to stop without creating a formal record",D:"Reduce future invoice approvals to offset the overcharges without reporting the discrepancy"},best:"B",worst:"D",expBest:"Option B recognizes that a systematic pattern of small overcharges is potentially fraud regardless of individual amounts, and routes it through proper oversight channels with documentation - the correct response to suspected billing fraud.",expWorst:"Option D takes an unauthorized self-help remedy - adjusting future approvals to compensate - rather than reporting the potential fraud. This allows the underlying misconduct to go uninvestigated and may itself be improper."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"A senior colleague makes a comment in a team meeting that you believe constitutes an inappropriate joke targeting a specific ethnic group. Several junior team members are present. What would you do?",opts:{A:"Laugh along to avoid making the situation awkward for the senior colleague",B:"Decline to laugh, address the comment calmly and professionally in the moment if appropriate, and if needed speak to the senior colleague privately afterward or raise it with a supervisor",C:"Report the senior colleague to HR immediately without saying anything in the moment",D:"Wait until the meeting ends and take a poll of colleagues about whether they found it offensive"},best:"B",worst:"A",expBest:"Option B does not validate the comment and creates space for a professional response proportionate to the situation - in-the-moment or afterward - while modeling the conduct standards expected of all team members regardless of the speaker's seniority.",expWorst:"Option A actively participates in validating an inappropriate comment to avoid social discomfort - signaling to junior team members that such comments are acceptable and contributing to the environment the comment created."}
      ,{type:'standalone',sub:"Professionalism",q:"You receive a task from a senior official that you believe is based on a misunderstanding of the facts - the official appears to have incorrect information about the situation they are asking you to address. What would you do?",opts:{A:"Complete the task as assigned without mentioning the factual discrepancy to avoid appearing to challenge senior leadership",B:"Respectfully and promptly clarify the factual situation with the senior official before proceeding, so the task can be reframed if necessary",C:"Complete the task and send a separate memo correcting the factual record after the fact",D:"Ask a colleague to deliver the task so you are not associated with an approach you believe is based on incorrect information"},best:"B",worst:"A",expBest:"Option B proactively provides accurate information to the senior official before effort is wasted on a misdirected task - a professional obligation and a service to the official, not a challenge to their authority.",expWorst:"Option A completes a task you know is based on incorrect information without saying anything - allowing resources to be spent on a potentially wrong-footed effort and withholding accurate information from a decision-maker who needs it."}
    ]
  }
};

var SECTION_IDS = ['jk', 'ee', 'lr', 'cr', 'sj'];

// -- RESULT KEY ----------------------------------------------------------------
// sid:itemIdx:qInGroup  (qInGroup always 0 for standalones)
function rKey(sid, itemIdx, qInGroup) {
  return sid + ':' + itemIdx + ':' + (qInGroup || 0);
}

// -- TOTAL QUESTION COUNT per section (for progress bar) -----------------------
function totalQs(sid) {
  var n = 0;
  SECTIONS[sid].items.forEach(function(item) {
    if (item.type === 'group') n += item.questions.length;
    else n++;
  });
  return n;
}

function answeredQs(sid) {
  var n = 0;
  var items = SECTIONS[sid].items;
  items.forEach(function(item, itemIdx) {
    if (item.type === 'group') {
      item.questions.forEach(function(_, qi) {
        var r = state.results[rKey(sid, itemIdx, qi)];
        if (r && !r.skipped) n++;
      });
    } else {
      var r = state.results[rKey(sid, itemIdx, 0)];
      if (r && !r.skipped) n++;
    }
  });
  return n;
}

// -- STATE ---------------------------------------------------------------------
var state = {
  section:  'jk',
  queues:   { jk: [], ee: [], lr: [] },
  results:  {},           // keyed by rKey()
  suspended:{ jk: null, ee: null, lr: null },
  current:  null,         // queue entry currently being shown
  selected: null,
  submitted:false,
  shuffled: false,
  noRepeat: false,
  sjSelected: { best: null, worst: null },
  totalAttempted:  0,
  totalCorrect:    0,
  totalWrong:      0,
  totalSkipped:    0,
  totalRecovered:  0
};

// -- QUEUE BUILDER -------------------------------------------------------------
// Builds a flat queue of individual question cards.
// Groups are kept as a contiguous block; shuffle moves the block as a unit.

function buildQueue(sid, doShuffle) {
  var items = SECTIONS[sid].items;

  // Build "units" - each unit is either a single standalone card or
  // an ordered array of group cards. Shuffle happens at unit level.
  var units = [];
  items.forEach(function(item, itemIdx) {
    if (item.type === 'group') {
      var groupCards = item.questions.map(function(q, qi) {
        return {
          type:      'group',
          sid:       sid,
          itemIdx:   itemIdx,
          qInGroup:  qi,
          groupSize: item.questions.length,
          gid:       item.gid,
          isRepeat:  false
        };
      });
      units.push(groupCards); // array = one shuffleable unit
    } else {
      units.push([{
        type:     'standalone',
        sid:      sid,
        itemIdx:  itemIdx,
        qInGroup: 0,
        isRepeat: false
      }]);
    }
  });

  if (doShuffle) {
    for (var j = units.length - 1; j > 0; j--) {
      var k = Math.floor(Math.random() * (j + 1));
      var tmp = units[j]; units[j] = units[k]; units[k] = tmp;
    }
  }

  // Flatten units into a single queue array
  var queue = [];
  units.forEach(function(unit) { unit.forEach(function(card) { queue.push(card); }); });
  state.queues[sid] = queue;
}


// -- SITUATIONAL JUDGMENT RENDERER --------------------------------------------
function renderSJQuestion(q, item) {
  state.sjSelected = { best: null, worst: null };

  // Clear standard elements
  document.getElementById('q-options').innerHTML = '';
  document.getElementById('q-explanation').className = 'explanation';
  document.getElementById('q-exp-text').textContent = '';
  document.getElementById('q-verdict').textContent = '';

  // Build SJ UI inside q-options div
  var container = document.getElementById('q-options');

  var instr = document.createElement('div');
  instr.className = 'sj-instructions';
  instr.innerHTML = 'Select the <strong style="color:#237804">BEST</strong> response and the <strong style="color:#820014">WORST</strong> response. Both selections are required before you can submit.';
  container.appendChild(instr);

  // Best label
  var bestLabel = document.createElement('div');
  bestLabel.className = 'sj-label sj-best-label';
  bestLabel.textContent = 'Best Response';
  container.appendChild(bestLabel);

  var letters = ['A','B','C','D'];
  letters.forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'sj-option';
    div.id = 'sj-best-' + letter;
    div.onclick = (function(l) { return function() { selectSJBest(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'sj-opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  // Worst label
  var worstLabel = document.createElement('div');
  worstLabel.className = 'sj-label sj-worst-label';
  worstLabel.textContent = 'Worst Response';
  container.appendChild(worstLabel);

  letters.forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'sj-option';
    div.id = 'sj-worst-' + letter;
    div.onclick = (function(l) { return function() { selectSJWorst(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'sj-opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').disabled   = true;
  document.getElementById('skip-btn').disabled   = false;
}

function selectSJBest(letter) {
  if (state.submitted) return;
  state.sjSelected.best = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('sj-best-' + l);
    if (el) { el.classList.remove('selected-best'); }
  });
  var el = document.getElementById('sj-best-' + letter);
  if (el) el.classList.add('selected-best');
  checkSJReady();
}

function selectSJWorst(letter) {
  if (state.submitted) return;
  state.sjSelected.worst = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('sj-worst-' + l);
    if (el) { el.classList.remove('selected-worst'); }
  });
  var el = document.getElementById('sj-worst-' + letter);
  if (el) el.classList.add('selected-worst');
  checkSJReady();
}

function checkSJReady() {
  var ready = state.sjSelected.best !== null && state.sjSelected.worst !== null
    && state.sjSelected.best !== state.sjSelected.worst;
  document.getElementById('submit-btn').disabled = !ready;
}

function submitSJAnswer() {
  var entry = state.current;
  var sid   = entry.sid;
  var item  = SECTIONS[sid].items[entry.itemIdx];
  var q     = item;
  var key   = rKey(sid, entry.itemIdx, 0);

  var selBest  = state.sjSelected.best;
  var selWorst = state.sjSelected.worst;
  var correctBest  = q.best;
  var correctWorst = q.worst;

  var bestCorrect  = selBest  === correctBest;
  var worstCorrect = selWorst === correctWorst;
  var bothCorrect  = bestCorrect && worstCorrect;

  // Lock all options
  ['A','B','C','D'].forEach(function(l) {
    var bEl = document.getElementById('sj-best-' + l);
    var wEl = document.getElementById('sj-worst-' + l);
    if (bEl) { bEl.classList.add('disabled'); bEl.classList.remove('selected-best'); }
    if (wEl) { wEl.classList.add('disabled'); wEl.classList.remove('selected-worst'); }
  });

  // Highlight best row
  ['A','B','C','D'].forEach(function(l) {
    var bEl = document.getElementById('sj-best-' + l);
    if (!bEl) return;
    if (l === correctBest) bEl.classList.add('correct-best');
    else if (l === selBest && !bestCorrect) bEl.classList.add('incorrect');
  });

  // Highlight worst row
  ['A','B','C','D'].forEach(function(l) {
    var wEl = document.getElementById('sj-worst-' + l);
    if (!wEl) return;
    if (l === correctWorst) wEl.classList.add('correct-worst');
    else if (l === selWorst && !worstCorrect) wEl.classList.add('incorrect');
  });

  // Show explanations
  var container = document.getElementById('q-options');

  var scoreNote = document.createElement('div');
  if (bothCorrect) {
    scoreNote.className = 'sj-score-note sj-score-full';
    scoreNote.textContent = 'Full credit - both Best and Worst correctly identified';
  } else if (bestCorrect || worstCorrect) {
    scoreNote.className = 'sj-score-note sj-score-half';
    scoreNote.textContent = 'Partial credit - ' + (bestCorrect ? 'Best' : 'Worst') + ' correctly identified';
  } else {
    scoreNote.className = 'sj-score-note sj-score-none';
    scoreNote.textContent = 'Incorrect - neither Best nor Worst correctly identified';
  }
  container.appendChild(scoreNote);

  var expBest = document.createElement('div');
  expBest.className = 'sj-exp-block show sj-exp-best';
  expBest.innerHTML = '<div class="sj-exp-title">Best Response (' + correctBest + '): ' + (q.opts[correctBest] || '') + '</div>' + q.expBest;
  container.appendChild(expBest);

  var expWorst = document.createElement('div');
  expWorst.className = 'sj-exp-block show sj-exp-worst';
  expWorst.innerHTML = '<div class="sj-exp-title">Worst Response (' + correctWorst + '): ' + (q.opts[correctWorst] || '') + '</div>' + q.expWorst;
  container.appendChild(expWorst);

  // Score tracking - count each SJ question as 2 point opportunities
  if (!state.results[key]) {
    var points = (bestCorrect ? 1 : 0) + (worstCorrect ? 1 : 0);
    state.results[key] = {
      correct: bothCorrect,
      skipped: false,
      wasRepeat: entry.isRepeat,
      sub: item.sub,
      sjPoints: points
    };
    state.totalAttempted++;
    if (bothCorrect) state.totalCorrect++;
    else if (bestCorrect || worstCorrect) state.totalRecovered++; // reuse recovered for partial
    else state.totalWrong++;
  }

  state.submitted = true;
  if (!bothCorrect) requeueWrong(entry);

  updateScore();
  updateProgress();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('skip-btn').disabled   = true;
  document.getElementById('next-btn').disabled   = false;
}

function fullReset() {
  state.results   = {};
  state.suspended = { jk: null, ee: null, lr: null };
  state.current   = null;
  state.selected  = null;
  state.submitted = false;
  state.shuffled  = false;
  state.noRepeat  = false;
  state.sjSelected = { best: null, worst: null };
  state.totalAttempted  = 0;
  state.totalCorrect    = 0;
  state.totalWrong      = 0;
  state.totalSkipped    = 0;
  state.totalRecovered  = 0;
  SECTION_IDS.forEach(function(sid) { buildQueue(sid, false); });
  updateScore();
  updateTabBadges();
}

// -- SECTION SWITCHING ---------------------------------------------------------
function showSection(sid) {
  var diagPanel = document.getElementById('diagnostics-panel');
  if (diagPanel.classList.contains('show')) {
    diagPanel.className = 'diagnostics';
    document.getElementById('quiz-area').style.display = 'block';
  }

  if (sid === state.section && state.current) return;

  if (state.current && !state.submitted) {
    state.queues[state.current.sid].unshift(state.current);
    state.suspended[state.current.sid] = state.current;
    state.current  = null;
    state.selected = null;
    state.submitted = false;
  }

  state.section = sid;
  SECTION_IDS.forEach(function(s) {
    document.getElementById('tab-' + s).classList.toggle('active', s === sid);
  });
  updateTabBadges();
  restoreCardDOM();
  loadNext();
}

// -- RESTORE CARD DOM ----------------------------------------------------------
function restoreCardDOM() {
  if (!document.getElementById('q-passage-wrap')) {
    document.getElementById('q-card').innerHTML =
      '<div id="q-passage-wrap" style="display:none">' +
        '<div class="passage-counter" id="q-passage-counter"></div>' +
        '<div class="passage-box" id="q-passage-box"></div>' +
      '</div>' +
      '<div class="section-label" id="q-section-label"></div>' +
      '<div class="subsection-label" id="q-subsection-label"></div>' +
      '<div class="question" id="q-text"></div>' +
      '<div class="options" id="q-options"></div>' +
      '<div class="explanation" id="q-explanation">' +
        '<div class="verdict" id="q-verdict"></div>' +
        '<div id="q-exp-text"></div>' +
      '</div>' +
      '<div class="btn-row">' +
        '<button class="btn primary" id="submit-btn" onclick="submitAnswer()" disabled>Check Answer</button>' +
        '<button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>' +
        '<button class="btn" id="skip-btn" onclick="skipQuestion()">Skip</button>' +
      '</div>';
  }
}

// -- QUEUE HELPERS -------------------------------------------------------------
function requeueWrong(entry) {
  if (state.noRepeat) return; // no-repeat mode: skip requeueing
  var q = state.queues[entry.sid];
  var insertAt = Math.min(2, q.length);
  var repeatEntry = JSON.parse(JSON.stringify(entry));
  repeatEntry.isRepeat = true;
  q.splice(insertAt, 0, repeatEntry);
  updateTabBadges();
}

function updateTabBadges() {
  SECTION_IDS.forEach(function(sid) {
    var btn = document.getElementById('tab-' + sid);
    var existing = btn.querySelector('.tab-badge');
    var count = state.queues[sid].length;
    if (count > 0) {
      if (!existing) {
        var badge = document.createElement('span');
        badge.className = 'tab-badge';
        btn.appendChild(badge);
        existing = badge;
      }
      existing.textContent = count;
    } else {
      if (existing) existing.remove();
    }
  });
}

function updateProgress() {
  var sid   = state.section;
  var total = totalQs(sid);
  var done  = answeredQs(sid);
  var pct   = total > 0 ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = done + ' / ' + total;
}

// -- LOAD NEXT -----------------------------------------------------------------
function loadNext() {
  var sid   = state.section;
  var queue = state.queues[sid];
  restoreCardDOM();

  if (queue.length === 0) {
    document.getElementById('q-section-label').textContent = SECTIONS[sid].label;
    document.getElementById('q-subsection-label').textContent = '';
    var pw = document.getElementById('q-passage-wrap'); if (pw) pw.style.display = 'none';
    document.getElementById('q-text').textContent = 'All questions in this section are complete! Switch to another section or press Finish Quiz to see your diagnostics.';
    document.getElementById('q-options').innerHTML = '';
    document.getElementById('q-explanation').className = 'explanation';
    document.getElementById('q-exp-text').textContent = '';
    document.getElementById('q-verdict').textContent = '';
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('next-btn').disabled   = true;
    document.getElementById('skip-btn').disabled   = true;
    document.getElementById('queue-note').classList.remove('show');
    document.getElementById('progress-fill').style.width = '100%';
    document.getElementById('progress-label').textContent = 'Complete';
    state.current = null;
    return;
  }

  var entry = queue.shift();
  updateTabBadges();
  state.suspended[sid] = null;
  state.current   = entry;
  state.selected  = null;
  state.submitted = false;

  var sec  = SECTIONS[sid];
  var item = sec.items[entry.itemIdx];

  // Determine the question object
  var q = entry.type === 'group'
    ? item.questions[entry.qInGroup]
    : item;

  document.getElementById('queue-note').classList.toggle('show', entry.isRepeat);
  document.getElementById('q-section-label').textContent = sec.label;
  document.getElementById('q-subsection-label').textContent = item.sub || '';

  // Passage display
  var passWrap = document.getElementById('q-passage-wrap');
  if (entry.type === 'group') {
    passWrap.style.display = 'block';
    document.getElementById('q-passage-counter').textContent =
      'Passage question ' + (entry.qInGroup + 1) + ' of ' + entry.groupSize;
    var passBox = document.getElementById('q-passage-box');
    passBox.innerHTML = '';
    item.passage.split('\n').forEach(function(line, i) {
      if (i > 0) passBox.appendChild(document.createElement('br'));
      passBox.appendChild(document.createTextNode(line));
    });
  } else {
    passWrap.style.display = 'none';
  }

  // Question text
  var qEl = document.getElementById('q-text');
  qEl.innerHTML = '';
  q.q.split('\n').forEach(function(line, i) {
    if (i > 0) qEl.appendChild(document.createElement('br'));
    qEl.appendChild(document.createTextNode(line));
  });

  // SJ section uses a different renderer
  if (entry.type === 'standalone' && entry.sid === 'sj') {
    renderSJQuestion(q, item);
    return;
  }

  // Options
  var container = document.getElementById('q-options');
  container.innerHTML = '';
  ['A','B','C','D'].forEach(function(letter) {
    if (!q.opts[letter]) return;
    var div = document.createElement('div');
    div.className = 'option';
    div.id = 'opt-' + letter;
    div.onclick = (function(l) { return function() { selectOpt(l); }; })(letter);
    var ls = document.createElement('span'); ls.className = 'opt-letter'; ls.textContent = letter + '.';
    var ts = document.createElement('span'); ts.textContent = q.opts[letter];
    div.appendChild(ls); div.appendChild(ts);
    container.appendChild(div);
  });

  document.getElementById('q-explanation').className = 'explanation';
  document.getElementById('q-exp-text').textContent = '';
  document.getElementById('q-verdict').textContent = '';
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('next-btn').disabled   = true;
  document.getElementById('skip-btn').disabled   = false;
  document.getElementById('submit-btn').textContent = 'Check Answer';
  document.getElementById('next-btn').textContent   = 'Next';

  updateProgress();
}

// -- SELECT --------------------------------------------------------------------
function selectOpt(letter) {
  if (state.submitted) return;
  state.selected = letter;
  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('opt-' + l);
    if (el) el.classList.toggle('selected', l === letter);
  });
  document.getElementById('submit-btn').disabled = false;
}

// -- SUBMIT --------------------------------------------------------------------
function submitAnswer() {
  if (!state.current || state.submitted) return;
  if (state.current.sid === 'sj') { submitSJAnswer(); return; }
  if (!state.selected) return;
  state.submitted = true;

  var entry   = state.current;
  var sid     = entry.sid;
  var item    = SECTIONS[sid].items[entry.itemIdx];
  var q       = entry.type === 'group' ? item.questions[entry.qInGroup] : item;
  var correct = q.correct;
  var isCorrect = state.selected === correct;
  var key = rKey(sid, entry.itemIdx, entry.qInGroup);

  ['A','B','C','D'].forEach(function(l) {
    var el = document.getElementById('opt-' + l);
    if (!el) return;
    el.classList.add('disabled');
    el.classList.remove('selected');
    if (l === correct) el.classList.add('correct');
    if (l === state.selected && !isCorrect) el.classList.add('wrong');
  });

  document.getElementById('q-explanation').className = 'explanation show ' + (isCorrect ? 'correct' : 'wrong');
  document.getElementById('q-verdict').textContent = isCorrect
    ? 'Correct!'
    : 'Incorrect - the correct answer is ' + correct + '.';
  document.getElementById('q-exp-text').textContent = q.exp;

  // Record first-attempt only
  if (!state.results[key]) {
    state.results[key] = { correct: isCorrect, skipped: false, wasRepeat: entry.isRepeat, sub: item.sub };
    state.totalAttempted++;
    if (isCorrect && entry.isRepeat) state.totalRecovered++;
    else if (isCorrect) state.totalCorrect++;
    else state.totalWrong++;
  }

  if (!isCorrect) requeueWrong(entry);

  updateScore();
  updateProgress();
  document.getElementById('submit-btn').disabled = true;
  document.getElementById('skip-btn').disabled   = true;
  document.getElementById('next-btn').disabled   = false;
}

// -- SKIP ----------------------------------------------------------------------
function skipQuestion() {
  if (state.submitted || !state.current) return;
  var entry = state.current;
  var sid   = entry.sid;
  var item  = SECTIONS[sid].items[entry.itemIdx];
  var key   = rKey(sid, entry.itemIdx, entry.qInGroup);

  if (!state.results[key]) {
    state.results[key] = { correct: false, skipped: true, sub: item.sub };
    state.totalSkipped++;
    state.totalAttempted++;
    updateScore();
  }

  if (!state.noRepeat) {
    var repeatEntry = JSON.parse(JSON.stringify(entry));
    repeatEntry.isRepeat = true;
    state.queues[sid].push(repeatEntry);
    updateTabBadges();
  }
  state.current = null;
  loadNext();
}

// -- SHUFFLE -------------------------------------------------------------------
function setNoRepeat(on) {
  state.noRepeat = on;
  var chk = document.getElementById('no-repeat-chk');
  if (chk) chk.checked = on;
}

function toggleNoRepeat() {
  setNoRepeat(!state.noRepeat);
}

function setShuffle(on) {
  state.shuffled = on;
  var btn = document.getElementById('shuffle-btn');
  if (btn) {
    btn.textContent       = on ? 'Shuffled' : 'Shuffle';
    btn.style.background  = on ? '#edf9ee' : '';
    btn.style.borderColor = on ? '#52c41a'  : '';
    btn.style.color       = on ? '#237804'  : '';
  }
}

function toggleShuffle() {
  setShuffle(!state.shuffled);
  // If there is a current unanswered question, put it back in the queue first
  // so it gets included in the shuffle, then reload
  if (state.current && !state.submitted) {
    state.queues[state.current.sid].unshift(JSON.parse(JSON.stringify(state.current)));
    state.current  = null;
    state.selected = null;
    state.submitted = false;
  }
  reshuffleQueues(state.shuffled);
  // Reload the next question from the now-shuffled queue
  restoreCardDOM();
  loadNext();
}

// Reshuffle all queues treating groups as atomic units
function reshuffleQueues(doShuffle) {
  SECTION_IDS.forEach(function(sid) {
    var queue   = state.queues[sid];
    var repeats = queue.filter(function(x) { return x.isRepeat; });
    var fresh   = queue.filter(function(x) { return !x.isRepeat; });

    // Re-group fresh items into units (contiguous group cards stay together)
    var units = [];
    var i = 0;
    while (i < fresh.length) {
      if (fresh[i].type === 'group') {
        // Collect all cards with the same gid
        var gid = fresh[i].gid;
        var block = [];
        while (i < fresh.length && fresh[i].type === 'group' && fresh[i].gid === gid) {
          block.push(fresh[i]);
          i++;
        }
        units.push(block);
      } else {
        units.push([fresh[i]]);
        i++;
      }
    }

    if (doShuffle) {
      for (var j = units.length - 1; j > 0; j--) {
        var k = Math.floor(Math.random() * (j + 1));
        var tmp = units[j]; units[j] = units[k]; units[k] = tmp;
      }
    } else {
      // Restore original order by itemIdx then qInGroup
      units.sort(function(a, b) {
        var ai = a[0].itemIdx, bi = b[0].itemIdx;
        return ai !== bi ? ai - bi : a[0].qInGroup - b[0].qInGroup;
      });
    }

    var newFresh = [];
    units.forEach(function(unit) { unit.forEach(function(c) { newFresh.push(c); }); });
    state.queues[sid] = repeats.concat(newFresh);
  });
}

// -- SCORE ---------------------------------------------------------------------
function updateScore() {
  document.getElementById('sc-total').textContent     = state.totalAttempted;
  document.getElementById('sc-correct').textContent   = state.totalCorrect;
  document.getElementById('sc-wrong').textContent     = state.totalWrong;
  document.getElementById('sc-skip').textContent      = state.totalSkipped;
  document.getElementById('sc-recovered').textContent = state.totalRecovered;
  var pctBase = state.totalCorrect + state.totalWrong;
  document.getElementById('sc-pct').textContent = pctBase > 0
    ? Math.round((state.totalCorrect / pctBase) * 100) + '%' : '-';
}

// -- DIAGNOSTICS ---------------------------------------------------------------
function showDiagnostics() {
  document.getElementById('quiz-area').style.display = 'none';
  document.getElementById('diagnostics-panel').className = 'diagnostics show';

  var pctBase = state.totalCorrect + state.totalWrong;
  var pct = pctBase > 0 ? Math.round((state.totalCorrect / pctBase) * 100) : 0;
  var scoreClass = pct >= 70 ? 'good' : pct >= 50 ? 'ok' : 'needs';
  var scoreMsg   = pct >= 70 ? 'Strong performance' : pct >= 50 ? 'Room to improve' : 'Needs more practice';
  var recovNote  = state.totalRecovered > 0 ? ', ' + state.totalRecovered + ' recovered after retry' : '';

  document.getElementById('diag-summary').innerHTML =
    '<div class="big-score ' + scoreClass + '">' + (pctBase > 0 ? pct + '%' : '-') + '</div>' +
    '<div style="font-size:12px;color:#9b9a97;margin-top:2px">First-attempt correct only (excludes recovered)</div>' +
    '<div style="font-size:13px;color:#6b6b6b;margin-top:6px">' + scoreMsg + ' - ' +
    state.totalCorrect + ' correct, ' + state.totalWrong + ' wrong, ' +
    state.totalSkipped + ' skipped' + recovNote + ' out of ' + state.totalAttempted + ' attempted</div>';

  var breakdown = document.getElementById('diag-breakdown');
  breakdown.innerHTML = '';

  SECTION_IDS.forEach(function(sid) {
    var sec   = SECTIONS[sid];
    var items = sec.items;
    var subs  = {};

    items.forEach(function(item, itemIdx) {
      var qs = item.type === 'group' ? item.questions : [item];
      qs.forEach(function(q, qi) {
        var sub = item.sub;
        if (!subs[sub]) subs[sub] = { correct: 0, wrong: 0, skipped: 0, recovered: 0, total: 0 };
        subs[sub].total++;
        var r = state.results[rKey(sid, itemIdx, qi)];
        if (r) {
          if (r.skipped)                   subs[sub].skipped++;
          else if (r.correct && !r.wasRepeat) subs[sub].correct++;
          else if (r.correct && r.wasRepeat)  subs[sub].recovered++;
          else                             subs[sub].wrong++;
        }
      });
    });

    var secDiv  = document.createElement('div');
    secDiv.className = 'diag-section';
    var secName = document.createElement('div');
    secName.className = 'diag-section-name';
    secName.textContent = sec.label;
    secDiv.appendChild(secName);

    Object.keys(subs).forEach(function(subName) {
      var s = subs[subName];
      var att    = s.correct + s.wrong;
      var subPct = att > 0 ? Math.round((s.correct / att) * 100) : null;
      var barColor = subPct === null ? '#e3e2e0' : subPct >= 70 ? '#52c41a' : subPct >= 50 ? '#faad14' : '#f5222d';
      var tagClass = subPct === null ? 'tag-unanswered' : subPct >= 70 ? 'tag-strong' : subPct >= 50 ? 'tag-ok' : 'tag-weak';
      var tagText  = subPct === null ? 'Not attempted'  : subPct >= 70 ? 'Strong'     : subPct >= 50 ? 'Review'  : 'Weak';
      var recStr   = s.recovered > 0 ? ' <span style="font-size:11px;color:#b36b00;font-weight:600">+' + s.recovered + ' recovered</span>' : '';
      var row = document.createElement('div');
      row.className = 'diag-row';
      row.innerHTML =
        '<div class="diag-row-label">' + subName + recStr + '</div>' +
        '<div class="diag-bar-track"><div class="diag-bar-fill" style="width:' + (subPct || 0) + '%;background:' + barColor + '"></div></div>' +
        '<div class="diag-pct" style="color:' + barColor + '">' + (subPct !== null ? subPct + '%' : '-') + '</div>' +
        '<div class="diag-tag ' + tagClass + '">' + tagText + '</div>';
      secDiv.appendChild(row);
    });

    breakdown.appendChild(secDiv);
  });
}

// -- RETURN TO QUIZ ------------------------------------------------------------
function returnToQuiz() {
  document.getElementById('diagnostics-panel').className = 'diagnostics';
  document.getElementById('quiz-area').style.display = 'block';
}

// -- RESTART -------------------------------------------------------------------
function restartQuiz() {
  fullReset();
  setShuffle(false);
  setNoRepeat(false);

  document.getElementById('diagnostics-panel').className = 'diagnostics';
  document.getElementById('quiz-area').style.display = 'block';

  document.getElementById('q-card').innerHTML =
    '<div id="q-passage-wrap" style="display:none">' +
      '<div class="passage-counter" id="q-passage-counter"></div>' +
      '<div class="passage-box" id="q-passage-box"></div>' +
    '</div>' +
    '<div class="section-label" id="q-section-label"></div>' +
    '<div class="subsection-label" id="q-subsection-label"></div>' +
    '<div class="question" id="q-text"></div>' +
    '<div class="options" id="q-options"></div>' +
    '<div class="explanation" id="q-explanation">' +
      '<div class="verdict" id="q-verdict"></div>' +
      '<div id="q-exp-text"></div>' +
    '</div>' +
    '<div class="btn-row">' +
      '<button class="btn primary" id="submit-btn" onclick="submitAnswer()" disabled>Check Answer</button>' +
      '<button class="btn" id="next-btn" onclick="nextQuestion()" disabled>Next</button>' +
      '<button class="btn" id="skip-btn" onclick="skipQuestion()">Skip</button>' +
    '</div>';

  state.section = 'jk';
  SECTION_IDS.forEach(function(s) {
    document.getElementById('tab-' + s).classList.toggle('active', s === 'jk');
  });
  updateTabBadges();
  loadNext();
}

// -- NEXT ----------------------------------------------------------------------
function nextQuestion() { loadNext(); }

// -- INIT ----------------------------------------------------------------------
fullReset();
showSection('jk');


</script>
