      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The agency's new directive effects how consular officers process emergency visa applications.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Effects' as a verb means to bring about or cause (as in 'to effect change'). The intended meaning is 'has an impact on,' which requires 'affects.' This is one of the most commonly confused word pairs in formal writing: 'affect' (verb, to influence) vs. 'effect' (noun, result; or rare verb, to bring about)."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The officer whom the supervisor praised for her diligence received the department's highest commendation.",B:"The officer who the supervisor praised for her diligence received the department's highest commendation.",C:"The officer which the supervisor praised for her diligence received the department's highest commendation.",D:"The officer that the supervisor praised for her diligence, received the department's highest commendation."},correct:"A",exp:"'Whom' is correct because the pronoun is the object of 'praised' (the supervisor praised her = her = objective = whom). 'Who' is the subject form. 'Which' is not used for people. Option D incorrectly places a comma between the subject and verb."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The applicant [A: has lived] in France [B: since] she [C: graduated] from the university in 2018.\"\n\nWhich underlined part contains an error?",opts:{A:"has lived",B:"since",C:"graduated",D:"No error"},correct:"D",exp:"The sentence is correct. 'Has lived' is the correct present perfect tense - 'since' signals an action that began in the past and continues to the present, which requires the present perfect. 'Since' is correctly used as a conjunction introducing a time clause. 'Graduated' correctly uses the simple past for the completed past action. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The committee's report, which took over six months to complete, were highly praised by the director.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'report,' which is singular. The relative clause 'which took over six months to complete' does not change the subject. The verb should be 'was highly praised,' not 'were highly praised.' The singular possessive 'committee's report' is the true subject."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"To ensure a smooth transition, all files must be transferred before the officer departs.",B:"To ensure a smooth transition, the officer must transfer all files before departing.",C:"To ensure a smooth transition, all files need transferring before the officer's departure.",D:"For ensuring a smooth transition, the officer must transfer all files before departing."},correct:"B",exp:"Option B correctly attaches the infinitive phrase 'To ensure a smooth transition' to the subject who is doing the ensuring - the officer. Option A has a dangling modifier (the files are not ensuring the transition). Option C is grammatically awkward. Option D uses 'For ensuring' which is non-standard."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The supervisor [A: recommended] that each new officer [B: spends] at least two weeks [C: observing] experienced colleagues before conducting independent interviews.\"\n\nWhich underlined part contains an error?",opts:{A:"recommended",B:"spends",C:"observing",D:"No error"},correct:"B",exp:"After 'recommended that,' the subjunctive mood requires the base form of the verb. 'Spend' (not 'spends') is correct. The subjunctive drops the -s ending that the indicative third-person singular uses. 'Each new officer spend' is the correct subjunctive construction."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The report contains less than thirty pages, so it should be easy to review before the meeting.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"'Less than thirty pages' is correct when referring to a quantity or measurement treated as a unit. 'Fewer' applies to individually countable items, but 'less than' is standard when pages represent a unit of measurement (like 'less than three miles' or 'less than five dollars'). This is a common trap - the sentence is actually correct."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The ambassador, together with her senior staff, were present at the signing ceremony.",B:"The ambassador, together with her senior staff, was present at the signing ceremony.",C:"The ambassador together with her senior staff, was present at the signing ceremony.",D:"The ambassador, together with her senior staff was present at the signing ceremony."},correct:"B",exp:"'Together with her senior staff' is a parenthetical phrase that does not change the singular subject 'the ambassador.' The verb must be 'was.' The phrase must be set off by commas on both sides - Option C is missing the opening comma and Option D is missing the closing comma."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Reviewing] the case file [B: before] the interview [C: are] standard procedure in this section.\"\n\nWhich underlined part contains an error?",opts:{A:"Reviewing",B:"before",C:"are",D:"No error"},correct:"C",exp:"The subject is the gerund phrase 'Reviewing the case file before the interview,' which is singular. Gerund phrases acting as subjects always take singular verbs. The verb should be 'is standard procedure,' not 'are.' The verb must agree with the gerund subject, not with any noun within the phrase."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The officer stated that the regulation requires that all documents are submitted within 30 days.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"C",exp:"After 'requires that,' the subjunctive mood is required. The correct form is 'requires that all documents be submitted' - using the base form 'be,' not the indicative 'are.' Verbs of requirement, recommendation, and insistence trigger the subjunctive in formal standard English."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The policy applies to all employees who have been with the agency for more than one year, of which there are approximately two hundred.",B:"The policy applies to all employees who have been with the agency for more than one year, of whom there are approximately two hundred.",C:"The policy applies to all employees who have been with the agency for more than one year, whom number approximately two hundred.",D:"The policy applies to all employees who have been with the agency for more than one year; there are approximately two hundred of which."},correct:"B",exp:"'Of whom there are approximately two hundred' is correct because 'whom' refers to people (employees). 'Of which' (Options A and D) is used for things, not people. 'Whom number' (Option C) is awkward and non-standard. 'Of whom there are' is the correct idiomatic construction for stating the quantity of people just referred to."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The new protocol [A: will affect] processing times [B: across] all units and [C: insures] greater consistency in adjudication.\"\n\nWhich underlined part contains an error?",opts:{A:"will affect",B:"across",C:"insures",D:"No error"},correct:"C",exp:"'Insures' refers to financial insurance. The intended meaning - 'guarantees' or 'makes certain' - requires 'ensures.' 'Will affect' correctly uses 'affect' as a verb meaning to influence. 'Across' is the correct preposition. 'Insures' vs. 'ensures' is one of the most tested word confusion pairs."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Neither the evidence presented by the prosecution nor the testimony offered by the defense were persuasive to the jury.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"With 'neither...nor,' the verb agrees with the nearest subject. The nearest subject is 'the testimony,' which is singular, requiring 'was persuasive.' 'Were' would be correct if the nearest subject were plural. The proximity rule: when 'neither...nor' connects subjects of different numbers, the verb agrees with the subject closest to it."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The data collected during the inspection reveals several significant compliance gaps.",B:"The data collected during the inspection reveal several significant compliance gaps.",C:"The data, collected during the inspection, reveals several significant compliance gaps.",D:"The data, collected during the inspection, reveal several significant compliance gaps."},correct:"D",exp:"In formal and academic writing, 'data' is the plural of 'datum' and takes a plural verb ('reveal'). The participial phrase 'collected during the inspection' is parenthetical and should be set off by commas on both sides. Option B has the correct verb but lacks commas. Option C has commas but wrong verb. Option A lacks commas and has the wrong verb."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The team worked [A: continuously] throughout the week, [B: completing] the report [C: ahead of] the scheduled deadline.\"\n\nWhich underlined part contains an error?",opts:{A:"continuously",B:"completing",C:"ahead of",D:"No error"},correct:"D",exp:"The sentence is correct. 'Continuously' means without interruption - appropriate for working throughout the week. 'Completing the report' is a correct participial phrase modifying the team. 'Ahead of the scheduled deadline' is a correct prepositional phrase. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The ambassador complemented the staff on their outstanding performance during the inspection.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Complemented' means to complete or enhance (the scarf complements her outfit). The intended word is 'complimented' - to praise or express approval of. These near-homophones are frequently confused in formal writing. 'Complement' and 'compliment' (and their derivatives) are among the most tested spelling and meaning distinctions."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Each of the three applicants were interviewed individually before a final decision was made.",B:"Each of the three applicants was interviewed individually before a final decision was made.",C:"Each of the three applicants have been interviewed individually before a final decision was made.",D:"Each of the three applicants were individually interviewed, and a final decision was made."},correct:"B",exp:"'Each' is always singular and takes a singular verb. 'Each of the three applicants was interviewed' is correct. 'Were interviewed' (A and D) and 'have been interviewed' (C) are incorrect - all use plural verb forms with the singular indefinite pronoun 'each.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The officer [A: lay] the documents on the desk [B: before] the applicant [C: arrived] for the interview.\"\n\nWhich underlined part contains an error?",opts:{A:"lay",B:"before",C:"arrived",D:"No error"},correct:"D",exp:"The sentence is correct. 'Lay' here is the past tense of the transitive verb 'lay' (to place something) - she laid/lay the documents. The simple past of 'lay' is 'laid,' but 'lay' as past tense works here if we interpret the verb as correct simple past. Actually 'lay' IS the simple past of 'lay' (lay/laid/laid). So 'lay' is the correct past tense form. 'Before' and 'arrived' are both correct. No error."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The principle reason for the delay was a shortage of qualified personnel to review the applications.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Principle' is a noun meaning a fundamental rule or standard. The intended word is 'principal,' which as an adjective means main or primary. 'The principal reason' means the main reason. 'Principle' vs. 'principal' is a common confusion tested on grammar exams."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The report was both thorough and it was submitted on time.",B:"The report was both thorough and timely.",C:"The report was both thorough and was timely in its submission.",D:"Both the report's thoroughness and it being timely were noted."},correct:"B",exp:"'Both...and' is a correlative conjunction requiring parallel structure - both elements must be the same grammatical form. In Option B, 'thorough' and 'timely' are both adjectives - correctly parallel. Option A pairs an adjective ('thorough') with a clause ('it was submitted on time'). Options C and D are wordy and break parallel structure."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The number of pending cases [A: have] increased [B: significantly] over the [C: past] three months.\"\n\nWhich underlined part contains an error?",opts:{A:"have",B:"significantly",C:"past",D:"No error"},correct:"A",exp:"'The number of' takes a singular verb. 'The number of pending cases has increased' is correct, not 'have increased.' This is the classic 'the number of' vs. 'a number of' distinction: 'the number' = singular; 'a number' = plural. The singular 'number' is the true subject."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Due to the inclement weather, the outdoor ceremony was postponed; consequently the guests were notified by email.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"D",exp:"When a conjunctive adverb like 'consequently' follows a semicolon, it must be followed by a comma: 'postponed; consequently, the guests were notified.' The comma after the conjunctive adverb is required. Without it, the sentence is technically correct in structure but violates standard punctuation convention for conjunctive adverbs."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Continual interruptions during the briefing frustrated the senior officer.",B:"Continuous interruptions during the briefing frustrated the senior officer.",C:"Continual interruptions during the briefing have frustrated the senior officer.",D:"Continuously, the senior officer was frustrated by interruptions during the briefing."},correct:"A",exp:"'Continual' means recurring repeatedly with breaks - the correct word for interruptions (which by definition start and stop). 'Continuous' means without any interruption, which is contradictory for interruptions. Option C shifts to present perfect without reason. Option D uses 'Continuously' as a fronted adverb awkwardly."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The policy [A: requires] that all staff [B: complete] the training [C: before] the end of the calendar year.\"\n\nWhich underlined part contains an error?",opts:{A:"requires",B:"complete",C:"before",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Requires that all staff complete' uses the correct subjunctive base form 'complete' after 'requires that.' The subjunctive does not add -s for third person singular. 'Before the end of the calendar year' is a correct prepositional phrase. No error exists - this tests whether students incorrectly flag the subjunctive 'complete' as an agreement error."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The team's analysis, which was based on three months of field research, provide a comprehensive overview of the security situation.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'analysis,' which is singular. The relative clause 'which was based on three months of field research' does not change the subject. The verb should be 'provides,' not 'provide.' The -s ending is required for the third-person singular present tense."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The director asked that all section chiefs attend the emergency briefing without exception.",B:"The director asked that all section chiefs attends the emergency briefing without exception.",C:"The director asked all section chiefs attending the emergency briefing without exception.",D:"The director asked that all section chiefs will attend the emergency briefing without exception."},correct:"A",exp:"After 'asked that,' the subjunctive mood requires the base form 'attend' (not 'attends,' which is indicative; not 'will attend,' which is conditional; and not 'attending,' which is a participle). Option A correctly uses the subjunctive base form after the verb of requesting."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Between] the director, the deputy director, [B: and] the section chiefs, [C: there was] considerable disagreement about the proposed timeline.\"\n\nWhich underlined part contains an error?",opts:{A:"Between",B:"and",C:"there was",D:"No error"},correct:"A",exp:"'Between' is used for two items or parties. When three or more parties are involved, 'among' is the correct preposition. The sentence involves three groups (director, deputy director, section chiefs), so 'among' is required. 'There was considerable disagreement' is correct because 'disagreement' is singular."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The officer who the committee selected for the assignment has extensive experience in post-conflict stabilization.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is correct. 'Who the committee selected' - 'who' appears to be incorrect (as object of 'selected'), but actually in modern standard usage and most style guides, 'that' or even 'who' is acceptable in restrictive relative clauses even in objective position when the antecedent is a person. However, strictly, 'whom the committee selected' would be more formally correct. If the answer choices do not include 'improper pronoun,' then no error applies. The sentence as written is grammatically acceptable in standard American English."}

        passage: "American Federalism: Cooperative and Competitive Models\n\n(1) Federalism - the division of governmental authority between a national government and constituent state governments - has been a defining structural feature of American governance since the Constitution's ratification in 1788. The precise allocation of powers between federal and state governments has been contested throughout American history, with the balance shifting dramatically in response to economic crises, wars, and changing political philosophies. The Constitution's Tenth Amendment, which reserves to the states all powers not delegated to the federal government, has been interpreted variously as a strong limitation on federal power and as essentially a restatement of the constitutional structure without independent force.\n\n(2) The dominant model of federalism for much of the nineteenth century was 'dual federalism' - sometimes called 'layer-cake federalism' - in which federal and state governments operated in largely separate spheres with distinct areas of authority. The federal government was seen as supreme within its enumerated powers, but those powers were understood narrowly, leaving a broad residual domain for the states. The New Deal dramatically accelerated the nationalization of policy, and the emergence of cooperative federalism - in which federal and state governments jointly administer programs - became the dominant model of the mid-twentieth century.\n\n(3) Under cooperative federalism, the federal government frequently uses its spending power to induce state participation in federally designed programs. By attaching conditions to federal grants, Congress can effectively regulate areas beyond its direct constitutional authority. The Supreme Court has upheld this conditional spending but has placed limits on it: in NFIB v. Sebelius (2012), the Court held that the federal government could not coerce states into expanding Medicaid by threatening to withhold all existing Medicaid funding if they refused.\n\n(4) Competitive federalism describes the dynamic in which states compete with each other for residents, businesses, and investment by offering different regulatory environments, tax structures, and public services. This competition is seen by some scholars as a healthy mechanism for innovation and preference satisfaction - states as 'laboratories of democracy' - while critics argue it can lead to a race to the bottom in labor, environmental, and consumer protection standards.",

          {
            q: "According to the passage, what was the dominant model of federalism in the nineteenth century and how was it characterized?",

      ,{

        passage: "The Cold War: Origins, Structure, and End\n\n(1) The Cold War defined international politics from the end of World War II until the dissolution of the Soviet Union in 1991. Unlike previous great power rivalries, the Cold War was characterized by the mutual possession of nuclear weapons capable of annihilating civilization, which gave both superpowers strong incentives to avoid direct military confrontation. This condition of 'mutually assured destruction' made the Cold War a conflict fought primarily through proxy wars, economic competition, ideological propaganda, covert operations, and an arms race that consumed enormous resources on both sides.\n\n(2) The Cold War's origins are debated among historians. Traditional Western accounts emphasize Soviet expansionism in Eastern Europe following WWII and Stalin's ideological ambition to spread communism. Revisionist historians emphasize American economic interests, the provocative nature of the Truman Doctrine and Marshall Plan, and the role of American atomic monopoly (1945-1949) in heightening Soviet insecurity. Post-revisionist accounts attempt a synthesis, acknowledging both sides' contributions to the deteriorating postwar relationship.\n\n(3) The Cold War's structure evolved significantly over four decades. Early confrontations in Berlin, Korea, and over atomic weapons gave way to the partial relaxation of detente in the 1970s, then to a renewed intensification under Reagan before Gorbachev's reforms created conditions for a peaceful resolution. The Cuban Missile Crisis (1962) represented the closest the two powers came to direct nuclear conflict - and its resolution through backchannel diplomacy and mutual concession demonstrated that crisis management was possible even at the nuclear threshold.\n\n(4) The Cold War's end came not through military defeat but through internal transformation. Gorbachev's twin reform programs - glasnost (openness) and perestroika (restructuring) - loosened the Soviet system's grip on Eastern European satellite states, leading to the peaceful revolutions of 1989. The Soviet Union itself dissolved in December 1991. The Cold War's legacy - nuclear arsenals, military alliances, and interventionary habits - continued to shape international relations long after the Soviet collapse.",

      ,{
        type: 'group',
        gid: 'ee-g18',
        sub: "Reading Comprehension",
        passage: "Human Rights in International Law: Universal Standards and Sovereign Limits\n\n(1) The modern international human rights system was constructed in the aftermath of World War II, motivated by the determination that the atrocities of the Nazi regime should never be repeated and that sovereignty could not serve as a permanent shield for governments committing mass crimes against their own populations. The Universal Declaration of Human Rights (UDHR), adopted by the UN General Assembly in 1948, established a comprehensive catalog of rights applicable to all persons regardless of nationality. While not legally binding in itself, the UDHR has served as the foundation for subsequent binding treaties.\n\n(2) The core binding instruments include two treaties adopted in 1966: the International Covenant on Civil and Political Rights (ICCPR), which protects rights such as freedom of speech, religion, and fair trial; and the International Covenant on Economic, Social and Cultural Rights (ICESCR), which protects rights such as education, health, and an adequate standard of living. Together with the UDHR, these instruments form the 'International Bill of Rights.'\n\n(3) A persistent tension in the human rights system is the conflict between universal standards and state sovereignty. States have repeatedly challenged the universality of human rights, arguing that specific rights reflect Western cultural and political values rather than genuinely universal norms. This 'cultural relativist' critique has been used to resist external pressure on various practices. Human rights advocates respond that fundamental dignity and freedom are universal regardless of cultural context and that relativism has been used primarily to shield governments from accountability.\n\n(4) Enforcement of international human rights law remains the system's greatest weakness. Unlike domestic legal systems, the international human rights system lacks a centralized enforcement mechanism. Treaty bodies can review state compliance and issue recommendations, but they lack binding enforcement authority. The International Criminal Court has jurisdiction over war crimes, crimes against humanity, and genocide, but its jurisdiction is limited to cases where the state concerned is unable or unwilling to investigate and prosecute.",
        questions: [
          {
            q: "According to the passage, why was the UDHR significant despite not being legally binding?",
            opts: { A: "It gave the UN Security Council authority to sanction states that violated its provisions", B: "It served as the foundation for subsequent binding treaties that established enforceable rights", C: "It was incorporated by reference into all bilateral treaties negotiated after 1948", D: "It established the International Criminal Court's jurisdiction over human rights violations" },
            correct: "B",

risdictions. Some states imposed strict restrictions while others declined to do so. The experience prompted substantial debate about whether the American public health system's decentralized structure is an appropriate reflection of federalism or an obstacle to effective national crisis response.",

      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The consul's decision to deny the application was based on two principle factors: incomplete documentation and a prior overstay.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Principle' is a noun meaning a fundamental rule or truth. The intended word is 'principal,' used here as an adjective meaning main or primary. 'The two principal factors' means the two main factors. This is one of the most commonly confused word pairs in formal writing."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The officer, together with two colleagues, were present at the meeting.",B:"The officer, together with two colleagues, was present at the meeting.",C:"The officer together with two colleagues was present at the meeting.",D:"The officer, together with two colleagues were present at the meeting."},correct:"B",exp:"'Together with two colleagues' is a parenthetical phrase that does not create a compound subject. The subject remains 'the officer' (singular), so the verb must be 'was.' The phrase must be set off by commas on both sides. Option C is missing the opening comma; Option D is missing the closing comma; Option A uses 'were' incorrectly."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The supervisor [A: asked] that each team member [B: submits] a progress report [C: by] Friday afternoon.\"\n\nWhich underlined part contains an error?",opts:{A:"asked",B:"submits",C:"by",D:"No error"},correct:"B",exp:"After 'asked that,' the subjunctive mood requires the base form 'submit,' not the indicative 'submits.' 'Submits' would be the third-person singular indicative; the subjunctive drops the -s ending. Verbs of requesting and asking trigger the subjunctive in formal English."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Between the three applicants interviewed this morning, there was a clear standout.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"B",exp:"'Between' is used for two parties; 'among' is used for three or more. With three applicants, the correct preposition is 'among the three applicants.' This is a standard preposition distinction tested frequently on grammar assessments."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Neither the director nor the two deputy directors was available for comment.",B:"Neither the director nor the two deputy directors were available for comment.",C:"Neither the director nor the two deputy directors have been available for comment.",D:"Neither the director nor the two deputy directors is available for comment."},correct:"B",exp:"With 'neither...nor,' the verb agrees with the nearest subject. The nearest subject is 'the two deputy directors,' which is plural, requiring 'were.' If the singular 'director' were nearest, 'was' would be correct. 'Have been' changes the tense unnecessarily. Option D uses singular 'is' with a plural nearest subject."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The applicant [A: who] the officer [B: interviewed] yesterday [C: has submitted] the required supplemental documents.\"\n\nWhich underlined part contains an error?",opts:{A:"who",B:"interviewed",C:"has submitted",D:"No error"},correct:"A",exp:"'Who' is the subject form of the relative pronoun; 'whom' is the objective form. In this sentence, the pronoun is the object of 'interviewed' (the officer interviewed him/her = him/her = objective = whom). The correct form is 'the applicant whom the officer interviewed.' 'Who' is incorrect in the objective position."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The new policy will effect significant changes to how consular fees are collected and processed.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"This sentence is actually correct. 'Effect' used as a verb means 'to bring about' or 'to cause' - which is the intended meaning here. 'The new policy will effect significant changes' means 'the policy will bring about significant changes.' This is a trap question: 'affect' (to influence) and 'effect' (noun: result; verb: to bring about) are both valid, and 'effect' as a verb is correctly used here."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"A number of applications were received after the deadline.",B:"A number of applications was received after the deadline.",C:"The number of late applications were higher than expected.",D:"The number of late applications have been higher than expected."},correct:"A",exp:"'A number of' means 'several' and takes a plural verb ('were received'). 'The number of' refers to the count itself and takes a singular verb. Option B incorrectly uses singular 'was' with 'a number of.' Options C and D use plural verbs with 'the number of,' which requires a singular verb ('was higher')."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Completing] the interview process, [B: all required documents] were collected [C: before] the applicant departed.\"\n\nWhich underlined part contains an error?",opts:{A:"Completing",B:"all required documents",C:"before",D:"No error"},correct:"A",exp:"This is a dangling participle. 'Completing the interview process' implies a subject doing the completing, but the sentence's grammatical subject is 'all required documents' - documents do not complete interview processes. The correct version would be: 'After completing the interview process, the officer collected all required documents before the applicant departed.'"}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The committee's decision to approve the amendment were met with mixed reactions from the staff.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'the committee's decision,' which is singular. The verb should be 'was met' (singular), not 'were met' (plural). This is an attraction error - 'committee' and 'amendment' both create pressure toward a plural verb, but 'decision' is the true singular subject."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The officer whom prepared the report received a commendation.",B:"The officer who prepared the report received a commendation.",C:"The officer that prepared the report, received a commendation.",D:"The officer which prepared the report received a commendation."},correct:"B",exp:"'Who' is correct because the pronoun is the subject of the relative clause ('who prepared the report' - she prepared = subject = who). 'Whom' is the objective form and is incorrect here. 'Which' is not used for people. Option C incorrectly places a comma between the subject and verb."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The section chief, [A: along with] the two senior officers, [B: are responsible] for reviewing [C: all] final adjudications before submission.\"\n\nWhich underlined part contains an error?",opts:{A:"along with",B:"are responsible",C:"all",D:"No error"},correct:"B",exp:"'Along with the two senior officers' is a parenthetical phrase that does not change the singular subject 'the section chief.' The verb should be 'is responsible' (singular), not 'are responsible' (plural). Phrases introduced by 'along with,' 'as well as,' 'in addition to,' etc., do not create compound subjects."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Each of the fifteen countries in the regional bloc have ratified the agreement.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"'Each' is always singular, regardless of what follows it. 'Each of the fifteen countries has ratified' is correct. 'Have ratified' treats 'each' as plural, which is incorrect. The prepositional phrase 'of the fifteen countries' does not change the number of the indefinite pronoun 'each.'"}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Working diligently and with efficiency, the team completed the project ahead of schedule.",B:"Working diligently and efficient, the team completed the project ahead of schedule.",C:"Working diligently and efficiently, the team completed the project ahead of schedule.",D:"Diligent and working efficiently, the team completed the project ahead of schedule."},correct:"C",exp:"'Diligently and efficiently' are parallel adverbs modifying 'working' - both end in -ly. Option A breaks parallelism by mixing an adverb ('diligently') with a prepositional phrase ('with efficiency'). Option B uses 'efficient' (adjective) where an adverb is needed. Option D breaks the participial phrase structure awkwardly."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The report [A: recommends] that the agency [B: establishes] a new oversight mechanism [C: within] six months.\"\n\nWhich underlined part contains an error?",opts:{A:"recommends",B:"establishes",C:"within",D:"No error"},correct:"B",exp:"After 'recommends that,' the subjunctive mood requires the base form 'establish,' not the indicative 'establishes.' The -s ending is a third-person singular indicative marker that is dropped in the subjunctive. 'Recommends that the agency establish' is the correct subjunctive construction."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The director complemented the design of the new reporting system during the staff meeting.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Complemented' means to complete or enhance something. The intended word is 'complimented' - to praise or express approval. The director praised the design, not enhanced it. 'Complement' (to complete) and 'compliment' (to praise) are near-homophones that are frequently confused."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The memo, which was drafted by three officers and reviewed by two supervisors, were approved yesterday.",B:"The memo, which was drafted by three officers and reviewed by two supervisors, was approved yesterday.",C:"The memo that was drafted by three officers and reviewed by two supervisors, was approved yesterday.",D:"The memo which was drafted by three officers and reviewed by two supervisors was approved yesterday."},correct:"B",exp:"The subject is 'the memo' (singular), so the verb must be 'was approved.' The relative clause 'which was drafted by three officers and reviewed by two supervisors' is non-restrictive (adds information) and must be set off by commas on both sides. Option C uses 'that' for a non-restrictive clause and adds an incorrect comma. Option D omits commas around the non-restrictive clause."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The applications [A: that] arrived after the deadline [B: were] not considered, [C: regardless] of the reason for the delay.\"\n\nWhich underlined part contains an error?",opts:{A:"that",B:"were",C:"regardless",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'That arrived after the deadline' is a restrictive relative clause correctly using 'that.' 'Applications...were not considered' correctly applies a plural verb to a plural subject. 'Regardless of' is the correct idiom ('irregardless' is non-standard). No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The officer's thorough and thoughtful review of the case insured that no errors were overlooked.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Insured' relates to financial insurance. The intended word is 'ensured' - meaning guaranteed or made certain. 'The review ensured that no errors were overlooked' correctly uses 'ensure' (to make certain). 'Insure' and 'ensure' are frequently confused; 'ensure' means to guarantee, while 'insure' means to provide financial protection against risk."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The policy applies to all staff who has worked in the section for more than one year.",B:"The policy applies to all staff who have worked in the section for more than one year.",C:"The policy applies to all staffs who have worked in the section for more than one year.",D:"The policy applies to all staff which has worked in the section for more than one year."},correct:"B",exp:"'Staff' is a collective noun; 'all staff' refers to multiple individuals here, taking the plural verb 'have worked.' 'Who' is correct for people; 'which' (Option D) is used for things. 'Staffs' (Option C) is rarely used and typically refers to multiple separate groups of staff. 'Has worked' (Option A) incorrectly pairs singular verb with 'all staff.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Due to] the inclement weather, the outdoor briefing [B: was] postponed; [C: consequently,] all participants were notified by email.\"\n\nWhich underlined part contains an error?",opts:{A:"Due to",B:"was",C:"consequently,",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Due to' is acceptable as a preposition meaning 'because of.' 'Was postponed' correctly uses the singular passive verb with 'the outdoor briefing.' After the semicolon, 'consequently,' (conjunctive adverb + comma) is correctly punctuated. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The team's performance over the past six months have exceeded all expectations.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'performance,' which is singular. The possessive phrase 'the team's' modifies 'performance' but does not change its number. The verb should be 'has exceeded' (singular), not 'have exceeded' (plural). 'Team's' and 'months' both appear in the sentence but neither is the subject."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The reason for the delay is because the required documents were not submitted on time.",B:"The reason for the delay is that the required documents were not submitted on time.",C:"The reason for the delay was because the required documents were not submitted on time.",D:"The reason for the delay, the required documents were not submitted on time."},correct:"B",exp:"'The reason is because' is redundant - 'reason' and 'because' both express causation. The correct construction is 'the reason is that.' Options A and C use 'because' after 'reason is/was,' which is grammatically incorrect in formal English. Option D creates a comma splice or run-on."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The new officer has worked [A: continuously] since arriving at post, [B: completing] all required training [C: ahead of] schedule.\"\n\nWhich underlined part contains an error?",opts:{A:"continuously",B:"completing",C:"ahead of",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Continuously' (without interruption) is appropriate for describing uninterrupted work since arriving. 'Completing all required training' is a correct participial phrase modifying the officer. 'Ahead of schedule' is a correct prepositional phrase. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The report's data clearly shows that processing times have improved over the past quarter.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is correct. The subject is 'data,' which in informal and modern standard American English is increasingly treated as a collective singular noun taking 'shows.' Both 'data shows' and 'data show' appear in reputable publications; in this context the singular is acceptable. 'Processing times have improved' correctly uses the plural verb for the plural subject. No clear error exists under modern usage standards."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Not only did the review reveal several errors, but it also identified opportunities for improvement.",B:"Not only the review revealed several errors, but it also identified opportunities for improvement.",C:"Not only did the review reveal several errors, but also identified opportunities for improvement.",D:"Not only did the review reveal several errors, but it identified also opportunities for improvement."},correct:"A",exp:"'Not only...but also' requires parallel structure. In Option A, 'Not only did the review reveal' parallels 'but it also identified' - both are full clauses with subjects. Option B omits the auxiliary 'did.' Option C omits the subject 'it' in the second clause. Option D places 'also' in an awkward position after 'it identified.'"}
      ,{
        type: 'group',
        gid: 'ee-g20',
        sub: "Reading Comprehension",
        passage: "The Role of Congress in Foreign Policy\n\n(1) Foreign policy in the United States is often described as the province of the executive branch, but Congress exercises significant constitutional and statutory authority over international affairs. The Constitution divides foreign policy powers between the two branches: the President commands the military, negotiates treaties, and receives ambassadors; Congress declares war, appropriates funds, regulates commerce with foreign nations, and ratifies treaties through the Senate. This shared structure has produced persistent competition and accommodation between the branches across American history.\n\n(2) Congress's power of the purse is perhaps its most potent foreign policy tool. No military operation can be sustained without congressional funding, no foreign aid program can be implemented without an appropriation, and no international organization can receive U.S. contributions without legislative authorization. Congress has used this power to both support and constrain executive foreign policy, including by refusing to fund specific operations, conditioning aid on human rights benchmarks, and legislating sanctions against foreign governments.\n\n(3) The Senate's treaty ratification power has shaped American foreign policy in notable ways. The Senate's rejection of the Versailles Treaty in 1919-1920, which would have brought the United States into the League of Nations, is the most dramatic historical example. To work around the two-thirds Senate threshold, presidents have increasingly used 'executive agreements' - international commitments made under presidential authority without Senate approval. Executive agreements now vastly outnumber formal treaties, though their legal durability is less secure.\n\n(4) Congressional oversight of intelligence and military activities has been institutionalized through specialized mechanisms including the House and Senate intelligence committees and the Armed Services committees. The War Powers Resolution of 1973 sought to constrain the President's ability to deploy forces abroad without congressional approval, requiring notification within 48 hours and limiting unauthorized deployments to 60 days. Presidents of both parties have questioned the Resolution's constitutionality and complied with it inconsistently.",
        questions: [
          {
            q: "According to the passage, which of the following is identified as perhaps Congress's most potent foreign policy tool?",
            opts: { A: "The power to ratify treaties through the Senate", B: "The power of the purse - controlling appropriations and funding", C: "The authority to declare war", D: "The oversight role through intelligence and armed services committees" },
            correct: "B",
            exp: "Paragraph 2 explicitly states: 'Congress's power of the purse is perhaps its most potent foreign policy tool.' It then explains how no military operation, foreign aid program, or international organization contribution can proceed without congressional funding. The treaty power, war declaration, and oversight are also discussed but are not identified as 'perhaps the most potent.'"
          },
          {
            q: "Based on the passage, why have presidents increasingly used 'executive agreements' rather than formal treaties?",
            opts: { A: "Executive agreements have stronger legal durability than formal treaties under international law", B: "Executive agreements allow international commitments without the two-thirds Senate threshold required for treaty ratification", C: "Congress passed legislation requiring presidents to use executive agreements for most international commitments", D: "Executive agreements can be implemented more quickly and can include classified provisions" },
            correct: "B",
            exp: "Paragraph 3 states presidents use executive agreements 'to work around the two-thirds Senate threshold.' The passage also notes executive agreements' legal durability 'is less secure' than formal treaties - contradicting Option A. Congressional legislation mandating executive agreements and classified provisions are not mentioned."
          },
          {
            q: "According to the passage, what was historically significant about the Senate's rejection of the Versailles Treaty in 1919-1920?",
            opts: { A: "It established the precedent that the Senate could not reject treaties already signed by the President", B: "It prevented the United States from joining the League of Nations, illustrating the Senate's treaty ratification power", C: "It led directly to the passage of the War Powers Resolution", D: "It resulted in a constitutional amendment clarifying the treaty ratification threshold" },
            correct: "B",
            exp: "Paragraph 3 states the Versailles Treaty rejection 'would have brought the United States into the League of Nations' and calls it 'the most dramatic historical example' of the Senate's treaty ratification power in action. The War Powers Resolution (1973) came decades later; no constitutional amendment resulted; and the precedent described is the opposite of Option A."
          },
          {
            q: "Based on the passage, what requirement does the War Powers Resolution impose on the President?",

            correct: "B",
            exp: "Paragraph 4 states the War Powers Resolution requires 'notification within 48 hours and limiting unauthorized deployments to 60 days.' It does not require pre-deployment approval, address military alliances, or set a 30-day declaration-of-war requirement."
          },
          {
            q: "Based on the passage, which of the following conclusions about presidential compliance with the War Powers Resolution is supported?",
            opts: { A: "Presidents have uniformly complied with the Resolution while disputing its wisdom", B: "Presidents have complied with the Resolution because courts have upheld its constitutionality", C: "Presidents of both parties have questioned the Resolution's constitutionality and complied with it inconsistently", D: "Presidents have complied with the Resolution in exchange for congressional funding of military operations" },
            correct: "C",
            exp: "Paragraph 4 states 'Presidents of both parties have questioned the Resolution's constitutionality and complied with it inconsistently.' Uniform compliance, court enforcement, and a compliance-funding exchange are not described in the passage."
          }
        ]

      ,{
        type: 'group',

ailable with advance booking, as determined by the agency travel office.",

        expWorst: "Option C continues knowingly sending sensitive information to an unauthorized recipient because you trust them personally - trustworthiness does not confer access rights, and continuing the disclosure after discovering it is a deliberate policy violation."
      }
      ,{
        type: 'standalone',
        sub: "Workplace Conduct",
        q: "A colleague repeatedly interrupts you and other female-presenting colleagues in meetings but does not interrupt male colleagues in the same way. The behavior appears unconscious. What would you do?",
        opts: {
          A: "Say nothing because calling attention to the pattern will create conflict",
          B: "Speak with the colleague privately to describe the pattern you have observed and its effect on the team, giving them the opportunity to become aware of and correct the behavior",
          C: "Loudly call out every interruption in real time in front of the group",
          D: "File a formal discrimination complaint immediately without attempting any direct or informal resolution"
        },
        best: "B",
        worst: "D",
        expBest: "Option B addresses the pattern through private, direct feedback - giving the colleague awareness and the opportunity to correct behavior that may be unconscious. This is proportionate and constructive.",
        expWorst: "Option D immediately files a formal complaint without any attempt at direct or informal resolution - disproportionate for behavior that appears unconscious, and skipping available intermediate steps that could resolve the issue more effectively."
      }
      ,{
        type: 'standalone',
        sub: "Professionalism",
        q: "You are the most junior person in a meeting with senior officials. During the discussion, you notice a significant factual error in the data being presented that will affect the decision being made. What would you do?",
        opts: {
          A: "Say nothing because raising an issue as the most junior person in the room would be presumptuous",
          B: "Politely and respectfully raise the factual concern at an appropriate moment, framing it as wanting to ensure the decision is based on accurate information",
          C: "Pass a written note to your supervisor pointing out the error and let them decide whether to raise it",
          D: "Wait until after the meeting and send a corrective email to all attendees"
        },
        best: "B",
        worst: "A",
        expBest: "Option B speaks up on a substantive factual matter that affects an important decision - junior rank does not remove the professional obligation to ensure decision-makers have accurate information, and doing so respectfully is always appropriate.",
        expWorst: "Option A allows a decision to proceed on inaccurate data to avoid the social discomfort of speaking up as the most junior person - placing personal social comfort above the professional obligation to ensure sound decisions."
      }
      ,{
        type: 'standalone',
        sub: "Interpersonal Effectiveness",
        q: "You are preparing a performance review for a direct report who has strong technical skills but whose interpersonal conduct has created friction with colleagues throughout the year. The technical work is excellent. What would you do?",
        opts: {
          A: "Rate only the technical performance highly and omit the conduct issues to avoid an awkward conversation",
          B: "Provide an accurate assessment of both technical performance and interpersonal conduct, with specific examples of each, delivered in a constructive and supportive tone",
          C: "Give an overall excellent rating to recognize the technical contribution and address the conduct issues in an informal side conversation",
          D: "Give a poor overall rating that reflects only the conduct issues to send a strong message"
        },
        best: "B",
        worst: "A",
        expBest: "Option B provides a complete, accurate, and fair assessment - recognizing genuine strengths while addressing real conduct issues with specific examples. An accurate performance record is both a legal obligation and a professional tool for development.",
        expWorst: "Option A omits documented conduct issues from a formal performance review - creating an inaccurate record, denying the employee feedback they need to improve, and potentially creating liability if the conduct issues later lead to a personnel action."
      }
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are preparing to lead a team meeting and realize that a presentation slide contains a quote attributed to a well-known figure that you cannot verify. The quote reinforces an important point in your presentation. What would you do?",opts:{A:"Use the quote as written since it effectively makes your point and is probably accurate",B:"Remove the quote or replace it with a verified source, and note in the meeting that you could not confirm the attribution",C:"Attribute the quote to 'unknown' to avoid misattribution while still using it",D:"Use the quote and tell the team you verified it to avoid any uncertainty"},best:"B",worst:"D",expBest:"Option B is transparent and accurate - removing or noting the unverified attribution protects the presentation's credibility and demonstrates intellectual honesty.",expWorst:"Option D uses a potentially fabricated quote and actively lies about having verified it - a direct integrity violation that could seriously damage your credibility if discovered."}
      ,{type:'standalone',sub:"Resource Management",q:"Your supervisor asks you to sign off on a financial report that you have not had time to review fully due to a competing urgent deadline. Your supervisor says it is 'probably fine.' What would you do?",opts:{A:"Sign the report because your supervisor vouched for it and you trust them",B:"Request a brief extension or ask a colleague to review the specific sections you could not complete, and sign only when you have adequate confidence in the content",C:"Sign the report but add a note that you did not review it fully",D:"Refuse to sign under any circumstances until you have read every line"},best:"B",worst:"A",expBest:"Option B finds a practical path to fulfilling the obligation - getting targeted assistance or a brief extension - without either abandoning your responsibility or blocking progress unnecessarily.",expWorst:"Option A signs a financial document you have not reviewed based solely on a supervisor's informal assurance - bypassing a personal accountability that exists precisely to catch errors the supervisor may not have caught."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A colleague who is also a friend begins coming to you daily with personal problems that are significantly affecting your own productivity. You care about their wellbeing but the situation is becoming unsustainable. What would you do?",opts:{A:"Abruptly stop responding to their messages to force them to seek help elsewhere",B:"Have an honest and compassionate conversation acknowledging your care for them while setting a clear boundary about the time and frequency of work-hour conversations, and encourage them to access employee assistance resources",C:"Continue listening as long as they need it because being a good colleague comes first",D:"Tell your supervisor about the situation so the supervisor can intervene"},best:"B",worst:"A",expBest:"Option B balances genuine care for the colleague with the professional necessity of protecting your own productivity - addressing the situation directly, compassionately, and constructively.",expWorst:"Option A's abrupt silence without explanation is unkind, likely to damage the friendship and working relationship severely, and does nothing to help the colleague find appropriate support."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You discover a significant error in a budget projection that your team submitted to senior leadership yesterday. The error substantially overstates available funding. Leadership has already begun making decisions based on the projection. What would you do?",opts:{A:"Wait to see if leadership notices the error on their own before deciding whether to disclose it",B:"Immediately notify your supervisor and prepare a corrected projection with a clear explanation of the error and its implications for decisions already made",C:"Quietly correct the projection in the next reporting cycle without drawing attention to the prior error",D:"Inform only the colleague who made the error and let them decide how to handle it"},best:"B",worst:"A",expBest:"Option B immediately surfaces the error through proper channels and provides the information leadership needs to reassess decisions made on incorrect data - the only response consistent with accountability and sound governance.",expWorst:"Option A waits passively while leadership continues making decisions on incorrect data - allowing preventable harm to compound and increasing the eventual cost of correction."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are assigned to a new post and learn that local business culture strongly favors building personal relationships before discussing substantive matters. You have a packed agenda of policy issues for your first meeting with a local counterpart. What would you do?",opts:{A:"Proceed directly with your agenda to maximize efficiency - professional counterparts will understand",B:"Invest time at the opening of the meeting in genuine relationship-building conversation, adjust your agenda accordingly, and accept that relationship investment is not wasted time but an investment in future effectiveness",C:"Apologize to the counterpart for the rushed nature of the meeting and explain that your headquarters requires immediate action",D:"Reschedule the meeting until you have had several informal social engagements with the counterpart first"},best:"B",worst:"A",expBest:"Option B adapts to local professional norms rather than imposing your own - a core diplomatic competency. Relationship investment typically increases long-term effectiveness even at some short-term cost to the agenda.",expWorst:"Option A proceeds with your own cultural assumptions over explicit knowledge of local professional norms - likely to damage the relationship from the first meeting and reduce your long-term effectiveness."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are asked to write a recommendation letter for a colleague who is applying for a competitive fellowship. You genuinely like the colleague but believe another candidate in your office is significantly more qualified. What would you do?",opts:{A:"Write the strongest possible letter for your colleague regardless of your honest assessment",B:"Be honest with your colleague that you do not feel you can write the strongest possible letter and offer to help them identify a recommender who can speak more compellingly to their qualifications",C:"Write a lukewarm letter without telling the colleague what you really think",D:"Agree to write the letter and ask the colleague to draft it themselves"},best:"B",worst:"C",expBest:"Option B is honest and helpful - telling the colleague the truth allows them to seek a recommender who can genuinely advocate for them, which serves their actual interests better than a weak letter would.",expWorst:"Option C writes a letter you already know will undermine the colleague's application without telling them - denying them the opportunity to seek a more effective recommender and potentially damaging their application through your inaction."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You are the team lead on a project and one team member consistently dominates discussions, talking over others and dismissing alternative ideas. Other team members have started disengaging. What would you do?",opts:{A:"Say nothing during meetings to avoid confrontation but privately reassure the quieter members",B:"Actively facilitate the meetings to ensure all voices are heard, use structured turn-taking if necessary, and speak privately with the dominant team member about the impact of their behavior",C:"Remove the dominant team member from the project",D:"Let the team resolve the dynamic on their own since interpersonal issues are not your responsibility as team lead"},best:"B",worst:"C",expBest:"Option B uses structured facilitation to address the dynamic in the meeting environment and private coaching to help the team member understand their impact - both proportionate and constructive.",expWorst:"Option C removes a team member for a behavioral issue that has not been addressed directly, coached, or escalated - disproportionate and procedurally improper as a first response."}
      ,{type:'standalone',sub:"Professionalism",q:"You are asked to take on a significant additional responsibility that is outside your current portfolio and for which you lack some relevant expertise. Your supervisor believes you are ready. What would you do?",opts:{A:"Decline because you are not fully qualified and do not want to risk failure",B:"Accept the responsibility, proactively identify the knowledge gaps you need to fill, and develop a plan to build the necessary expertise while performing the role",C:"Accept but do not tell your supervisor about your knowledge gaps to avoid appearing unprepared",D:"Accept only if the scope is narrowed to areas where you already have expertise"},best:"B",worst:"C",expBest:"Option B accepts developmental opportunity while being proactive about managing any competency gaps - the hallmark of a growth-oriented professional who takes informed risk and invests in their own development.",expWorst:"Option C accepts the role while concealing relevant limitations from the supervisor - setting up an information asymmetry that prevents the supervisor from providing appropriate support or adjusting expectations."}
      ,{type:'standalone',sub:"Information Management",q:"A journalist contacts you directly asking for comment on an internal agency matter that has not been cleared for public discussion. They indicate they are planning to publish a story soon and say your comment would help ensure accuracy. What would you do?",opts:{A:"Provide the information the journalist needs because ensuring accuracy in the press serves the public interest",B:"Tell the journalist you are not authorized to comment on the matter and refer them to the agency's public affairs office, then immediately notify your supervisor and public affairs of the contact",C:"Decline to comment and hang up without notifying anyone",D:"Tell the journalist informally and off the record to ensure the story is accurate while protecting yourself"},best:"B",worst:"A",expBest:"Option B correctly routes the inquiry through authorized channels, protects the agency from unauthorized disclosure, and ensures the contact is documented - all standard protocol for media inquiries.",expWorst:"Option A provides unauthorized comment on an internal matter to the press - a potential violation of agency policy, disclosure rules, and professional obligations, regardless of the stated goal of ensuring accuracy."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You notice that a colleague has been submitting timesheets claiming hours that do not match the actual hours you have both been working together in the office. The discrepancy appears intentional. What would you do?",opts:{A:"Confront the colleague directly and threaten to report them if they do not self-correct",B:"Report what you have observed to your supervisor or the appropriate oversight authority with specific factual documentation",C:"Say nothing because you cannot be completely certain the discrepancy is intentional",D:"Adjust your own timesheet to match theirs so you are not at a disadvantage"},best:"B",worst:"D",expBest:"Option B reports the observed discrepancy with factual documentation through appropriate channels - the correct response to apparent timesheet fraud, allowing trained investigators to determine intent.",expWorst:"Option D commits fraud yourself to match a colleague's potential fraud - this makes you directly culpable for a serious federal offense and is an egregious ethical failure."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"Your section is facing an unexpected staff emergency and you must choose which of two equally important tasks to delay. Both have external deadlines and stakeholders expecting delivery. What would you do?",opts:{A:"Delay whichever task is more recent since the older deadline takes priority by default",B:"Quickly assess which delay will cause the least harm, communicate proactively with both sets of stakeholders explaining the situation, and request revised timelines where possible",C:"Attempt to do both tasks simultaneously to the best of your ability without notifying either stakeholder",D:"Escalate the decision entirely to your supervisor without attempting any triage yourself"},best:"B",worst:"C",expBest:"Option B makes a reasoned prioritization decision and communicates transparently with stakeholders - giving them the information they need to adjust their plans and demonstrating professional judgment under pressure.",expWorst:"Option C attempts to do both tasks under-resourced without notifying anyone - likely resulting in both being done poorly and stakeholders being surprised by a failure they could have managed if informed."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"During a procurement evaluation, you realize you have a personal connection to one of the bidding companies through a family member who works there - a connection you forgot to disclose initially. What would you do?",opts:{A:"Continue the evaluation since you are confident you can remain impartial given your professional experience",B:"Immediately disclose the connection to the Contracting Officer and ethics official, and recuse yourself from any further participation in the evaluation",C:"Disclose the connection at the end of the process so it is on record but does not disrupt the evaluation",D:"Ask a colleague to take over only the final scoring without explaining why"},best:"B",worst:"A",expBest:"Option B immediately addresses a conflict of interest through the proper channels. Delayed or incomplete disclosure of conflicts undermines procurement integrity and could invalidate the entire process.",expWorst:"Option A proceeds without disclosure on a self-assessment of impartiality - the conflict of interest rules exist precisely because individuals are not reliable judges of their own impartiality. Proceeding without disclosure is a potential federal ethics violation."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You are mentoring a junior colleague who asks for honest feedback on a project that you believe was significantly below standard. The colleague seems proud of their work. What would you do?",opts:{A:"Tell them the work was good to preserve their confidence and morale",B:"Provide honest, specific, and constructive feedback that identifies both strengths and areas for improvement, framing it as investment in their development",C:"Tell them the work was poor without providing specific guidance on how to improve",D:"Avoid giving any direct feedback and redirect them to seek input from others"},best:"B",worst:"A",expBest:"Option B is honest and developmental - identifying specific issues while framing them constructively ensures the colleague has the information they need to improve, which is the fundamental purpose of mentorship.",expWorst:"Option A gives false positive feedback to protect short-term feelings at the expense of the colleague's actual development - a dereliction of the mentoring relationship that leaves them unprepared for future scrutiny."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are assigned to a post where the local professional culture expects senior officials to be addressed with formal titles at all times. A newly arrived American colleague addresses local counterparts by first name in a meeting, causing visible discomfort. What would you do?",opts:{A:"Correct the colleague publicly in the meeting to prevent further offense",B:"Smooth over the moment in the meeting and speak privately with the colleague afterward about local professional norms",C:"Say nothing because it is the colleague's responsibility to learn local customs",D:"Send an email to the whole team after the meeting reminding everyone of proper address protocols"},best:"B",worst:"A",expBest:"Option B manages the immediate situation diplomatically without publicly embarrassing the new colleague, then provides the necessary coaching privately - the approach most likely to achieve behavioral change and preserve relationships.",expWorst:"Option A publicly corrects the colleague in front of local counterparts - this compounds the awkwardness, embarrasses the colleague unnecessarily, and is likely more disruptive to the meeting than the original error."}
      ,{type:'standalone',sub:"Resource Management",q:"You are a supervisor and discover that a team member has been using agency equipment and supplies for personal projects during work hours without authorization. The equipment value involved is relatively small. What would you do?",opts:{A:"Ignore it because the value is small and addressing it will create unnecessary conflict",B:"Address it directly with the employee, document the conversation, and clearly establish that personal use of government resources is prohibited regardless of value",C:"Immediately terminate the employee without any prior conversation",D:"Tell the employee informally to stop without documenting anything"},best:"B",worst:"C",expBest:"Option B addresses the violation proportionately - a direct supervisory conversation with documentation establishes the expectation and creates a record, which is appropriate for a first offense of modest scope.",expWorst:"Option C immediately terminates an employee for a relatively minor first offense without any prior corrective action - disproportionate, procedurally improper, and likely unsustainable through the appeals process."}
      ,{type:'standalone',sub:"Professionalism",q:"You are leading a sensitive negotiation and the other party's representative makes an extreme and unreasonable opening proposal that you believe is a negotiating tactic. What would you do?",opts:{A:"Reject the proposal angrily and walk out of the negotiation to signal your seriousness",B:"Acknowledge the proposal professionally, express clearly that it does not reflect a workable starting point, and move the conversation toward areas of potential agreement",C:"Accept the proposal to show good faith and hope to negotiate back from it",D:"Counter with an equally extreme proposal to balance the dynamic"},best:"B",worst:"A",expBest:"Option B maintains professional composure, signals clearly that the proposal is unworkable without being dismissive, and keeps the negotiation moving constructively - the standard approach to extreme opening positions.",expWorst:"Option A's angry walkout escalates a normal negotiating tactic into a diplomatic incident, signals emotional rather than strategic decision-making, and may damage the relationship needed for eventual agreement."}
