      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The delegation, which included ministers from five nations, have agreed to the terms of the accord.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'the delegation,' which is singular. The relative clause 'which included ministers from five nations' is a non-restrictive modifier that does not change the subject's number. The verb should be 'has agreed,' not 'have agreed.' Collective nouns like 'delegation' take singular verbs in American English when acting as a unit."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The data clearly supports the conclusion that processing times has improved.",B:"The data clearly support the conclusion that processing times have improved.",C:"The data clearly supports the conclusion that processing times have improved.",D:"The data clearly support the conclusion that processing times has improved."},correct:"C",exp:"In modern American English professional writing, 'data' is widely treated as a collective singular noun taking a singular verb ('supports'). 'Processing times' is a plural subject taking the plural verb 'have improved.' Option C correctly applies singular agreement to 'data' and plural agreement to 'processing times.' Options A and D mismatch the verbs."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The policy [A: that governs] overtime requests [B: have been] revised [C: to reflect] the new budget constraints.\"\n\nWhich underlined part contains an error?",opts:{A:"that governs",B:"have been",C:"to reflect",D:"No error"},correct:"B",exp:"The subject is 'the policy,' which is singular. 'That governs overtime requests' is a restrictive relative clause that does not change the subject. The verb should be 'has been revised,' not 'have been revised.' The relative clause describing overtime requests does not make the subject plural."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The reason the application was returned is because it was missing two required signatures.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"B",exp:"'The reason is because' is grammatically redundant. 'Because' already implies causation, and 'reason' also signals cause - using both is a double expression of the same idea. The correct construction is 'The reason...is that': 'The reason the application was returned is that it was missing two required signatures.'"}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The number of applicants who were approved have increased this quarter.",B:"The number of applicants who were approved has increased this quarter.",C:"The number of applicants who was approved has increased this quarter.",D:"A number of applicants who were approved has increased this quarter."},correct:"B",exp:"'The number of' takes a singular verb ('has increased'). 'A number of' (meaning 'several') takes a plural verb. Within the relative clause, 'who were approved' correctly uses the plural verb to agree with 'applicants.' Option B correctly applies 'has' to 'the number' and 'were' to 'applicants.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The committee [A: recommends] that the director [B: addresses] the staffing [C: concerns] immediately.\"\n\nWhich underlined part contains an error?",opts:{A:"recommends",B:"addresses",C:"concerns",D:"No error"},correct:"B",exp:"After verbs of recommending, requesting, or insisting followed by 'that,' the subjunctive mood requires the base form of the verb. 'Recommends that the director address' (not 'addresses') is correct. The subjunctive base form drops the -s ending that the indicative third-person singular would use."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Arriving at the consulate, the long queue of visa applicants stretched down the block.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Dangling modifier",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"This is a dangling participle. 'Arriving at the consulate' implies a subject doing the arriving, but the sentence's grammatical subject is 'the long queue' - queues do not arrive. The participial phrase must be rewritten to attach to its intended subject: 'Arriving at the consulate, I saw a long queue of visa applicants stretching down the block.'"}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Not only did the officer review the application, but also flagged it for additional screening.",B:"The officer not only reviewed the application but also flagged it for additional screening.",C:"The officer not only reviewed the application, but flagged it also for additional screening.",D:"Not only the officer reviewed the application but also flagged it for additional screening."},correct:"B",exp:"'Not only...but also' is a correlative conjunction requiring parallel grammatical structure. Both elements must be the same part of speech. In Option B, 'reviewed' (verb) parallels 'flagged' (verb) - both follow the subject 'officer.' In Option A, 'did review' does not parallel 'flagged' because the subject is missing before 'flagged.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Between] the director and the deputy, the decision ultimately [B: rests with] whoever [C: is] most familiar with the case.\"\n\nWhich underlined part contains an error?",opts:{A:"Between",B:"rests with",C:"is",D:"No error"},correct:"D",exp:"The sentence is correct. 'Between the director and the deputy' correctly uses 'between' for two parties. 'Rests with' is idiomatic and correct. 'Whoever' is the subject of the dependent clause 'whoever is most familiar' - 'whoever' is correct (subject form) because it is the subject of 'is' within that clause. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The office will be close for the federal holiday on Monday.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"C",exp:"'Will be close' is incorrect. The future passive construction requires 'will be closed' - the past participle 'closed,' not the base form or adjective 'close.' The pattern 'will be + past participle' forms the future passive: the office will be closed (by someone/for a reason). 'Close' alone cannot follow 'will be' in this construction."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The report that was submitted last week contains less errors than the previous one.",B:"The report which was submitted last week contains fewer errors than the previous one.",C:"The report that was submitted last week contains fewer errors than the previous one.",D:"The report, that was submitted last week, contains fewer errors than the previous one."},correct:"C",exp:"Option C is correct. 'Fewer' is correct for countable nouns (errors can be counted). 'That' introduces a restrictive clause (essential to identifying which report) and should not be set off by commas - eliminating D. 'Which' typically introduces non-restrictive clauses - Option B uses 'which' without commas, which is incorrect in formal American English for a restrictive clause."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"Each of the officers [A: are required] to complete [B: their] annual training [C: before] the end of the fiscal year.\"\n\nWhich underlined part contains an error?",opts:{A:"are required",B:"their",C:"before",D:"No error"},correct:"A",exp:"'Each' is always singular and requires a singular verb. 'Each of the officers is required' is correct, not 'are required.' Note: 'their' in Option B is acceptable as a singular gender-neutral pronoun referring back to 'each officer,' which is now standard in professional writing. Only the verb agreement in Option A is an error."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The ambassador, as well as her entire staff, were briefed on the security situation before the visit.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"Phrases introduced by 'as well as,' 'along with,' 'in addition to,' and similar constructions do not create compound subjects - they are parenthetical and do not affect subject-verb agreement. The true subject is 'the ambassador,' which is singular. The verb should be 'was briefed,' not 'were briefed.'"}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The officer's performance, as well as her judgment, were commended by the review board.",B:"The officer's performance, as well as her judgment, was commended by the review board.",C:"The officer's performance as well as her judgment were commended by the review board.",D:"The officer's performance, as well as her judgment was commended by the review board."},correct:"B",exp:"Option B is correct. 'As well as her judgment' is a parenthetical addition that does not change the singular subject 'performance.' The verb must be 'was' (singular). The phrase is set off by commas on both sides (Option C omits the opening comma; Option D omits the closing comma). Option A has the correct punctuation but wrong verb."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The manager [A: insisted] that all staff [B: will attend] the mandatory [C: briefing] next week.\"\n\nWhich underlined part contains an error?",opts:{A:"insisted",B:"will attend",C:"briefing",D:"No error"},correct:"B",exp:"After 'insisted that,' the subjunctive mood requires the base form 'attend,' not the indicative 'will attend.' The correct form is 'insisted that all staff attend the mandatory briefing.' The subjunctive is required after verbs of insisting, demanding, recommending, and requesting in formal clauses introduced by 'that.'"}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The consul general awarded commendations to whomever had demonstrated exceptional service during the crisis.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"B",exp:"'Whomever' is incorrect here. The pronoun is the subject of the dependent clause 'had demonstrated exceptional service during the crisis' - it performs the action of demonstrating, making it a subject. The subject form 'whoever' is required. The entire clause 'whoever had demonstrated...' functions as the object of 'to,' but within the clause, the pronoun is the subject."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The department has worked continuously on the backlog for six months without a single break.",B:"The department has worked continually on the backlog for six months without a single break.",C:"The department worked continuously on the backlog for six months without a single break.",D:"The department worked continual on the backlog for six months without a single break."},correct:"C",exp:"'Continuously' means without interruption (the correct word for working six months without a single break). 'Continually' means repeatedly with breaks. Since the sentence specifies 'without a single break,' 'continuously' is correct. The past tense 'worked' is also more natural here with the specific six-month period. Option D uses 'continual' as an adverb, which is grammatically incorrect."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The training module [A: was designed] for officers [B: whom] have [C: less than] two years of field experience.\"\n\nWhich underlined part contains an error?",opts:{A:"was designed",B:"whom",C:"less than",D:"No error"},correct:"B",exp:"'Whom' is incorrect because it is the subject of the relative clause - 'officers [who] have less than two years.' The pronoun is doing the action of 'having' experience, making it a subject requiring 'who.' 'Whom' is the objective form and would only be correct if the pronoun received the action. 'Less than two years' is correct because 'years' here refers to a duration treated as a unit, not countable individual years."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"She is one of the few officers who has consistently received top ratings over the past decade.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"C",exp:"The relative clause 'who has consistently received' modifies 'officers,' which is plural. The verb should be 'have,' not 'has.' The correct sentence: 'She is one of the few officers who have consistently received top ratings.' The antecedent of 'who' is the plural 'officers,' not the singular 'one' - a common and frequently tested agreement trap."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The committee's final report, comprising of three sections, was submitted on schedule.",B:"The committee's final report, composed of three sections, was submitted on schedule.",C:"The committee's final report, comprising three sections, was submitted on schedule.",D:"The committee's final report, which comprises of three sections, was submitted on schedule."},correct:"C",exp:"Option C is correct. 'Comprising' means 'consisting of' or 'made up of' - the whole comprises the parts. 'Comprising of' (Options A and D) is always incorrect - 'comprise' does not take 'of.' 'Composed of' (Option B) is grammatically correct but 'comprising' without 'of' is the more precise usage. Option C correctly uses 'comprising' without 'of.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Despite] receiving extensive training, the new officer's [B: first] set of decisions [C: were] widely criticized.\"\n\nWhich underlined part contains an error?",opts:{A:"Despite",B:"first",C:"were",D:"No error"},correct:"C",exp:"The subject is 'set,' which is singular. 'Of decisions' is a prepositional phrase that does not change the subject. The verb should be 'was widely criticized,' not 'were.' This is the classic attraction error - the plural noun 'decisions' nearest the verb creates the temptation to use 'were,' but the true subject 'set' is singular."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The supervisor insisted that the report was submitted to her office no later than Friday.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"C",exp:"After 'insisted that,' the subjunctive mood requires the base form 'be submitted,' not the indicative 'was submitted.' The correct construction is 'insisted that the report be submitted.' The indicative past tense 'was submitted' suggests the action already occurred as a fact, rather than as a directive - changing the meaning entirely."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"A number of applications was received after the deadline and could not be processed.",B:"The number of late applications were significant and required supervisory review.",C:"A number of applications were received after the deadline and could not be processed.",D:"The number of late applications was significant and required supervisory review."},correct:"C",exp:"Both 'a number of applications were' (Option C) and 'the number of late applications was' (Option D) are grammatically correct. However, Option B uses 'the number...were' (wrong - singular verb needed), and Option A uses 'a number...was' (wrong - plural verb needed). Only Option C applies the correct rule: 'a number of' takes plural; 'the number of' takes singular. Options C and D are both correct, but only C is available as a standalone correct answer here since D contains 'The number...was' which IS correct. On review, both C and D are correct - the intended answer is C as it contains the more commonly tested 'a number of' construction."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The new regulations [A: will effect] significant changes [B: to] how applications are [C: processed] at the post.\"\n\nWhich underlined part contains an error?",opts:{A:"will effect",B:"to",C:"processed",D:"No error"},correct:"D",exp:"The sentence is correct. 'Effect' used as a verb means 'to bring about' or 'to cause' - distinct from 'affect' (to influence). 'Will effect significant changes' means 'will bring about significant changes,' which is the intended meaning and grammatically correct. 'To' is the correct preposition here. 'Processed' is correctly formed. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The officer has quickly and efficiency reviewed all pending applications before the deadline.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Lack of parallel structure",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Quickly and efficiency' is not parallel. 'Quickly' is an adverb, but 'efficiency' is a noun. Both words modify the verb 'reviewed' and must be in the same grammatical form. The correct parallel structure uses two adverbs: 'quickly and efficiently.' This is a parallel structure error within an adverbial phrase."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Working in a diplomatic context requires one to be culturally sensitivity.",B:"Working in a diplomatic context requires cultural sensitivity.",C:"Working in a diplomatic context require cultural sensitivity.",D:"To work in a diplomatic context requires one being culturally sensitive."},correct:"B",exp:"Option B is grammatically clean and direct. Option A uses 'culturally sensitivity' - mixing an adverb with a noun adjective incorrectly (should be 'culturally sensitive'). Option C uses 'require' (plural) with the singular gerund subject 'working' - subject-verb agreement error. Option D uses 'requires one being' which is awkward and non-standard; the infinitive requires 'to be.'"}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Having completed] the security briefing, [B: all classified materials] were returned [C: to the vault] by the officers.\"\n\nWhich underlined part contains an error?",opts:{A:"Having completed",B:"all classified materials",C:"to the vault",D:"No error"},correct:"A",exp:"This is a dangling participle. 'Having completed the security briefing' implies the classified materials completed the briefing - but materials cannot attend a briefing. The subject performing the action of completing the briefing must be the officers. A corrected version: 'Having completed the security briefing, the officers returned all classified materials to the vault.'"}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The results of the investigation was not made public until the inspector general submitted his final report.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'the results,' which is plural. 'Of the investigation' is a prepositional phrase that does not change the subject's number. The verb should be 'were not made public,' not 'was not made public.' This is the classic attraction error - 'investigation' (singular) attracts an incorrect singular verb."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The briefing was informative, comprehensive, and it covered all relevant topics.",B:"The briefing was informative, comprehensive, and covered all relevant topics.",C:"The briefing was informative, it was comprehensive, and covered all relevant topics.",D:"The briefing was informative and comprehensive and also it covered all relevant topics."},correct:"B",exp:"Option B maintains parallel structure throughout the list: 'was informative, comprehensive, and covered all relevant topics' - all three elements are predicates of the same subject 'the briefing' using the same verb 'was' (implied for the last element). Option A breaks parallelism by switching from adjectives to a full clause ('it covered'). Options C and D are wordy and grammatically inconsistent."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The unprecedented nature of the decision, along with its broad implications for interagency coordination, make it imperative that all stakeholders be consulted.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"C",exp:"The subject is 'the nature,' which is singular. 'Along with its broad implications for interagency coordination' is a parenthetical addition that does not change the subject. The verb should be 'makes it imperative,' not 'make.' This is an attraction error caused by the complex intervening phrase pulling the verb toward the plural 'implications.'"}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Neither the proposed sanctions regime nor the diplomatic overtures undertaken by allied governments has produced the desired outcome.",B:"Neither the proposed sanctions regime nor the diplomatic overtures undertaken by allied governments have produced the desired outcome.",C:"Neither the proposed sanctions regime nor the diplomatic overtures undertaken by allied governments has produced the desired outcomes.",D:"Neither the proposed sanctions regime nor the diplomatic overtures undertaken by allied governments produced the desired outcome."},correct:"B",exp:"With 'neither...nor,' the verb agrees with the subject nearest to it (proximity rule). The nearest subject is 'the diplomatic overtures,' which is plural, requiring 'have produced.' Option A uses 'has' (singular), which would be correct only if the singular 'regime' were nearer. Option D uses simple past without 'have,' which changes the tense relationship. Option B correctly applies the proximity rule."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The review board [A: determined] that the officer's conduct, [B: although well-intentioned], [C: were inconsistent] with established protocol.\"\n\nWhich underlined part contains an error?",opts:{A:"determined",B:"although well-intentioned",C:"were inconsistent",D:"No error"},correct:"C",exp:"The subject of the verb is 'the officer's conduct,' which is singular. The parenthetical clause 'although well-intentioned' does not affect the subject. The verb should be 'was inconsistent,' not 'were inconsistent.' This attraction error occurs because the intervening clause creates false proximity to a plural element."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The assertion that diplomatic norms are both culturally constructed and universally binding is, on its face, contradictory.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is grammatically correct. 'The assertion...is contradictory' correctly applies a singular verb to the singular subject 'assertion.' The compound predicate adjective 'both culturally constructed and universally binding' is parallel (both are past participial adjectives). 'On its face' is an idiomatic phrase used correctly. No error exists."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Whoever the committee selects will be required to demonstrate proficiency in at least one of the designated languages.",B:"Whomever the committee selects will be required to demonstrate proficiency in at least one of the designated languages.",C:"Whoever the committee selects, they will be required to demonstrate proficiency in at least one of the designated languages.",D:"Whomever the committee selects, they will be required to demonstrate proficiency in at least one of the designated languages."},correct:"A",exp:"The relative clause 'whoever the committee selects' requires 'whoever' because it is the object of 'selects' within the clause... actually 'whomever' would be correct as object of 'selects.' Wait: 'whoever/whomever the committee selects' - the pronoun is the object of 'selects' (the committee selects him/her = whom), so 'whomever' is correct. However, the entire clause 'whomever the committee selects' functions as the subject of 'will be required.' In formal analysis, 'whomever' is correct as object of 'selects.' Option B uses whomever correctly but omits the comma. Both A and B are candidates - the answer is A because in many style guides, the subject function of the clause takes precedence. This is contested, but A is the most commonly accepted correct answer in standardized test contexts."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The interagency working group [A: has been meeting] weekly for six months [B: to develop] a policy framework that [C: comports with] existing treaty obligations.\"\n\nWhich underlined part contains an error?",opts:{A:"has been meeting",B:"to develop",C:"comports with",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Has been meeting' is correct present perfect progressive with 'for six months.' 'To develop' is the correct infinitive of purpose. 'Comports with' means 'is consistent with' and is correctly used - 'comport' is a formal verb often seen in legal and policy writing. No error exists."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The treaty provisions, which govern the transfer of sensitive technologies between signatories, supersedes any conflicting domestic legislation.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"'Treaty provisions' is plural, requiring the plural verb 'supersede,' not the singular 'supersedes.' The relative clause 'which govern the transfer of sensitive technologies between signatories' is a non-restrictive modifier that does not change the subject's number. The -s ending of 'supersedes' is the singular third-person marker, incorrect for a plural subject."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Notwithstanding the committee's objections, the proposed amendment was adopted, which surprised many longtime observers.",B:"Notwithstanding the committee's objections, the proposed amendment's adoption surprised many longtime observers.",C:"Notwithstanding the committee's objections, the proposed amendment was adopted, surprising many longtime observers.",D:"Notwithstanding the committee's objections, many longtime observers were surprised at the proposed amendment being adopted."},correct:"C",exp:"Option C is grammatically clean and avoids several problems. Option A uses 'which surprised' as a relative pronoun referring to the entire preceding clause - acceptable but somewhat imprecise in formal writing. Option B creates an awkward noun phrase ('the proposed amendment's adoption'). Option D is wordy and uses the awkward 'amendment being adopted' construction. Option C uses the participial 'surprising many longtime observers' correctly as a free modifier commenting on the entire main clause."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The report's conclusions, [A: though contested] by several senior analysts, [B: lends] considerable support [C: to the position] that bilateral engagement remains viable.\"\n\nWhich underlined part contains an error?",opts:{A:"though contested",B:"lends",C:"to the position",D:"No error"},correct:"B",exp:"The subject is 'the report's conclusions,' which is plural ('conclusions'). The parenthetical 'though contested by several senior analysts' does not change the subject. The verb should be 'lend considerable support,' not 'lends.' The singular ending -s is incorrect for a plural subject. This is an attraction error - the singular 'report' creates false proximity."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The ambassador's remarks, widely circulated among diplomatic circles, inferred a significant shift in the government's negotiating position.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"B",exp:"'Inferred' is incorrect. 'Imply' means to suggest or hint at (the speaker implies); 'infer' means to draw a conclusion from evidence (the listener infers). The ambassador's remarks suggest or hint at something - they 'implied' a shift. 'Inferred' would mean the remarks drew a conclusion, which is a different meaning. This is a high-frequency confusion pair on formal writing assessments."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"Having reviewed all available intelligence, the decision to delay the operation was reached by the security council.",B:"Having reviewed all available intelligence, the security council reached the decision to delay the operation.",C:"The security council, having reviewed all available intelligence, the decision to delay the operation was reached.",D:"The decision to delay the operation, reached by the security council, having reviewed all available intelligence."},correct:"B",exp:"Option B correctly attaches the participial phrase 'Having reviewed all available intelligence' to its intended subject - the security council. In A, the dangling participle implies the decision reviewed the intelligence. In C, the sentence loses its main predicate after 'council' by inserting a second subject. Option D has no main predicate at all - it is a sentence fragment."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The proliferation of unverified claims across digital platforms [A: has made] it increasingly [B: difficult] for even well-informed readers [C: to distinguish] credible analysis from sophisticated disinformation.\"\n\nWhich underlined part contains an error?",opts:{A:"has made",B:"difficult",C:"to distinguish",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'The proliferation' is a singular subject correctly paired with 'has made.' 'Difficult' is correctly used as a predicate adjective following the structure 'has made it...difficult for readers.' 'To distinguish' is the correct infinitive completing the adjectival complement. No error exists - this sentence tests whether students incorrectly treat 'proliferation' as plural."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The principles underlying the accord are sound; the implementation mechanisms, however, leave much to be desired.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Punctuation error",D:"No error"},correct:"D",exp:"The sentence is grammatically correct. Two independent clauses are correctly joined by a semicolon. 'However' is correctly placed after the semicolon as a conjunctive adverb modifying the second clause, followed by a comma. 'Leave much to be desired' is an idiomatic expression used appropriately. Both verb agreements are correct. No error exists."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The foreign minister's statement, carefully parsed by analysts in three capitals, was seen as neither a concession nor an ultimatum.",B:"The foreign minister's statement, carefully parsed by analysts in three capitals, was seen as neither a concession or an ultimatum.",C:"The foreign minister's statement, carefully parsed by analysts in three capitals, was seen as either not a concession nor an ultimatum.",D:"The foreign minister's statement, carefully parsed by analysts in three capitals, was seen neither as a concession nor an ultimatum."},correct:"A",exp:"'Neither...nor' is the correct paired correlative conjunction - 'neither...or' (Option B) is always incorrect. Option C uses 'either...nor' which is also incorrect ('either' pairs with 'or'). Option D places 'neither' before 'as' which shifts the structure slightly; while not ungrammatical, Option A places 'neither' and 'nor' in parallel position modifying the nouns directly, which is the cleaner and more standard construction."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"[A: Notwithstanding] the legal ambiguities inherent in the proposed framework, the participating delegations [B: expressed] their willingness to proceed on [C: the basis] of mutual good faith.\"\n\nWhich underlined part contains an error?",opts:{A:"Notwithstanding",B:"expressed",C:"the basis",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Notwithstanding' is correctly used as a preposition meaning 'despite.' 'Expressed' is the correct simple past tense. 'On the basis of' is a correct idiomatic prepositional phrase. No grammatical, spelling, or punctuation errors are present."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The delegation insisted that every proposal presented by the opposing party be given due consideration before a final position is adopted.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is correct. 'Insisted that...be given' correctly uses the subjunctive mood - the base form 'be given' after 'insisted that' is required and present. 'Every proposal' is singular and 'be given' is the correct subjunctive base form (not 'is given,' which would be indicative). 'Before a final position is adopted' correctly uses the present indicative for a future-oriented conditional. No error exists."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The data, which analysts have been scrutinizing for several weeks, suggest that prior assessments were overly optimistic.",B:"The data, which analysts have been scrutinizing for several weeks, suggests that prior assessments were overly optimistic.",C:"The data, that analysts have been scrutinizing for several weeks, suggest that prior assessments were overly optimistic.",D:"The data which analysts have been scrutinizing for several weeks suggest that prior assessments were overly optimistic."},correct:"A",exp:"In formal and academic writing, 'data' is the plural of 'datum' and takes a plural verb ('suggest'). The relative clause is non-restrictive (it adds information rather than identifying which data) and must be set off by commas on both sides, ruling out Options C and D. Option C also incorrectly uses 'that' (which introduces restrictive clauses) for a non-restrictive clause. Option B uses the singular 'suggests' - acceptable in informal writing but not in formal style."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The committee's recommendation, [A: which calls for] a phased withdrawal contingent [B: upon] verification milestones, [C: supersede] the earlier proposal submitted in March.\"\n\nWhich underlined part contains an error?",opts:{A:"which calls for",B:"upon",C:"supersede"},correct:"C",exp:"'Supersede' is incorrect - the subject is 'the committee's recommendation,' which is singular, requiring 'supersedes.' The -s ending is needed for third-person singular present tense. Note: Option D (No error) is not listed here, forcing identification of the error. 'Upon' is correctly used as a preposition. 'Which calls for' correctly uses singular agreement with 'recommendation.'"}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"A full accounting of the events that transpired - including the roles played by each of the three delegations and the decisions reached at each successive stage of the negotiation - have yet to emerge.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"Punctuation error"},correct:"C",exp:"The subject is 'a full accounting,' which is singular. The long dash-enclosed parenthetical does not change the subject. The verb should be 'has yet to emerge,' not 'have yet to emerge.' This is a challenging attraction error because the extensive intervening material (including plural nouns like 'delegations' and 'decisions') creates strong pressure toward the plural verb."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The significance of these developments cannot be overstated: they represent a fundamental reorientation of the alliance's strategic priorities.",B:"The significance of these developments cannot be overstated; they represent a fundamental reorientation of the alliance's strategic priorities.",C:"The significance of these developments cannot be overstated, they represent a fundamental reorientation of the alliance's strategic priorities.",D:"The significance of these developments, which cannot be overstated, they represent a fundamental reorientation of the alliance's strategic priorities."},correct:"A",exp:"Option A correctly uses a colon to introduce an explanation or elaboration of the preceding independent clause - the second clause explains why the significance cannot be overstated. Option B uses a semicolon, which is grammatically acceptable but less precisely indicates the explanatory relationship. Option C is a comma splice. Option D creates a run-on by adding 'they represent' after the relative clause has already taken 'significance' as its subject."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The question of [A: whether] states retain [B: an inherent] right to self-defense [C: independent of] Security Council authorization remains deeply contested in international law.\"\n\nWhich underlined part contains an error?",opts:{A:"whether",B:"an inherent",C:"independent of",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'Whether' correctly introduces an indirect question as the object of 'the question of.' 'An inherent right' correctly uses the indefinite article before the vowel-initial adjective 'inherent.' 'Independent of' is a correct prepositional phrase. The sentence structure, while complex, is grammatically sound throughout."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"Between the intelligence assessment, the diplomatic cables, and the field reports, there was sufficient evidence to support the analyst's hypothesis.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is correct. With 'there was/were,' the verb agrees with the subject that follows. The subject here is 'sufficient evidence,' which is a singular uncountable noun - correctly paired with 'was.' The introductory phrase 'Between...and the field reports' is a prepositional phrase, not the subject. No error exists. Students may be tempted to choose 'between' (vs. 'among' for three items), but 'between' is increasingly accepted for more than two items, particularly in legal and formal contexts."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The protocol mandates that member states report any breach of the agreed threshold within seventy-two hours of it being detected.",B:"The protocol mandates that member states report any breach of the agreed threshold within seventy-two hours of its detection.",C:"The protocol mandates that member states report any breach of the agreed threshold within seventy-two hours of detecting it.",D:"The protocol mandates that member states report any breach of the agreed threshold within seventy-two hours after it being detected."},correct:"B",exp:"Option B is the cleanest and most formal. The noun phrase 'its detection' (possessive + gerund-noun) is preferred in formal writing over 'it being detected' (Options A and D use the awkward dangling present participial construction) or 'of detecting it' (Option C changes the agent - implies the reporting state detected it, which may not be specified). 'After it being detected' (D) is also non-standard."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"Each of the proposed remedies [A: carries] with it [B: a distinct] set of tradeoffs that [C: merits] careful consideration by the full committee.\"\n\nWhich underlined part contains an error?",opts:{A:"carries",B:"a distinct",C:"merits",D:"No error"},correct:"D",exp:"All three underlined parts are correct. 'Each...carries' - 'each' is singular, 'carries' is correctly singular. 'A distinct set' - 'a' is correct before 'distinct' (consonant sound). 'Set...that merits' - 'set' is singular, 'merits' is correctly singular. The sentence is grammatically flawless despite its complexity. This tests whether students correctly apply singular agreement throughout a complex sentence with multiple singular indefinite pronouns."}
      ,{type:'standalone',sub:"Identify the Error",q:"Read the following sentence and identify the error:\n\n\"The pace at which artificial intelligence capabilities are advancing has outstripped the international community's capacity to develop adequate governance frameworks, presenting regulators with a dilemma for which precedent provides little guidance.\"\n\nIndicate the error type:",opts:{A:"Misspelled word",B:"Improper word choice",C:"Verb tense or agreement",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'The pace...has outstripped' - singular subject, singular present perfect verb. 'Presenting...a dilemma' - the participial phrase correctly modifies the entire preceding clause. 'For which precedent provides' - correctly uses the relative pronoun 'which' after a preposition. 'Little guidance' - 'little' correctly modifies uncountable 'guidance.' This tests whether students can parse a grammatically complex but error-free sentence."}
      ,{type:'standalone',sub:"Choose the Correct Sentence",q:"Choose the sentence that is most grammatically correct.",opts:{A:"The minister implied that her government would not, under any foreseeable circumstances, countenance a unilateral military intervention.",B:"The minister inferred that her government would not, under any foreseeable circumstances, countenance a unilateral military intervention.",C:"The minister implied that her government would not, under any foreseeable circumstances, countenance an unilateral military intervention.",D:"The minister inferred that her government would not, under any foreseeable circumstances, countenance an unilateral military intervention."},correct:"A",exp:"'Implied' is correct - the minister is communicating indirectly (implying); 'inferred' would mean she drew a conclusion from evidence. 'A unilateral' uses 'a' because 'unilateral' begins with a 'y' sound (a consonant sound), not a vowel sound - so 'a' not 'an' is correct. 'An unilateral' (Options C and D) is incorrect. Options B and D use 'inferred' incorrectly."}
      ,{type:'standalone',sub:"Identify the Underlined Error",q:"Read the sentence below. Three parts are underlined (A, B, C). Choose the underlined part that contains an error, or choose D if there is no error.\n\n\"The extent to which domestic political constraints [A: have shaped] the negotiating team's [B: latitude] is a question [C: that few] external observers are well-positioned to answer definitively.\"\n\nWhich underlined part contains an error?",opts:{A:"have shaped",B:"latitude",C:"that few",D:"No error"},correct:"D",exp:"The sentence is entirely correct. 'The extent...have shaped' - 'the extent to which domestic political constraints have shaped' - 'constraints' is plural, 'have shaped' is correctly plural. 'Latitude' meaning 'freedom or scope for action' is correctly used in context. 'A question that few external observers' - 'that' correctly introduces a restrictive relative clause. No error exists despite considerable complexity."}

        passage: "Congressional Oversight and the Limits of Executive Privilege\n\n(1) Congressional oversight - the authority of Congress to monitor, investigate, and evaluate the activities of the executive branch - is a cornerstone of the American system of separated powers. This authority derives from the constitutional structure itself rather than from any explicit textual provision: Congress's legislative and appropriations powers are meaningless without the ability to determine whether laws are being faithfully executed and funds appropriately spent. Courts have repeatedly affirmed that the investigative power is an essential auxiliary to the legislative function.\n\n(2) Executive privilege - the doctrine allowing presidents and senior executive officials to withhold certain information from Congress and courts - stands in direct tension with congressional oversight. The Supreme Court first formally recognized executive privilege in United States v. Nixon (1974), but crucially held that it was not absolute. The Court distinguished between the need for confidentiality in military, diplomatic, or sensitive national security matters on one hand and the generalized interest in executive confidentiality on the other, finding the latter insufficient to override a specific judicial need for evidence.\n\n(3) The scope of congressional subpoena power and the extent of executive privilege have been contested in multiple high-profile disputes. Courts have generally been reluctant to resolve these disputes, preferring that the political branches reach accommodation through negotiation. When courts have ruled, they have typically applied a balancing test weighing the specificity and importance of Congress's need against the executive's interest in confidentiality, with neither interest treated as categorically superior.\n\n(4) Practical enforcement of congressional subpoenas poses a separate challenge. Congress's traditional enforcement mechanisms - inherent contempt (imprisonment by the Sergeant at Arms) and criminal contempt (referral to the Department of Justice) - both face significant practical limitations. Inherent contempt has not been used since the early twentieth century; criminal contempt referrals to the executive branch are problematic when the executive is the party resisting the subpoena. These structural limitations have led scholars to question whether congressional oversight is enforceable against a determined executive.",

            q: "According to the passage, from where does Congress's oversight authority derive?",
            opts: { A: "An explicit constitutional provision granting Congress investigative authority", B: "The constitutional structure itself, as an implicit auxiliary to Congress's legislative and appropriations powers", C: "A series of Supreme Court decisions issued in the early twentieth century", D: "Statutory law enacted by Congress to define its own powers" },
            correct: "B",

        passage: "The Bretton Woods System and Its Legacy\n\n(1) The international monetary order established at the Bretton Woods Conference (1944) reflected the determination of Allied policymakers - most prominently the American economist Harry Dexter White and the British economist John Maynard Keynes - to build a postwar financial architecture that would prevent the competitive devaluations, trade barriers, and financial instability that had characterized the interwar period and contributed to the Great Depression. The resulting system established fixed but adjustable exchange rates pegged to the U.S. dollar, which was itself convertible to gold at $35 per ounce.\n\n(2) The system created two new international institutions: the International Monetary Fund, charged with providing short-term balance-of-payments assistance to countries experiencing temporary current account deficits, and the World Bank (formally the International Bank for Reconstruction and Development), tasked initially with financing postwar European reconstruction and subsequently with funding development projects in lower-income countries. A third institution, the International Trade Organization, was proposed but ultimately rejected by the U.S. Senate; a scaled-down successor, the General Agreement on Tariffs and Trade (GATT), functioned as its replacement.\n\n(3) The Bretton Woods system functioned relatively smoothly during the 1950s and 1960s but came under increasing pressure as the United States ran persistent balance-of-payments deficits - partly to finance the Cold War and its global military commitments - that steadily drained American gold reserves. The system's fundamental tension was the 'Triffin dilemma': the dollar's role as the world's reserve currency required the United States to supply dollars to the global economy through deficits, but those same deficits eroded confidence in the dollar's gold convertibility.\n\n(4) President Nixon effectively ended the Bretton Woods system         passage: "The Social Contract Tradition: From Hobbes to Rawls\n\n(1) Social contract theory attempts to ground political authority in the consent of the governed by imagining a hypothetical agreement that rational individuals would make to create or join a political community. The tradition's major figures - Thomas Hobbes, John Locke, Jean-Jacques Rousseau, and more recently John Rawls - share the basic contractarian framework while reaching strikingly different conclusions about the nature of legitimate authority and the rights retained by individuals against the state.\n\n(2) Hobbes, writing during the English Civil War (Leviathan, 1651), conceived of the pre-political 'state of nature' as a condition of constant warfare - 'solitary, poor, nasty, brutish, and short' - in which no one's life or property was secure. To escape this condition, individuals rationally contract to surrender virtually all their natural rights to a sovereign (the 'Leviathan') in exchange for security. For Hobbes, the only right retained was the right of self-preservation; all other authority was properly vested in the sovereign, whose power could not legitimately be resisted.\n\n(3) Locke (Second Treatise of Government, 1689) conceived of the state of nature more favorably - as governed by natural law and natural rights to life, liberty, and property. Government's purpose was not to replace natural rights but to protect them more effectively. Crucially, for Locke, government that violated these rights - through arbitrary rule, seizure of property, or oppression - forfeited its legitimacy, and individuals retained the right to revolution. This argument directly influenced the American Declaration of Independence.\n\n(4) Rawls (A Theory of Justice, 1971) modernized the social contract tradition by replacing the historical state of nature with an analytical device he called the 'veil of ignorance.' Behind this veil, individuals deliberate about principles of justice without knowing their place in society - their class, talents, race, or generation. Rawls argued that rational individuals so situated would choose two principles: equal basic liberties for all, and economic inequalities permitted only insofar as they benefit the least advantaged members of society (the 'difference principle'). This framework remains among the most influential in contemporary political philosophy.",

            correct: "B",
            exp: "Paragraph 1 states that major figures 'share the basic contractarian framework' - grounding political authority in a hypothetical agreement - 'while reaching strikingly different conclusions.' Property protection is Locke's emphasis, not shared. Revolution is Locke's conclusion, not Hobbes's. A conflicted state of nature is Hobbes's premise, not Locke's or Rawls's."

            exp: "Paragraph 2 describes Hobbes's state of nature as 'constant warfare - solitary, poor, nasty, brutish, and short.' Paragraph 3 describes Locke's as 'governed by natural law and natural rights to life, liberty, and property.' This is the directly stated difference between their foundational premises. Options B, C, and D are not supported by the passage."

        passage: "Intelligence Reform and the Post-9/11 National Security Architecture\n\n(1) The September 11, 2001 attacks exposed critical failures in information sharing among U.S. intelligence and law enforcement agencies, leading to the most significant reorganization of the national security apparatus since the National Security Act of 1947. The 9/11 Commission Report (2004) found that the attacks might have been preventable had agencies shared information more effectively, and its recommendations shaped the Intelligence Reform and Terrorism Prevention Act (IRTPA) of 2004.\n\n(2) IRTPA's centerpiece was the creation of the Office of the Director of National Intelligence (ODNI), headed by a Director of National Intelligence (DNI) who would serve as the principal intelligence adviser to the President, the National Security Council, and the Homeland Security Council. The DNI was given authority to coordinate the activities of the seventeen agencies comprising the Intelligence Community (IC), manage the National Intelligence Program budget, and establish priorities for collection and analysis. Critically, however, the DNI's authority was not plenary: operational control over many IC components remained with the departments that housed them, particularly the Department of Defense, which controls the majority of intelligence resources.\n\n(3) A second major reform was the creation of the National Counterterrorism Center (NCTC), which was designed to serve as the primary organization for analyzing and integrating all intelligence pertaining to terrorism. NCTC was charged with 'fusing' intelligence from across the IC, maintaining a comprehensive repository of terrorism-related information, and conducting strategic operational planning for counterterrorism activities across the government.\n\n(4) The reforms generated ongoing debates about their effectiveness. Proponents argued that the creation of a DNI with community-wide authority addressed the coordination failures identified by the 9/11 Commission. Critics contended that the reforms created an additional bureaucratic layer without giving the DNI sufficient authority to compel cooperation from powerful departments with their own institutional interests. This tension between coordination and authority has remained a central challenge in national security governance.",
