      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You have been asked to lead a cross-agency working group on a topic where you have significant expertise. Several members of the group are more senior than you in rank. What would you do?",opts:{A:"Defer to the most senior members on all substantive decisions to avoid appearing presumptuous",B:"Lead the group effectively using your substantive expertise, maintain appropriate professional respect for seniority, and create space for all members' input while keeping the group focused on its mandate",C:"Establish authority by firmly asserting your expertise and limiting debate to keep the process efficient",D:"Recommend that a more senior person lead the group to avoid awkwardness"},best:"B",worst:"A",expBest:"Option B balances substantive leadership with professional respect - leading from expertise while honoring the collaborative nature of a working group and the experience of more senior members.",expWorst:"Option A abdicates the substantive leadership role you were specifically asked to fill out of deference to rank - undermining the purpose of your appointment and potentially producing a weaker outcome for the group."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are aware that a colleague has been spreading inaccurate information about another colleague's professional performance to others in the office. You have heard this secondhand. What would you do?",opts:{A:"Spread a counter-narrative defending the targeted colleague's actual performance",B:"Speak privately with the spreading colleague about the impact of circulating unverified information, and if the behavior continues, report the pattern to a supervisor",C:"Report the colleague immediately to HR for defamation without speaking to anyone else",D:"Do nothing because you only heard this secondhand and cannot be certain it is accurate"},best:"B",worst:"A",expBest:"Option B addresses the behavior directly and privately, proportionate to what you know while acknowledging the limits of secondhand information - the appropriate first step before escalation.",expWorst:"Option A joins in the office gossip cycle by spreading counter-narratives - contributing to the same destructive dynamic you are trying to counter and worsening the overall environment."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are conducting an important interview when the applicant becomes suddenly and visibly unwell - appearing dizzy and pale. They have traveled a long distance for this appointment. What would you do?",opts:{A:"Continue the interview quickly to finish before their condition worsens",B:"Immediately suspend the interview, ensure the applicant receives any necessary medical attention, and reschedule the appointment once they have recovered",C:"Ask the applicant if they want to continue and proceed if they say yes",D:"Note the medical situation in the file and deny the application on procedural grounds for not completing the interview"},best:"B",worst:"D",expBest:"Option B prioritizes the welfare of a person in clear physical distress - suspending the interview and ensuring they receive care. An interview appointment can be rescheduled; a person's health cannot be retroactively protected.",expWorst:"Option D denies the application for a procedural failure caused by a medical emergency - a callous and unjust outcome that punishes the applicant for becoming ill, with no basis in sound adjudicatory practice."}
      ,{type:'standalone',sub:"Information Management",q:"You receive a request from your counterpart in a partner government for sensitive data that would normally require a formal information-sharing agreement. Your counterpart says the request is urgent and asks you to share the data informally to save time. What would you do?",opts:{A:"Share the data because you trust your counterpart and the urgency is genuine",B:"Explain that the data requires a formal information-sharing agreement, decline to share informally, and work to expedite the proper process given the urgency",C:"Share a portion of the data that seems less sensitive as a compromise",D:"Tell your counterpart you will consider it and delay while hoping the urgency passes"},best:"B",worst:"A",expBest:"Option B maintains the integrity of information-sharing protocols while acknowledging the urgency and working to address it through legitimate means - the correct balance between responsiveness and legal compliance.",expWorst:"Option A shares sensitive data without a required formal agreement based on trust and urgency - bypassing protections that exist precisely for situations where informal assurances seem adequate but formal accountability is needed."}
      ,{type:'standalone',sub:"Professionalism",q:"You are facilitating a training session when a participant asks a question that reveals a significant gap in your own knowledge on the topic. Other participants are watching for your response. What would you do?",opts:{A:"Provide a confident-sounding answer based on what you think is likely correct to maintain your authority",B:"Acknowledge honestly that you do not have a complete answer to that specific question, commit to finding the accurate information, and follow up with the group after the session",C:"Redirect the question to another participant to avoid revealing the gap",D:"Tell the participant the question is outside the scope of the training to deflect it"},best:"B",worst:"A",expBest:"Option B demonstrates intellectual honesty and models the professional behavior of knowing the limits of one's knowledge - far more credible than a confident wrong answer, and more useful to the participants.",expWorst:"Option A provides a fabricated or speculative answer presented as confident fact to maintain appearances - an integrity violation that could propagate incorrect information to all participants in the training."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A team member who previously reported to you receives a promotion and is now your peer. They appear uncomfortable with the changed dynamic and occasionally defer to you in group settings in ways that undermine their own authority. What would you do?",opts:{A:"Accept their deference as a natural adjustment period and allow the dynamic to continue",B:"Speak privately with the former report to acknowledge the changed dynamic, affirm their new peer status, and consciously model the peer relationship in group settings",C:"Speak to your supervisor about the awkward dynamic and ask for their advice",D:"Correct the deference publicly in meetings to reinforce the peer relationship clearly"},best:"B",worst:"A",expBest:"Option B actively supports the new peer's transition by acknowledging the dynamic directly and modeling the changed relationship - helping them establish their authority with the team.",expWorst:"Option A passively allows the former dynamic to persist - denying the new peer the space to establish their authority and potentially undermining their effectiveness in the new role indefinitely."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"Your team has been working under intense pressure for several weeks and morale is clearly suffering. You are not the supervisor but you are senior. What would you do?",opts:{A:"Wait for the supervisor to notice and address the morale issue",B:"Raise the morale issue with the supervisor if they have not acted, and take small, genuine actions within your own capacity - acknowledging effort, facilitating informal connection - to help the team sustain energy",C:"Tell the team to push through since the workload is temporary",D:"Complain about the workload to leadership to force an intervention"},best:"B",worst:"D",expBest:"Option B takes both a direct action (raising the issue with the supervisor) and meaningful human actions within your sphere to support the team - balancing systemic advocacy with immediate support.",expWorst:"Option D complains to leadership in a way framed as pressure rather than as a constructive assessment - creating the impression of disloyalty or insubordination rather than professional advocacy for your team."}
      ,{type:'standalone',sub:"Resource Management",q:"You are allocated funding for a training program that you know your team genuinely needs. However, you also know the agency is facing broader budget pressures and the funds could arguably be returned or redirected. What would you do?",opts:{A:"Return the funds proactively to demonstrate fiscal responsibility",B:"Use the allocated funds for their intended purpose - the training your team needs - and document the rationale and outcomes to demonstrate value",C:"Hold the funds unspent in case a more pressing need arises later in the year",D:"Spend the funds quickly on other items to avoid losing them at year end"},best:"B",worst:"D",expBest:"Option B uses allocated funds for their intended legitimate purpose and documents outcomes - this is proper stewardship. Allocated funds for genuine needs should be used; the documentation demonstrates accountability.",expWorst:"Option D spends allocated funds on items other than the intended purpose to avoid losing them - a misuse of appropriated funds that likely violates fiscal law and is the opposite of responsible stewardship."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are the acting section chief while your supervisor is on extended leave. A junior officer makes a significant error in judgment on a case that has attracted media attention. Your supervisor is reachable but is on leave. What would you do?",opts:{A:"Make all decisions independently to avoid bothering your supervisor during their leave",B:"Assess the severity of the situation and, given the media attention and potential significance, notify your supervisor and seek guidance while beginning to manage the immediate situation using your best judgment",C:"Refer all inquiries to your supervisor's email and take no action until they respond",D:"Issue a public statement immediately to get ahead of the media attention without consulting anyone"},best:"B",worst:"D",expBest:"Option B exercises judgment about the severity of the situation, determines it warrants notifying your supervisor, and manages the immediate situation responsibly while seeking guidance - the appropriate balance of initiative and accountability.",expWorst:"Option D issues a public statement on a sensitive matter without any consultation - potentially committing the agency to positions that have not been vetted, and creating additional problems beyond the original error."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are reviewing invoices and notice that a vendor has consistently rounded up small amounts on each invoice - amounts too small to trigger automatic review but which add up to a significant total over the year. What would you do?",opts:{A:"Approve the invoices because the individual amounts are below the review threshold",B:"Flag the pattern to your supervisor and the appropriate oversight authority, document the cumulative amount, and recommend a review of all invoices from this vendor",C:"Contact the vendor informally and ask them to stop without creating a formal record",D:"Reduce future invoice approvals to offset the overcharges without reporting the discrepancy"},best:"B",worst:"D",expBest:"Option B recognizes that a systematic pattern of small overcharges is potentially fraud regardless of individual amounts, and routes it through proper oversight channels with documentation - the correct response to suspected billing fraud.",expWorst:"Option D takes an unauthorized self-help remedy - adjusting future approvals to compensate - rather than reporting the potential fraud. This allows the underlying misconduct to go uninvestigated and may itself be improper."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"A senior colleague makes a comment in a team meeting that you believe constitutes an inappropriate joke targeting a specific ethnic group. Several junior team members are present. What would you do?",opts:{A:"Laugh along to avoid making the situation awkward for the senior colleague",B:"Decline to laugh, address the comment calmly and professionally in the moment if appropriate, and if needed speak to the senior colleague privately afterward or raise it with a supervisor",C:"Report the senior colleague to HR immediately without saying anything in the moment",D:"Wait until the meeting ends and take a poll of colleagues about whether they found it offensive"},best:"B",worst:"A",expBest:"Option B does not validate the comment and creates space for a professional response proportionate to the situation - in-the-moment or afterward - while modeling the conduct standards expected of all team members regardless of the speaker's seniority.",expWorst:"Option A actively participates in validating an inappropriate comment to avoid social discomfort - signaling to junior team members that such comments are acceptable and contributing to the environment the comment created."}
      ,{type:'standalone',sub:"Professionalism",q:"You receive a task from a senior official that you believe is based on a misunderstanding of the facts - the official appears to have incorrect information about the situation they are asking you to address. What would you do?",opts:{A:"Complete the task as assigned without mentioning the factual discrepancy to avoid appearing to challenge senior leadership",B:"Respectfully and promptly clarify the factual situation with the senior official before proceeding, so the task can be reframed if necessary",C:"Complete the task and send a separate memo correcting the factual record after the fact",D:"Ask a colleague to deliver the task so you are not associated with an approach you believe is based on incorrect information"},best:"B",worst:"A",expBest:"Option B proactively provides accurate information to the senior official before effort is wasted on a misdirected task - a professional obligation and a service to the official, not a challenge to their authority.",expWorst:"Option A completes a task you know is based on incorrect information without saying anything - allowing resources to be spent on a potentially wrong-footed effort and withholding accurate information from a decision-maker who needs it."}
      ,{type:'standalone',sub:"Professionalism",q:"You are leading a complex multi-agency initiative when you realize that a decision you made three months ago - and which has shaped significant subsequent work - rested on a faulty assumption that you have only now identified. Reversing course will be disruptive and will require explaining the error to senior leadership and partner agencies. What would you do?",opts:{A:"Continue on the current course because the disruption of reversing now would exceed the cost of the original error",B:"Quietly adjust the initiative's direction incrementally over several months without disclosing the original error",C:"Immediately disclose the error to your supervisor and relevant stakeholders, assess the actual impact, and develop a transparent plan to correct course",D:"Complete the initiative and then commission an after-action review that will surface the error in a less damaging context"},best:"C",worst:"B",expBest:"Option C is the only response consistent with professional integrity - early transparent disclosure of a consequential error allows leadership to make informed decisions about course correction. Delayed disclosure invariably makes the situation worse and can constitute a separate ethics issue.",expWorst:"Option B incrementally conceals the error through gradual undisclosed adjustment - a deliberate deception of leadership and partners over an extended period that compounds the original mistake with ongoing dishonesty."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are a section chief and receive simultaneous urgent requests from two different senior officials, both claiming their matter is highest priority. The requests require incompatible use of the same resources and cannot both be completed within the required timeframe. Neither official outranks the other. What would you do?",opts:{A:"Prioritize the request from the official with whom you have a better working relationship to ensure the outcome is as strong as possible",B:"Attempt to complete both requests simultaneously at reduced quality to satisfy both officials",C:"Clearly explain the resource conflict to both officials simultaneously, provide your honest assessment of the relative urgency of each matter, and request that they resolve the prioritization jointly or escalate for a decision",D:"Complete the request that arrived first and inform the second official you will address theirs next"},best:"C",worst:"A",expBest:"Option C surfaces the resource conflict transparently and pushes the prioritization decision to the appropriate level - the officials themselves or their common superior. You do not have the authority or information to make this call unilaterally.",expWorst:"Option A resolves a substantive organizational priority based on personal relationship quality - a clear misuse of positional authority that disadvantages one official for reasons unrelated to the merits of their request."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are reviewing a subordinate's expense reimbursement report and notice an item that appears personal rather than mission-related, but the subordinate is highly trusted and the amount is small. Your supervisor has not reviewed it yet. What would you do?",opts:{A:"Approve the report without comment because the amount is small and the subordinate's overall track record is excellent",B:"Approve the report but mentally flag the subordinate for more careful scrutiny on future reports",C:"Ask the subordinate for clarification on the specific item before approving the report, and document your review",D:"Deny the entire expense report pending a full audit of the subordinate's past submissions"},best:"C",worst:"D",expBest:"Option C applies appropriate professional skepticism proportionate to the concern - asking for clarification before approval is standard due diligence that protects both the subordinate and the agency without being punitive.",expWorst:"Option D denies the entire report and triggers a full audit based on a single questionable small item in an otherwise trusted subordinate's record - grossly disproportionate and likely to damage the relationship and morale without justification."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A colleague approaches you with what they frame as a 'hypothetical' question that is clearly about a real ethical situation they are navigating. They seem to want validation for a course of action you believe is problematic. What would you do?",opts:{A:"Engage with the hypothetical as framed and provide the validation they appear to seek to preserve the collegial relationship",B:"Acknowledge the hypothetical framing while sharing your honest assessment of the ethical concern, including what you would do differently and why",C:"Decline to engage with hypotheticals and redirect the conversation to other topics",D:"Immediately report the colleague to the ethics office based on the hypothetical they described"},best:"B",worst:"A",expBest:"Option B engages honestly with the underlying concern - giving the colleague the candid perspective they actually need rather than the validation they appear to want. Framing it thoughtfully respects the collegial relationship while fulfilling a professional obligation.",expWorst:"Option A provides validation for a course of action you believe is problematic, using the hypothetical framing as justification for dishonesty - prioritizing short-term relationship comfort over the colleague's genuine interest in making a sound decision."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are the most senior person in a meeting when a junior colleague presents analysis that is clearly excellent but that contradicts a position you have publicly and repeatedly defended. Senior officials who will be influenced by this analysis are present. What would you do?",opts:{A:"Find technical grounds to undermine the analysis in the meeting to protect your prior position",B:"Acknowledge the quality of the analysis openly, engage with it substantively, and indicate that it warrants revisiting your previous position",C:"Say nothing during the meeting but privately tell the junior colleague afterward that their analysis was well done",D:"Request that the analysis be tabled pending further review so you can assess it privately first"},best:"B",worst:"A",expBest:"Option B models intellectual honesty and institutional courage - publicly acknowledging strong analysis that challenges your own position is among the most valued professional behaviors in analytical organizations, and it protects the quality of organizational decision-making.",expWorst:"Option A actively works to undermine valid analysis to protect a personal position - placing ego and reputation ahead of the quality of decisions that senior officials will make based on available information."}
      ,{type:'standalone',sub:"Resource Management",q:"You are preparing a budget request and your supervisor suggests including some items that you believe cannot be legitimately justified under the applicable funding authority. The supervisor argues the items are 'close enough' and 'everyone does it.' What would you do?",opts:{A:"Include the items as suggested because your supervisor has approved them and bears responsibility for the submission",B:"Raise your specific concerns with your supervisor about the applicable funding authority, document that you raised the concern, and if your supervisor still insists, escalate to the appropriate oversight channel",C:"Include the items but add qualifying language that creates enough ambiguity to provide deniability if questioned",C:"Submit the request without the questionable items and inform your supervisor after the fact"},best:"B",worst:"C",expBest:"Option B raises the substantive concern through proper channels and documents having done so - protecting the organization from a potential misuse of funds while using the appropriate process for resolving a supervisor-subordinate disagreement.",expWorst:"Option C deliberately drafts ambiguous language designed to obscure the questionable nature of the items - an active attempt to deceive reviewers, which transforms a judgment call about funding authority into a deliberate misrepresentation."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are conducting outreach to a community whose members have significant historical reasons to distrust the U.S. government. Your standard engagement approach has produced little response. What would you do?",opts:{A:"Continue using the standard approach because consistency and persistence will eventually build trust",B:"Research the specific historical context of this community's relationship with the government, consult with cultural experts and community members about what engagement might look like, and adapt your approach based on that understanding",C:"Lower your engagement goals for this community and focus resources on communities where the standard approach is more effective",D:"Ask a community member to serve as an intermediary so you can maintain the standard approach without direct adaptation"},best:"B",worst:"C",expBest:"Option B demonstrates the genuine effort required to engage effectively with communities that have legitimate reasons for distrust - research, consultation, and adaptation are not optional extras but prerequisites for meaningful outreach in this context.",expWorst:"Option C writes off a community with historical grievances because engagement is harder - a decision that compounds historical injustice with present neglect and abandons the organizational mission with respect to that community."}
      ,{type:'standalone',sub:"Professionalism",q:"Your agency's position on a specific policy question is well established. During an external meeting, a participant makes a sophisticated argument that you find genuinely persuasive but that runs counter to agency policy. You are representing the agency officially. What would you do?",opts:{A:"Acknowledge the argument's strength and indicate that it has changed your personal view, while noting you represent the agency's current position",B:"Represent the agency's position clearly and accurately, engage substantively with the argument without endorsing it publicly, and raise the argument with appropriate internal channels when you return",C:"Dismiss the argument publicly to protect the agency's position even though you found it persuasive",D:"Decline to represent the agency's position further until you have had time to reconsider it internally"},best:"B",worst:"A",expBest:"Option B fulfills the representational obligation while treating the argument seriously - you cannot publicly signal that an external argument has moved you away from your agency's position while representing that agency, but you can engage substantively and raise it internally.",expWorst:"Option A publicly acknowledges that an external argument has personally persuaded you while you are officially representing your agency - undermining the agency's position in real time and confusing your personal views with your representational role."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You discover that a peer from another section has been consistently receiving credit in senior leadership briefings for work that your team produced collaboratively - and that this misattribution has been occurring for several months without correction. What would you do?",opts:{A:"Begin attributing the peer's contributions to your section in briefings as a form of proportional correction",B:"Raise the attribution issue directly with the peer first, explain the problem clearly, and if it continues, raise it with your supervisor and theirs with documentation",C:"Raise the issue directly with senior leadership without first speaking to the peer",D:"Accept the situation since addressing it would seem petty and might damage the working relationship"},best:"B",worst:"A",expBest:"Option B addresses the attribution problem through the most direct and proportionate channel first - giving the peer the opportunity to correct the pattern before escalation, while establishing a clear record if escalation becomes necessary.",expWorst:"Option A responds to misattribution with counter-misattribution - creating a tit-for-tat dynamic that distorts the record further, harms the peer unfairly, and models the same behavior you found objectionable."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"During a personnel evaluation process, you become aware that a candidate for a competitive promotion has a personal relationship with one member of the evaluation panel - a relationship that was not disclosed. The candidate is otherwise highly qualified. What would you do?",opts:{A:"Proceed with the evaluation since the candidate's qualifications are genuinely strong and the relationship may not have influenced the outcome",B:"Raise the undisclosed relationship with the appropriate authority - the panel chair, HR, or ethics office - before the evaluation is finalized",C:"Raise the issue only if the candidate with the relationship ultimately wins the promotion",D:"Anonymously alert a colleague on the panel to the relationship and let them decide whether to act"},best:"B",worst:"A",expBest:"Option B raises the conflict of interest through proper channels before the process concludes - allowing the organization to address it before it taints the outcome. The strength of the candidate's qualifications does not cure a procedural integrity problem.",expWorst:"Option A allows a potentially conflicted process to proceed to completion on the basis that the outcome might be correct anyway - but the integrity of selection processes cannot be assessed only by whether we agree with the result. A fair process matters independently."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are presenting findings at a high-stakes external meeting when you realize mid-presentation that a slide contains a factual error - one that appears to support your argument but that you now recognize is incorrect. Correcting it on the spot will weaken your position and may embarrass your agency. What would you do?",opts:{A:"Complete the presentation without correction and issue a correction after the meeting through a follow-up document",B:"Immediately correct the error on the spot, explain what the correct information is, and adjust your argument accordingly",C:"Note the potential issue vaguely without specifying the error and continue, leaving the audience with an uncertain impression",D:"Continue the presentation as planned and decide afterward whether the error was material enough to warrant correction"},best:"B",worst:"C",expBest:"Option B prioritizes accuracy over momentary advantage - correcting an error you have identified in real time, even at cost to your argument, reflects the professional integrity that is essential for an agency's credibility with external partners.",expWorst:"Option C deliberately creates uncertainty without resolving it - a form of deliberate vagueness designed to benefit from the erroneous impression without technically stating the error, which is a form of misleading communication."}
      ,{type:'standalone',sub:"Information Management",q:"You are asked to prepare a briefing memo on a sensitive topic for an official who is known for making quick decisions based on limited information. You believe that additional context is essential for an accurate understanding but that it will make the memo longer and more nuanced than the official prefers. What would you do?",opts:{A:"Prepare the brief, simplified memo the official prefers and omit the context to match their known preferences",B:"Prepare a clear, well-organized memo that includes the essential context, structured to be accessible - leading with key findings and putting context in clearly labeled supporting sections",C:"Prepare two memos: one short version and one detailed version, and let the official choose",D:"Raise with your supervisor that you believe the official's briefing style creates risk of misinformed decisions before completing the memo"},best:"B",worst:"A",expBest:"Option B fulfills your obligation to inform decision-makers accurately while adapting the format to their communication style - leading with key findings and organizing supporting context clearly serves both the official's preference for efficiency and the institutional need for accurate information.",expWorst:"Option A deliberately omits material context to match a known preference - placing audience comfort above the accuracy of information reaching a decision-maker. An official who makes decisions on incomplete briefings because their staff withheld context is not well-served."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You have been informally mentoring a junior colleague who has grown significantly. They tell you they have been offered a position at another agency that represents a clear career advancement but that they have been asked to decide within 48 hours. Your section would be significantly disrupted by their departure. What would you do?",opts:{A:"Encourage them to take the position if it is genuinely better for their career, and offer to help with the transition",B:"Honestly raise the operational impact on the section and ask them to consider declining or at least requesting a delayed start date",C:"Tell them to take as much time as they need and not worry about the 48-hour deadline",D:"Recommend against taking the position because career advancement can be achieved within the current agency with patience"},best:"A",worst:"D",expBest:"Option A prioritizes the mentee's career interests as a mentor should - encouraging a genuinely good opportunity and supporting the transition is the right response even when it is personally or operationally inconvenient.",expWorst:"Option D recommends against an objectively better opportunity on the basis of patience within the current agency - advice that serves the section's operational interests rather than the mentee's genuine career interests, a misuse of the mentoring relationship."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You are assigned to work closely with a colleague with whom you have had a significant personal conflict in the past. The conflict was never formally resolved. The new assignment requires effective collaboration over an extended period. What would you do?",opts:{A:"Maintain professional courtesy but keep interactions purely task-focused and avoid any discussion of the past conflict",B:"Request a different assignment to avoid the interpersonal risk",C:"Before the work begins, proactively seek a private conversation with the colleague to acknowledge the past difficulty, express your commitment to a productive working relationship, and establish clear professional norms for the collaboration",D:"Alert your supervisor to the history so that they are aware of the potential for friction"},best:"C",worst:"B",expBest:"Option C directly addresses the relational history before it can affect the work - a proactive, mature approach that gives both parties the opportunity to establish a fresh professional foundation rather than allowing unresolved tension to undermine collaboration.",expWorst:"Option B removes yourself from an assignment because of a past interpersonal conflict - avoiding the discomfort of resolution at the cost of the organization's operational flexibility and your own professional development."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are leading a mixed team of American and locally employed staff. During a team meeting, you notice that locally employed staff consistently defer to American staff's opinions even when their own expertise on local conditions is demonstrably superior. What would you do?",opts:{A:"Accept the dynamic as reflecting different professional norms and focus on delivering good work outcomes",B:"Directly and explicitly restructure team discussion processes to center local expertise on questions of local conditions - including explicitly eliciting locally employed staff views before American staff speak on such topics",C:"Speak individually to the American staff members and ask them to be less assertive",D:"Speak individually to the locally employed staff members and encourage them to be more assertive"},best:"B",worst:"A",expBest:"Option B addresses the structural dynamic rather than placing the burden on individuals to change behavior against a professional culture gradient - creating process conditions that allow expertise to determine whose voice carries weight rather than institutional hierarchy or cultural deference patterns.",expWorst:"Option A accepts a dynamic in which the team systematically underutilizes its best-informed members on local questions, framing it as a cultural norm rather than an organizational effectiveness problem that leadership has an obligation to address."}
      ,{type:'standalone',sub:"Resource Management",q:"You are managing a project that is running behind schedule. You can meet the deadline only by having your team work significant overtime during a holiday period. Your team has been working hard for months. An alternative is to negotiate a one-week deadline extension, which you believe your client would likely grant. What would you do?",opts:{A:"Direct the team to work overtime through the holiday to meet the original deadline without consulting them",B:"Have an honest conversation with the team about the situation, present both options, consider their input, and make a decision that fairly weighs the deadline, team wellbeing, and client relationship",C:"Commit to the deadline to the client and then tell the team they must work overtime, framing it as non-negotiable",D:"Grant the team the holiday time and accept the missed deadline without attempting to negotiate an extension"},best:"B",worst:"C",expBest:"Option B respects the team as stakeholders in a decision that directly affects their wellbeing, considers available options, and makes a judgment informed by genuine consultation - modeling the leadership standard of treating people as partners rather than inputs.",expWorst:"Option C makes a unilateral commitment to the client that constrains the team's options without their knowledge, then presents the resulting overtime as non-negotiable - deceiving the team about the nature of the decision and excluding them from a choice that directly affects them."}
      ,{type:'standalone',sub:"Professionalism",q:"You receive informal feedback that a senior leader views your work as solid but not 'strategic enough.' You disagree with this characterization and believe your work product is consistently strong at the level required by your role. What would you do?",opts:{A:"Dismiss the feedback as reflecting the senior leader's misunderstanding of your role's requirements",B:"Request a direct conversation with the senior leader to understand specifically what they mean by 'strategic,' what they expect to see, and how your work can better meet those expectations",C:"Begin producing work that is more high-level and less detailed to appear more strategic, without seeking clarification",D:"Discuss the feedback with peers to determine whether it reflects a broader perception problem before deciding whether to act"},best:"B",worst:"C",expBest:"Option B seeks direct, specific understanding of the gap before acting - the only way to know whether the feedback reflects a genuine development opportunity, a misunderstanding of your role, or an expectation mismatch that needs to be discussed.",expWorst:"Option C changes your work product style based on an informal characterization without understanding what 'strategic enough' actually means - potentially reducing your actual effectiveness by making work less substantively rigorous in pursuit of an undefined stylistic target."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You become aware through a trusted colleague that a rumor is circulating within the office attributing to you a statement you did not make - a statement that, if believed, would significantly damage your professional relationships. The source of the rumor appears to be a specific colleague. What would you do?",opts:{A:"Confront the suspected source publicly to end the rumor quickly and establish the facts",B:"Speak directly with the suspected source privately to address the misattribution, and separately ensure that colleagues who may have heard the rumor receive accurate information",C:"Ignore the rumor because engaging with it will only draw more attention to it",D:"Report the suspected source to HR for spreading false information about you"},best:"B",worst:"A",expBest:"Option B addresses both the source (privately and directly) and the spread (correcting the record with affected colleagues) - proportionate and professional responses to a reputational threat that address the problem without escalation.",expWorst:"Option A's public confrontation makes the situation more dramatic, potentially embarrasses the suspected source before their culpability is confirmed, and is more likely to harden positions than to resolve the misattribution."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You are a peer on a team whose assigned team lead is significantly underperforming in the leadership role, creating confusion and missed milestones. Other team members have begun looking to you for direction. What would you do?",opts:{A:"Informally take over de facto leadership of the team since you are clearly more capable",B:"Speak privately and supportively with the team lead about the specific difficulties you have observed, offer concrete assistance, and if the situation does not improve, raise the concern with your supervisor",C:"Encourage other team members to raise the concern with the supervisor so that you are not seen as the one undermining the team lead",D:"Do your individual work well and avoid involving yourself in the team lead's performance, which is the supervisor's responsibility"},best:"B",worst:"A",expBest:"Option B addresses the performance concern directly and constructively with the team lead - giving them awareness and support before escalation. If you have already been informally taking on leadership tasks, making that visible through support rather than replacement is more respectful and more likely to resolve the underlying problem.",expWorst:"Option A informally usurps a colleague's assigned authority without any discussion or supervisory involvement - undermining the team lead's role, creating organizational ambiguity, and taking unilateral action that bypasses every appropriate step."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are the only officer available when an applicant presents documentation that suggests they may be entitled to an expedited service that you have not personally processed before. There is no supervisor available for the next two hours, and the applicant's circumstances are time-sensitive. What would you do?",opts:{A:"Decline to process the expedited request until a supervisor is available to guide you through it",B:"Research the applicable policy immediately, contact a colleague in another section or post who may have handled similar cases, and make a good-faith determination based on the best available guidance - documenting your reasoning thoroughly",C:"Process the request using your best judgment without additional research to avoid delay",D:"Tell the applicant to return tomorrow when a supervisor will be available"},best:"B",worst:"D",expBest:"Option B exercises professional initiative appropriately - using available resources (policy, colleagues) to make an informed determination in a time-sensitive situation and documenting the reasoning. This is exactly what officers are expected to do when supervision is unavailable.",expWorst:"Option D tells a time-sensitive applicant to return tomorrow because of an administrative inconvenience - failing a genuine service obligation and potentially causing real harm to someone whose circumstances are urgent."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You are completing your departure clearance from an assignment. You discover that you have inadvertently been overpaid during the final month of your assignment due to an administrative error that was not your fault. The overpayment is significant but would likely not be discovered. What would you do?",opts:{A:"Retain the overpayment since it was the agency's error, not yours",B:"Disclose the overpayment to the appropriate administrative office and arrange to repay the amount",C:"Donate the amount to a charity to avoid personal benefit while avoiding the awkwardness of disclosure",D:"Retain the overpayment for now and repay it only if the error is discovered"},best:"B",worst:"A",expBest:"Option B discloses and repays the overpayment regardless of fault or likelihood of discovery - the agency is entitled to its funds and an officer's integrity is not contingent on whether an error would be caught.",expWorst:"Option A retains government funds to which you are not entitled, rationalizing it as the agency's administrative fault - but the source of the error does not change who is entitled to the money. Retaining knowingly misallocated government funds is financial misconduct."}
      ,{type:'standalone',sub:"Information Management",q:"You are preparing a policy analysis for senior leadership. You have found strong evidence supporting one conclusion and weaker evidence suggesting a different conclusion. The strong evidence supports what you know leadership wants to hear; the weaker evidence complicates the picture. What would you do?",opts:{A:"Present only the strong evidence since it represents the preponderance of the evidence and leadership prefers clear conclusions",B:"Present both the strong and the weaker evidence accurately, explaining the weight you assign to each and why, so leadership has a complete picture",C:"Present the strong evidence prominently and mention the weaker evidence only in a footnote to technically include it",D:"Present the strong evidence and omit the weaker evidence, since it would only create unnecessary uncertainty"},best:"B",worst:"D",expBest:"Option B presents a complete and honest analytical picture - acknowledging and explaining the weight of competing evidence. Senior leaders making consequential decisions are poorly served by analysis that omits inconvenient evidence, even when that evidence is weaker.",expWorst:"Option D omits evidence that complicates a preferred conclusion - this is a form of selective analysis that produces advocacy dressed as assessment. Omitting material evidence to present a cleaner picture is a fundamental failure of analytical integrity."}
      ,{type:'standalone',sub:"Professionalism",q:"A senior official publicly compliments your section's work in a setting where you know the credit appropriately belongs primarily to a specific junior colleague who was the intellectual driver of the effort. Your supervisor is also present. What would you do?",opts:{A:"Accept the compliment graciously on behalf of the section and plan to acknowledge the colleague privately afterward",B:"Acknowledge the compliment and then immediately and specifically credit the junior colleague by name for their central contribution",C:"Redirect the compliment entirely to the junior colleague in a way that suggests you had little involvement",D:"Accept the compliment and allow the moment to pass - public attribution is your supervisor's responsibility to manage"},best:"B",worst:"A",expBest:"Option B accepts the compliment while immediately giving specific public credit to the person who earned it - using the visibility of the moment to benefit the junior colleague's professional reputation rather than accepting recognition that is not fully yours.",expWorst:"Option A accepts full credit for work you know belongs substantially to a junior colleague, with only a private acknowledgment planned - allowing the misattribution to stand in a setting where accurate public credit would have meaningfully benefited the colleague's career."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are aware that your agency is considering a significant organizational restructuring that would affect your section. You have heard informal details from a senior official that have not been publicly announced. Several colleagues ask you directly whether you know anything. What would you do?",opts:{A:"Share what you know informally to help colleagues prepare and reduce their anxiety",B:"Tell colleagues that you cannot share information you received in confidence but that an official announcement is expected and encourage them to raise concerns through appropriate channels",C:"Deny having any information to avoid creating anxiety based on incomplete details",D:"Share the information with only your closest colleagues to limit the circle of informal disclosure"},best:"B",worst:"C",expBest:"Option B is honest about the limits of what you can share without breaching the confidentiality of information received informally from a senior official - and helpfully directs colleagues to appropriate channels for their concerns.",expWorst:"Option C actively lies to colleagues - stating you have no information when you do. Even though you cannot share the information, lying about whether you have it is a straightforward integrity violation."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You notice that in team meetings, a quiet but highly capable colleague's ideas are frequently overlooked in real time but then credited to other team members when they repeat them more assertively minutes later. The pattern appears to be driven by communication style differences, not content quality. What would you do?",opts:{A:"Say nothing because dynamics like this are normal in group settings and self-correct over time",B:"Actively amplify the quiet colleague's ideas when they are raised - explicitly attributing the idea to them and inviting elaboration - and speak with the colleague privately about strategies for being heard",C:"Speak only to the quiet colleague and encourage them to be more assertive in meetings",D:"Speak only to the team members who are repeating ideas without attribution and ask them to stop"},best:"B",worst:"A",expBest:"Option B addresses the dynamic through both immediate action (amplification) and individual support (coaching) - using your own presence in meetings to interrupt the pattern rather than placing the entire burden of change on the person who is being disadvantaged by it.",expWorst:"Option A accepts a team dynamic in which a capable colleague is consistently being disadvantaged through no fault of their own, framing it as normal and self-correcting when evidence suggests it is neither."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"Your team has reached consensus on a recommendation that you have significant reservations about. The recommendation has been well-reasoned by the group and you cannot identify a specific factual error, but your intuition tells you something important is being missed. What would you do?",opts:{A:"Go along with the group consensus since you cannot identify a specific error and the group has deliberated carefully",B:"State your reservations clearly to the group - even without being able to identify the specific source of concern - and request additional time or analysis before the recommendation is finalized",C:"Accept the consensus externally but document your disagreement in a personal record in case problems emerge later",D:"Reach out to an external expert to validate your intuition before raising it with the group"},best:"B",worst:"C",expBest:"Option B surfaces your reservations through the appropriate channel - the group deliberation - even without a fully formed counter-argument. Experienced judgment that 'something is missing' is valuable information that the group should consider, and withholding it serves no one.",expWorst:"Option C privately records your disagreement without sharing it with the group - preserving personal deniability while withholding potentially important analytical judgment from the people making the decision. This is the least useful form of dissent."}
      ,{type:'standalone',sub:"Resource Management",q:"A high-profile initiative you championed is significantly underperforming against its stated objectives six months in. An objective assessment suggests it is unlikely to succeed without major redesign. Significant resources have already been invested. What would you do?",opts:{A:"Continue the initiative at least until the end of the fiscal year to demonstrate commitment and allow more time for results",B:"Conduct an honest assessment of whether the initiative can be redesigned to achieve its objectives, present your findings - including the option to discontinue - transparently to leadership, and recommend the course that best serves the mission",C:"Quietly shift the initiative's success metrics to ones the initiative is more likely to achieve",D:"Commission an external evaluation to create distance between the negative findings and your own judgment"},best:"B",worst:"C",expBest:"Option B applies the same honest assessment to your own initiative that you would apply to anyone else's - presenting leadership with an accurate picture including the possibility of discontinuation. The sunk cost should not drive the decision; the prospective value should.",expWorst:"Option C changes the goalposts retroactively - redefining success to match what the initiative can actually achieve rather than what was promised. This is a form of analytical fraud that misrepresents performance to leadership and stakeholders."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are the senior officer on duty when a walk-in applicant becomes extremely distressed after learning their visa application cannot be processed that day due to a system outage. The applicant explains that they must travel tomorrow for a family medical emergency. What would you do?",opts:{A:"Inform the applicant that system outages are beyond your control and ask them to return when the system is restored",B:"Acknowledge the applicant's distress, explore every available option - including whether any manual process or emergency procedure exists - and connect them with any available assistance, including a supervisor or consular officer",C:"Promise the applicant you will personally ensure their visa is processed today, regardless of the system status",D:"Ask the applicant to leave and return the next day"},best:"B",worst:"C",expBest:"Option B takes the applicant's situation seriously and exhausts all available options before concluding nothing can be done - the professional approach to a genuine humanitarian circumstance within an institutional constraint.",expWorst:"Option C makes a promise you cannot keep to a distressed person - creating false hope that will result in greater disappointment and potential harm to the applicant who may act on the promise."}
      ,{type:'standalone',sub:"Professionalism",q:"You receive a request from a colleague in another section asking you to co-sign a document that certifies a fact you have no direct knowledge of. Your colleague says they have verified it and just needs a second signature for procedural purposes. What would you do?",opts:{A:"Sign the document because your colleague has vouched for the underlying fact and the co-signature is just procedural",B:"Decline to sign a certification for something you cannot personally verify, and offer to help find an appropriate alternative",C:"Sign the document but note in the margin that your signature is based on your colleague's representation",D:"Report the request to your supervisor as a potential falsification attempt"},best:"B",worst:"A",expBest:"Option B declines to certify something you have no personal knowledge of - a signature on a certification document means you are attesting to something, not just completing a procedural step. The framing as 'just procedural' does not change what the signature means.",expWorst:"Option A signs a certification you cannot verify on the basis of a colleague's word - a signature is a personal attestation, and signing something you cannot verify is a potential integrity violation regardless of what the colleague told you."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"During a team planning session, you propose an approach that you believe is significantly better than the one the team has been discussing. After you present it, the team quickly moves on without substantive engagement with your idea. What would you do?",opts:{A:"Accept that the team has moved on and not raise your idea again",B:"Interrupt the discussion to demand that your idea receive more consideration",C:"Ask calmly for a few minutes to explain the specific advantages of your approach before the team moves to a decision",D:"Approach individual team members separately after the meeting to build support before the next session"},best:"C",worst:"B",expBest:"Option C advocates professionally for a substantive position by requesting fair consideration - using the appropriate moment and framing to give the idea a genuine hearing without being disruptive.",expWorst:"Option B's interruption and demand approach disrupts the collaborative dynamic, signals inability to navigate disagreement professionally, and is likely to create resistance to the idea on interpersonal grounds."}
      ,{type:'standalone',sub:"Resource Management",q:"You are responsible for managing a small equipment budget and realize you can purchase a higher-quality item that exceeds the current need but would be more durable and cost less over time, or a lower-cost item that meets current needs. You have sufficient budget for either. What would you do?",opts:{A:"Always purchase the lower-cost item to minimize current spending",B:"Evaluate the total cost of ownership, document your reasoning, and purchase whichever option provides the best value to the government given both current and foreseeable needs",C:"Purchase the more expensive item since the budget exists and better quality is always preferable",D:"Refer the decision to your supervisor since spending discretion creates too much personal liability"},best:"B",worst:"C",expBest:"Option B applies genuine value analysis to a procurement decision - considering both immediate cost and long-term durability - and documents the reasoning. This is responsible stewardship, not just minimizing current expenditure.",expWorst:"Option C spends more because the budget allows it, rationalizing quality as always preferable - this is not responsible stewardship. Having budget authority does not mean it should be maximally used."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are in a meeting with external partners when you receive an urgent text message from your supervisor asking you to call immediately. The meeting is at a critical juncture. What would you do?",opts:{A:"Ignore the message until the meeting concludes, as leaving mid-meeting would be unprofessional",B:"Excuse yourself briefly from the meeting, assess whether the supervisor's matter is genuinely urgent, and return to the meeting or remain available based on that assessment",C:"Show the message to the external partners to explain why you may need to step out",D:"Ask a colleague to take over the meeting and leave immediately without assessing the urgency"},best:"B",worst:"C",expBest:"Option B exercises judgment about competing obligations - briefly excusing yourself to assess urgency is professional and allows you to respond appropriately to whichever need is greater.",expWorst:"Option C shares an internal communication from your supervisor with external partners - a breach of professional discretion that exposes internal dynamics unnecessarily and is inappropriate regardless of the content."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"You discover that a form you submitted last week contained an inadvertent error - you checked the wrong box - that could have led to an incorrect outcome, though you are not certain whether anyone acted on the form yet. What would you do?",opts:{A:"Wait to see if anyone raises the error before taking action",B:"Immediately notify the relevant party, submit a corrected form, and check whether any action was taken based on the incorrect form",C:"Submit a corrected form without mentioning the original error to avoid drawing attention to the mistake",D:"Determine whether the error actually affected any outcome before deciding whether disclosure is necessary"},best:"B",worst:"C",expBest:"Option B immediately corrects the record and checks for downstream consequences - taking full ownership of an inadvertent error and ensuring it does not affect outcomes. Prompt self-correction is a professional obligation.",expWorst:"Option C submits a correction while concealing the original error - creating an appearance of correctness without disclosing a potential gap in the record, which could mislead anyone reviewing the history."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"Your section is preparing a joint analysis with a partner organization. Your counterpart at the partner organization sends a draft that contains factual claims you disagree with based on your own research, but they are presented confidently. The deadline is tomorrow. What would you do?",opts:{A:"Accept the claims as written since your counterpart is the lead on their section of the analysis",B:"Flag your specific factual concerns to your counterpart directly and promptly, propose how to resolve the disagreement, and if unresolved, note the disagreement transparently in the joint document",C:"Change the factual claims in the draft unilaterally to reflect your own research before returning it",D:"Submit your section without their disputed claims and let the two sections stand separately"},best:"B",worst:"C",expBest:"Option B raises the factual disagreement directly and proposes resolution - preserving the collaborative relationship while protecting the analytical integrity of the joint product. Transparent disagreement in a co-authored document is professionally acceptable.",expWorst:"Option C unilaterally edits the partner's section to reflect your own view - overstepping your authority, violating collaborative norms, and potentially damaging the professional relationship and the partner's trust."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"A colleague from a culture with a strong hierarchical professional tradition consistently defers to you in meetings even when you ask for their opinion, making it difficult to get their genuine input. What would you do?",opts:{A:"Accept the deference as a cultural difference and stop asking for their opinion in group settings",B:"Find lower-stakes private settings to solicit their input, explicitly frame your requests as valuing their expertise, and over time create conditions where they feel safe sharing views in group settings",C:"Tell the colleague directly that their cultural deference style is a problem for the team",D:"Report the situation to your supervisor as a performance issue"},best:"B",worst:"D",expBest:"Option B adapts your approach to access the colleague's genuine expertise - using private settings and explicit framing to create conditions for substantive engagement while respecting the cultural dynamics at play.",expWorst:"Option D reports a cultural communication style difference as a performance issue - an inappropriate and potentially discriminatory framing of what is a cultural difference, not a performance deficiency."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You overhear two colleagues in a heated argument that does not appear to involve physical threat but is loud enough to be heard through the office. Other staff appear uncomfortable. What would you do?",opts:{A:"Ignore the argument since it does not involve you",B:"Interrupt the argument, ask them to lower their voices or take the discussion to a private space, and follow up with each privately if the tension persists",C:"Immediately call security to intervene",D:"Send an email to your supervisor describing what you overheard without taking any immediate action"},best:"B",worst:"C",expBest:"Option B takes a proportionate and direct immediate action - de-escalating the disturbance to the office environment and addressing it privately - without unnecessary escalation for a non-threatening situation.",expWorst:"Option C calls security for a loud verbal argument that presents no physical threat - a disproportionate response that is likely to embarrass both parties and escalate rather than resolve the situation."}
      ,{type:'standalone',sub:"Professionalism",q:"You are assigned to draft a policy document on a topic in which you have strong personal views that differ from the agency's established position. What would you do?",opts:{A:"Draft the document reflecting your personal views to give leadership an alternative perspective",B:"Draft the document accurately reflecting the agency's established position, and separately submit your alternative views through appropriate channels if you believe they merit consideration",C:"Decline the assignment since you cannot write objectively on a topic where you have strong personal views",D:"Draft the document reflecting agency policy but include footnotes suggesting alternative approaches"},best:"B",worst:"A",expBest:"Option B fulfills the assignment professionally - drafting what you are asked to draft - while using appropriate internal channels to advocate for your own views separately. These two things are not in conflict.",expWorst:"Option A uses an official assignment to advance your personal views rather than the agency's position - a breach of the assignment's purpose and a substitution of your judgment for the organization's on a matter you were not asked to decide."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"A junior colleague is clearly nervous before presenting at a high-visibility internal meeting for the first time. They have not asked for help. What would you do?",opts:{A:"Leave them to manage on their own since they did not ask for assistance",B:"Briefly and supportively offer a few minutes before the meeting to answer questions, review their key points with them, or simply offer encouragement",C:"Tell them to be less nervous and focus on the content",D:"Offer to present on their behalf to spare them the anxiety"},best:"B",worst:"D",expBest:"Option B offers genuine support in a way that builds the colleague's confidence and capability rather than replacing them - the right kind of collegial support that helps someone grow.",expWorst:"Option D removes the colleague's opportunity to present - depriving them of a developmental experience and implicitly communicating that you do not trust their ability, which is likely to worsen rather than help their confidence."}
      ,{type:'standalone',sub:"Resource Management",q:"Your team has been allocated time from a highly skilled contractor for one month. Partway through, it becomes clear that the most valuable remaining work would take the contractor into next month, which is not currently funded. What would you do?",opts:{A:"Direct the contractor to begin the most valuable work now and address the funding question later",B:"Assess what can realistically be completed within the funded period, prioritize the highest-value work, and raise the case for additional funding through appropriate channels before the current period expires",C:"Let the contractor finish whatever they started rather than disrupt their work with reprioritization",D:"Return the contractor early since the remaining work cannot be completed within the funded period"},best:"B",worst:"A",expBest:"Option B maximizes value within the authorized period while proactively building the case for additional resources - responsible stewardship that works within funding authority while advocating for mission needs.",expWorst:"Option A directs work beyond the funded period without authorization - a potential Antideficiency Act violation that exposes both the agency and the contractor to legal and financial liability."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are aware that a colleague is going through a difficult personal situation - a family illness - that is affecting their work, though they have not disclosed it formally or asked for accommodation. Their work quality has declined noticeably over the past two weeks. What would you do?",opts:{A:"Report the work quality decline to your supervisor as a performance issue without mentioning the personal context",B:"Check in with the colleague privately and compassionately, and if appropriate, mention that resources like Employee Assistance Programs are available, without pressuring them to disclose",C:"Cover for the colleague's declining work by quietly taking on their tasks until they recover",D:"Tell the colleague directly that their personal situation needs to be reported to HR"},best:"B",worst:"D",expBest:"Option B supports the colleague humanely - creating space for them to access help while respecting their privacy and autonomy. Mentioning available resources without pressure is a collegial and appropriate response to observed distress.",expWorst:"Option D presumes to instruct the colleague on what they must disclose to HR - overstepping appropriate boundaries and potentially adding stress to someone already struggling with a personal crisis."}
      ,{type:'standalone',sub:"Crisis and Judgment Under Pressure",q:"You are leading a team on a time-sensitive deliverable when one team member raises a significant concern about the approach at the last possible moment before submission. Taking the concern seriously would delay the submission. What would you do?",opts:{A:"Submit on time regardless of the concern since the deadline is firm",B:"Take five minutes to assess the concern quickly with the team member: if it is substantive, notify the recipient of a brief delay and correct the issue; if not, proceed with submission",C:"Dismiss the concern since it was raised too late to be actionable",D:"Submit on time but note in the submission that a concern was raised that could not be addressed"},best:"B",worst:"C",expBest:"Option B exercises judgment proportionate to the situation - a quick triage of the concern before deciding, rather than ignoring it or automatically delaying. Substantive late-breaking concerns sometimes warrant brief delays; trivial ones do not.",expWorst:"Option C dismisses a potentially substantive concern purely because of timing - if the concern is valid, submitting incorrect work on time is worse than submitting correct work slightly late."}
      ,{type:'standalone',sub:"Integrity and Ethics",q:"A vendor who has done business with your agency for many years sends holiday gifts to several members of your team, including you. The items appear to be modest in value. What would you do?",opts:{A:"Keep the gift because the value is modest and it is a longstanding tradition",B:"Return the gift with a polite explanation that agency policy prohibits accepting gifts from vendors, and notify your supervisor",C:"Keep the gift but report it in writing to ensure it is on record",D:"Donate the gift to a local charity to avoid personal benefit while keeping the vendor relationship positive"},best:"B",worst:"A",expBest:"Option B applies the gift prohibition correctly - vendors doing business with the agency are a prohibited source regardless of the value of the gift or the tradition involved. Returning with a polite explanation is professional and educational.",expWorst:"Option A accepts a prohibited gift and rationalizes it through value and tradition - neither of which are exceptions under standard federal gift rules for gifts from prohibited sources."}
      ,{type:'standalone',sub:"Teamwork and Collaboration",q:"You are leading a project team and need to assign a challenging high-profile task. One team member is technically best suited but has expressed they are stretched thin. Another is less experienced but has capacity. What would you do?",opts:{A:"Assign to the experienced team member since the quality of the work is paramount",B:"Assign to the less experienced team member without additional support since they have the capacity",C:"Have a direct conversation with the experienced team member about their workload, explore whether the assignment is feasible with support or adjusted priorities, and make a decision based on what you learn",D:"Split the task between both team members to share the burden"},best:"C",worst:"B",expBest:"Option C gets the information you need before deciding - the experienced team member may have flexibility with adjusted priorities, or may genuinely be unable to take it on. The conversation is the responsible first step before assignment.",expWorst:"Option B assigns a complex task to a less experienced person purely on capacity grounds without additional support - maximizing risk to the quality of a high-profile deliverable."}
      ,{type:'standalone',sub:"Cultural Sensitivity",q:"You are responsible for planning a year-end team recognition event. A colleague suggests an activity that you know is inconsistent with the religious practices of one team member. The colleague does not appear to have considered this. What would you do?",opts:{A:"Go along with the suggestion since it was well-intentioned and one person's constraint should not limit the whole team",B:"Raise the concern privately with the colleague who made the suggestion and propose an alternative that all team members can participate in equally",C:"Ask the team member with the religious constraint to make an exception for a team event",D:"Plan a separate activity for the excluded team member to participate in simultaneously"},best:"B",worst:"C",expBest:"Option B raises the concern where it can be resolved most easily - with the colleague who can change the plan - and proposes an inclusive alternative. This protects the team member's dignity without making it a public issue.",expWorst:"Option C asks a team member to compromise their religious practice for a social event - an inappropriate request that places the burden of inclusion on the person being excluded rather than on those planning the event."}
      ,{type:'standalone',sub:"Professionalism",q:"You are asked to evaluate and score several competing proposals as part of a formal selection process. You realize partway through that one of the proposals was written by someone you have a prior professional rivalry with. What would you do?",opts:{A:"Complete the evaluation, scoring the rival's proposal with extra rigor to demonstrate impartiality",B:"Disclose the relationship immediately to the process coordinator and ask whether recusal or additional oversight is appropriate",C:"Complete the evaluation without disclosure since a rivalry is not the same as a conflict of interest",D:"Score the rival's proposal slightly more generously than you otherwise would to compensate for your potential bias"},best:"B",worst:"D",expBest:"Option B discloses the relationship and seeks guidance - the correct step when you identify any personal dynamic that could affect impartiality in a formal evaluation process. The process coordinator can determine whether it rises to a conflict.",expWorst:"Option D deliberately adjusts scores to compensate for perceived bias - actively distorting the evaluation in a way that undermines the integrity of the process regardless of your intent."}
      ,{type:'standalone',sub:"Information Management",q:"You realize that a briefing you gave last week to a congressional staffer included one data point that you have since learned was incorrect - you had used a preliminary figure that has now been revised. What would you do?",opts:{A:"Take no action since the briefing is over and the incorrect data is unlikely to be acted upon",B:"Proactively contact the congressional staffer to correct the record, provide the accurate figure, and apologize for the error",C:"Wait to see if the staffer follows up before deciding whether to correct the record",D:"Include the correct figure in the next briefing without mentioning the prior error"},best:"B",worst:"A",expBest:"Option B proactively corrects misinformation provided to a congressional contact - a professional obligation that protects both the accuracy of congressional decision-making and the credibility of your agency's communications.",expWorst:"Option A takes no action on known misinformation provided to a congressional stakeholder - allowing an error to stand in a relationship where accuracy is critical to both the mission and the agency's credibility."}
      ,{type:'standalone',sub:"Interpersonal Effectiveness",q:"You are part of a team that has just completed a major project. The team had significant interpersonal tensions during the project that were never formally addressed. What would you do in the aftermath?",opts:{A:"Let the tensions fade naturally now that the project is over",B:"Suggest to the team or team lead that a brief retrospective would be valuable to identify what worked, what did not, and how to work better together on the next project",C:"Raise the interpersonal issues with your supervisor to ensure they are documented",D:"Discuss the tensions informally with individual team members to get their perspectives"},best:"B",worst:"D",expBest:"Option B channels the post-project moment into structured learning - a retrospective is a professional and forward-looking way to address what went wrong without assigning blame, and builds team capacity for the future.",expWorst:"Option D selectively discusses the tensions with individual members, which is likely to re-open grievances informally and potentially create competing narratives rather than resolving anything."}
      ,{type:'standalone',sub:"Resource Management",q:"You are leading a section and notice that one team member consistently takes on far more work than others without complaint - to the point where their work quality may be suffering. Other team members appear comfortable with the current distribution. What would you do?",opts:{A:"Leave the situation as is since the overworked team member has not complained",B:"Proactively review and rebalance the workload distribution, speak with the overworked team member privately, and address the dynamics that led others to accept an inequitable distribution",C:"Ask the overworked team member to decline additional tasks on their own going forward",D:"Praise the overworked team member for their dedication in front of the team"},best:"B",worst:"D",expBest:"Option B takes active responsibility for workload management - proactively correcting an inequitable distribution without waiting for the affected team member to complain, and addressing the systemic dynamic that allowed it to develop.",expWorst:"Option D publicly praises a team member for a workload situation that a supervisor should be correcting - potentially reinforcing the imbalance and making the team member feel obligated to continue overperforming rather than addressing the inequity."}
      ,{type:'standalone',sub:"Workplace Conduct",q:"You are aware that a colleague has been telling others that they are responsible for a successful project outcome when you know the success was due to the collective effort of the whole team. The colleague is not actively lying but is allowing a misleading impression to stand. What would you do?",opts:{A:"Correct the impression publicly in the next team meeting",B:"Speak privately with the colleague to note what you have observed and its effect on team morale, and encourage them to be more accurate in how they describe the project",C:"Say nothing because the project was a team effort and everyone benefits from its success",D:"Report the colleague to your supervisor for taking undue credit"},best:"B",worst:"A",expBest:"Option B addresses the conduct directly with the person responsible, privately and constructively - giving them the opportunity to correct their own behavior without public embarrassment and with a clear explanation of the impact.",expWorst:"Option A publicly corrects a colleague in a group setting - creating a confrontational and embarrassing situation that is disproportionate to the offense and likely to damage the working relationship more than the underlying behavior."}
